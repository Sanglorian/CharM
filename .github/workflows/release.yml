name: Build All Platforms

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install maui-windows workload
        run: dotnet workload install maui-windows --skip-manifest-update

      - name: Build Windows ${{ matrix.arch }} (MAUI + Webserver)
        shell: pwsh
        run: ./scripts/build-windows.ps1 -Arch ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: charm-windows-${{ matrix.arch }}
          path: scripts/out/charm-windows-${{ matrix.arch }}.zip

  android:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install maui-android workload
        run: dotnet workload install maui-android --skip-manifest-update

      - name: Build Android APK
        shell: pwsh
        run: ./scripts/build-android.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: charm-android
          path: scripts/out/charm-android.apk

  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build Linux ${{ matrix.arch }} webserver
        shell: pwsh
        run: ./scripts/build-linux.ps1 -Arch ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: charm-linux-${{ matrix.arch }}
          path: scripts/out/charm-linux-${{ matrix.arch }}.zip

  macos:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install maui-maccatalyst workload
        run: sudo dotnet workload install maui-maccatalyst --skip-manifest-update

      - name: Build Mac Catalyst app (universal x64 + arm64)
        shell: pwsh
        run: ./scripts/build-macos.ps1 -Arch universal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: charm-macos-universal
          path: scripts/out/charm-macos-universal.zip

  release:
    needs: [windows, android, linux, macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/charm-windows-x64/charm-windows-x64.zip
            artifacts/charm-windows-arm64/charm-windows-arm64.zip
            artifacts/charm-android/charm-android.apk
            artifacts/charm-linux-x64/charm-linux-x64.zip
            artifacts/charm-linux-arm64/charm-linux-arm64.zip
            artifacts/charm-macos-universal/charm-macos-universal.zip
