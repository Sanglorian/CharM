# Familiars (Orcus Classes and Powers, Binds Familiar kit) — generated by
# tools/CharM.Orcus.Import (generate-familiars) from the familiar table. Each is
# a "Familiar: X" Power (the engine's familiar shape: no own stat block — it
# uses your defenses, max HP = your recovery value), tagged ORCUS_FAMILIAR for
# the Binds Familiar select. Senses/Speed are structural; the Constant Benefits
# and While Called columns are verbatim. Do not hand-edit; regenerate.

- id: ORCUS_FAMILIAR_AIR_ELEMENTAL
  name: "Familiar: Air Elemental"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_FAMILIAR]
  fields:
    Size: Tiny
    Senses: "darkvision"
    Speed: "fly 8"
    "Constant Benefits": >-
      +2 feat bonus to Acrobatics and Athletics checks while you are outdoors.
    "While Called": >-
      Levitation: When you start your movement adjacent to your air elemental,
      you gain a fly speed equal to your walk speed (hover, maximum altitude 2).

