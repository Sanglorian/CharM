# Epic paths (Orcus Classes and Powers). At level 21 every character chooses an
# epic path, on top of their class and prestige path. It grants class features at
# 21st, 24th and 30th level and a single power at 26th. Selected via the Epic Path
# slot opened by ID_INTERNAL_LEVEL_21; the 24th/26th/30th benefits are gated with
# `level:`. All six published paths are transcribed.

# === Agent Retriever ==========================================================
- id: ORCUS_EPIC_AGENT_RETRIEVER
  name: Agent Retriever
  type: Epic Path
  source: "Orcus Original"
  fields:
    Description: >-
      Elemental tyrants, the heralds of the gods, the voices between the planets
      – they all have peculiar needs, and the agents retriever cater to them.
      You travel across the planes, locating and acquiring whatever your patrons
      need.
    Immortality: >-
      When your adventuring days come to an end, a number of different fates may
      await you. What follows is one possibility.
  rules:
    - { grant: ORCUS_FEATURE_APPROPRIATION, type: Class Feature }
    - { grant: ORCUS_FEATURE_INTERPLANAR_CONTINGENCIES, type: Class Feature, level: 24 }
    - { grant: ORCUS_FEATURE_THE_ECONOMIC_FLOW, type: Class Feature, level: 30 }
    - { grant: ORCUS_POWER_FORCE_SPHERE, type: Power, level: 26 }

- id: ORCUS_FEATURE_APPROPRIATION
  name: Appropriation
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "21", Description: "Each night, you dream of a magic item. After a long rest, choose any magic item of your level or lower. That magic item appears under your bedroll, ready for use. It disappears when you begin your next long rest. The magic item is not created, it is summoned. The GM may want to identify which creature’s possession the magic item was summoned from, and whether there are any hints to your identity when it arrives back in their possession the following day." }
- id: ORCUS_FEATURE_INTERPLANAR_CONTINGENCIES
  name: Interplanar Contingencies
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "24", Description: "Once per day, when you die, you appear the following round on your initiative count with half your maximum HP and under the slowed condition, in an unoccupied space of your choice at least 6 squares from your dead body. You cannot use any attack powers or recoveries, but you can make basic attacks and you have all the equipment and magic items that were on your person when you died. The equipment and magic items that are actually on your body become shimmering and insubstantial, and cannot be used or picked up. When you are adjacent to your corpse, you can use a swift action to merge the old and new bodies. You can now use attack powers and recoveries, although you do not recover any powers or recoveries that were already spent. You lose the slowed condition, but otherwise keep the HP and any conditions, persistent damage, etc., of your new body. Choose which square your merged body appears in." }
- id: ORCUS_FEATURE_THE_ECONOMIC_FLOW
  name: The Economic Flow
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "30", Description: "You are at the center of a vast trade network. If something is for sale anywhere in the planes, for any price, you can purchase it with a snap of your fingers (free action). The object appears in your hand or on your person, if feasible, or otherwise in the nearest unoccupied space(s) that can hold it. The payment price must be on your person (for example, a pouch of gold pieces on your belt) – it disappears at the same time as the purchased object appears." }

- id: ORCUS_POWER_FORCE_SPHERE
  name: Force Sphere
  type: Power
  source: "Orcus Original"
  categories: [feature]
  fields:
    Level: "26"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Counter Action"
    Keywords: "Arcane, Force, Zone"
    Target: "Near burst X"
    Effect: >-
      Create a sphere of force in a near burst between 1 and 5 squares in radius
      (your choice). The sphere is impenetrable by any means. The zone persists
      until the end of your next turn.
    Maintain: "Swift The zone persists until the end of your next turn."
# === Master ===================================================================
- id: ORCUS_EPIC_MASTER
  name: Master
  type: Epic Path
  source: "Orcus Original"
  fields:
    Description: >-
      You are the single greatest expert on the planet on a specific subject.
      All others bend to your word. Long after you have passed on, your papers
      and essays will be analyzed for hidden truths previously undiscovered.
      Your name will be uttered in the same breaths of legends from centuries
      past. Whatever vocation you have chosen, competitors and publishers will
      jostle for your contract should you leave your present employment.
  rules:
    - { grant: ORCUS_FEATURE_OUT_OF_ANYONES_LEAGUE, type: Class Feature }
    - { grant: ORCUS_FEATURE_AGAINST_THE_LAWS_OF_PHYSICS, type: Class Feature, level: 24 }
    - { grant: ORCUS_FEATURE_BEYOND_IMPOSSIBLE, type: Class Feature, level: 30 }
    - { grant: ORCUS_POWER_PIONEER, type: Power, level: 26 }

- id: ORCUS_FEATURE_OUT_OF_ANYONES_LEAGUE
  name: Out of Anyone's League
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "21", Description: "Gain a +2 bonus to one ability score of your choice and a +3 bonus to one skill of your choice." }
- id: ORCUS_FEATURE_AGAINST_THE_LAWS_OF_PHYSICS
  name: Against the Laws of Physics
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "24", Description: "Pick one your daily utility powers. It is now an encounter power." }
- id: ORCUS_FEATURE_BEYOND_IMPOSSIBLE
  name: Beyond Impossible
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "30", Description: "Spend a recovery as a swift action but regain no hit points; instead, you gain a +20 power bonus to your next skill roll with the skill you selected with Out of Anyone’s League." }

- id: ORCUS_POWER_PIONEER
  name: Pioneer
  type: Power
  source: "Orcus Original"
  categories: [feature]
  fields:
    Level: "26"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Free Action"
    Keywords: "Martial"
    Target: "Self"
    Effect: >-
      You heal damage equal to double your recovery value. You recover all your
      used encounter powers.
    Special: >-
      Once you use this power, you cannot recover it except by taking a long
      rest.
# === Most Dangerous ===========================================================
- id: ORCUS_EPIC_MOST_DANGEROUS
  name: Most Dangerous
  type: Epic Path
  source: "Orcus Original"
  fields:
    Description: >-
      No one who hunts you knows your real name. You’re a ghost. Enemies and
      allies don’t have just one nickname for you; there are several. Few are
      aware of all your accomplishments. Most of these victories were erased or
      never directly connected to you. Others you must deny. You career might
      never have existed at all. Missions that you took were probably illegal,
      extremely difficult, with no room for failure. Your handle or moniker
      labels you as one of the most wanted individuals on the planet.
  rules:
    - { grant: ORCUS_FEATURE_SECOND_NATURE, type: Class Feature }
    - { grant: ORCUS_FEATURE_IMPLAUSIBLE_SPEED, type: Class Feature, level: 24 }
    - { grant: ORCUS_FEATURE_VORPAL_WAYS, type: Class Feature, level: 30 }
    - { grant: ORCUS_POWER_REPUTATION_EARNED, type: Power, level: 26 }

- id: ORCUS_FEATURE_SECOND_NATURE
  name: Second Nature
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "21", Description: "You reroll natural 1s and 2s on attack rolls and skill checks, but you must take the second result even if it is another 1 or a 2." }
- id: ORCUS_FEATURE_IMPLAUSIBLE_SPEED
  name: Implausible Speed
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "24", Description: "You can use two action points per encounter and if you reach a streak, you gain two action points. You cannot use more than one action point per round." }
- id: ORCUS_FEATURE_VORPAL_WAYS
  name: Vorpal Ways
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "30", Description: "Once per hit, if you roll the maximum result on one or more of your initial damage dice, you can roll those dice again and add them to your damage total." }

- id: ORCUS_POWER_REPUTATION_EARNED
  name: Reputation Earned
  type: Power
  source: "Orcus Original"
  categories: [feature]
  fields:
    Level: "26"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Free Action"
    Keywords: "Martial"
    Target: "Self"
    Effect: "You gain two action points."
# === Respected ================================================================
- id: ORCUS_EPIC_RESPECTED
  name: Respected
  type: Epic Path
  source: "Orcus Original"
  fields:
    Description: >-
      Your uniform weighs you down with the number of medals and honors
      bestowed. You have reached the point where brandishing such decorations is
      meaningless. Every soldier that passes you knows your face and gives you
      the courtesy you have earned. You can sway thousands by your command. Your
      advice is taken to heart by high priests, archmages, and kings. You don’t
      win battles. You win wars.
  rules:
    - { grant: ORCUS_FEATURE_TRY_AGAIN_AIM_THIS_TIME, type: Class Feature }
    - { grant: ORCUS_FEATURE_SACRIFICE_PLAY, type: Class Feature, level: 24 }
    - { grant: ORCUS_FEATURE_MASTER_TACTICIAN, type: Class Feature, level: 30 }
    - { grant: ORCUS_POWER_NOT_TOLERATE_LOSING, type: Power, level: 26 }

- id: ORCUS_FEATURE_TRY_AGAIN_AIM_THIS_TIME
  name: "Try Again and Aim This Time"
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "21", Description: "The first time in an encounter that an ally within line of sight misses on an attack, they may reroll their attack roll." }
- id: ORCUS_FEATURE_SACRIFICE_PLAY
  name: Sacrifice Play
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "24", Description: "As an immediate (react) action once per encounter, when an ally is reduced to below 0 hit points, you can grant any other ally in line of sight a standard , a move, and a swift action." }
- id: ORCUS_FEATURE_MASTER_TACTICIAN
  name: Master Tactician
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "30", Description: "Once per encounter, as a standard action, you can give one swift action, one move action, and one standard action to be split among up to three allies of your choice in line of sight." }

- id: ORCUS_POWER_NOT_TOLERATE_LOSING
  name: Not Tolerate Losing
  type: Power
  source: "Orcus Original"
  categories: [feature]
  fields:
    Level: "26"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Standard Action"
    Keywords: "Martial"
    Target: "Near burst 10, all allies"
    Effect: "The target regains one expended encounter power."
# === Team =====================================================================
- id: ORCUS_EPIC_TEAM
  name: Team
  type: Epic Path
  source: "Orcus Original"
  fields:
    Description: >-
      It has never been about personal glory or selfish ideals. From the
      beginning, you have stood tall among others you have treated as equals,
      others that have returned that honor a hundred times over. You have all
      lost count how many engagements you have shared, the taken bullets, the
      close calls. It was always, and will always be, about the team. It’s been
      years or even decades and none of you will quit until the others do. You
      each push to be the best and as a result, you all are.
  rules:
    - { grant: ORCUS_FEATURE_TEAM_SUPPORT, type: Class Feature }
    - { grant: ORCUS_FEATURE_WHERE_THE_NEED_IS_GREATEST, type: Class Feature, level: 24 }
    - { grant: ORCUS_FEATURE_BROTHERS_AND_SISTERS_OF_BLOOD, type: Class Feature, level: 30 }
    - { grant: ORCUS_POWER_FOR_THE_SAKE_OF_THE_TEAM, type: Power, level: 26 }

- id: ORCUS_FEATURE_TEAM_SUPPORT
  name: Team Support
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "21", Description: "Each time you spend a recovery for any purpose, choose one ally within line of sight. The ally immediately saves against one effect a save can end (except dying)." }
- id: ORCUS_FEATURE_WHERE_THE_NEED_IS_GREATEST
  name: Where the Need is Greatest
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "24", Description: "As a swift action, choose an ally (or yourself). The target loses one recovery. If you do so, choose an ally (or yourself). The target gains one recovery." }
- id: ORCUS_FEATURE_BROTHERS_AND_SISTERS_OF_BLOOD
  name: Brothers and Sisters of Blood
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "30", Description: "For every epic-tier ally in line of sight, you gain a cumulative +1 bonus to all skill checks and damage rolls (maximum +4)." }

- id: ORCUS_POWER_FOR_THE_SAKE_OF_THE_TEAM
  name: For the Sake of the Team
  type: Power
  source: "Orcus Original"
  categories: [feature]
  fields:
    Level: "26"
    "Power Usage": "Encounter"
    "Power Type": "Utility"
    "Action Type": "Free Action"
    Keywords: "Martial"
    Target: "Near burst 10, one ally"
    Effect: "The target takes one standard action."
# === Ultimate =================================================================
- id: ORCUS_EPIC_ULTIMATE
  name: Ultimate
  type: Epic Path
  source: "Orcus Original"
  fields:
    Description: >-
      As the legendary fighter, you have too many laurels to count. In the old
      age, you would have been given freedom by the Caesar or awarded a lordship
      and a manor for your deeds. You have the blood of kings. History is
      written by the winners and you have seldom seen defeat.
  rules:
    - { grant: ORCUS_FEATURE_WHY_WONT_YOU_DIE, type: Class Feature }
    - { grant: ORCUS_FEATURE_GLORY_OF_THE_FIGHT, type: Class Feature, level: 24 }
    - { grant: ORCUS_FEATURE_RISKY_MANEUVER, type: Class Feature, level: 30 }
    - { grant: ORCUS_POWER_LASTING_IMAGE, type: Power, level: 26 }

- id: ORCUS_FEATURE_WHY_WONT_YOU_DIE
  name: "Why Won't You Die?"
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "21", Description: "Attacks cannot score critical hits against you (take normal damage)." }
- id: ORCUS_FEATURE_GLORY_OF_THE_FIGHT
  name: Glory of the Fight
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "24", Description: "If you kill a non-mook enemy, you gain a +4 power bonus on your next attack roll." }
- id: ORCUS_FEATURE_RISKY_MANEUVER
  name: Risky Maneuver
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "30", Description: "As a swift action, you can reduce all your defense values to 1 until the start of your next turn. On your next turn, the first attack you make is an automatic critical hit." }

- id: ORCUS_POWER_LASTING_IMAGE
  name: Lasting Image
  type: Power
  source: "Orcus Original"
  categories: [feature]
  fields:
    Level: "26"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "No Action"
    Keywords: "Martial"
    Target: "Self"
    Trigger: "You begin dying."
    Effect: >-
      You regain consciousness and stand up. You can take a single action on
      your turn, losing all other actions except free actions. You can still
      take immediate actions and opportunity attacks. You gain a +2 bonus to all
      attack rolls and a +5 bonus to all damage rolls until the end of the
      encounter. You cannot be healed until the end of the encounter, and do not
      make death saves until then. At the end of the encounter, you fall
      unconscious and begin making death saves as normal.
    Flavor: >-
      You are prepared to die, but you will be damned if you will let this
      opponent get away with what it just did.
