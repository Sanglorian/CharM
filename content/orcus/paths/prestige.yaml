  name: "Automatic Reflexes"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "11"
    Description: >-
      When you use an action point, you can use two at-will attack powers with
      the extra action.
- id: ORCUS_FEATURE_WASTE_OF_SKILL
  name: "Waste of Skill"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "11"
    Description: >-
      If you score a critical hit with a daily attack power, and the creature
      you hit was the only target, the power is not expended.
- id: ORCUS_FEATURE_THEY_THOUGHT_YOU_MISSED
  name: "They Thought You Missed"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "16"
    Description: >-
      When you make an attack with a ranged weapon that misses, you still
      inflict damage equal to your Dexterity modifier.

- id: ORCUS_POWER_SPLINTERING_SHOT
  name: "Splintering Shot"
  type: Power
  source: "Orcus Original"
  categories: [feature]
  fields:
    Level: "11"
    "Power Usage": "Encounter"
    "Power Type": "Attack"
    "Action Type": "Free Action"
    Keywords: "Martial"
    Target: "Self"
    Trigger: "You reduce a creature to 0 HP or below."
    Effect: >-
      Each creature in a burst 2 around the target takes damage equal to 2 +
      your Dexterity modifier. Level 21: Each creature in a burst 2 around the
      target takes damage equal to 5 + your Dexterity modifier.
    Flavor: "The arrow shatters, damaging targets around."

- id: ORCUS_POWER_STALKING_HORSE
  name: "Stalking Horse"
  type: Power
  source: "Orcus Original"
  categories: [feature]
  fields:
    Level: "12"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Move Action"
    Keywords: "Martial, Teleportation"
    Target: >-
      Near burst 10, an unoccupied space you can see that grants three-quarters
      cover or total concealment
    Effect: "You teleport to the target space."
    Flavor: "Your enemy is certain of your location. They’re wrong."

- id: ORCUS_POWER_PERFECT_SHOT_PLACEMENT
  name: "Perfect Shot Placement"
  type: Power
  source: "Orcus Original"
  categories: [feature]
  fields:
    Level: "20"
    "Power Usage": "Daily"
    "Power Type": "Attack"
    "Action Type": "Standard Action"
    Keywords: "Consistent, Martial, Weapon"
    Target: "Ranged weapon, one creature"
    Attack: "Dexterity vs AC"
    Hit: >-
      4dW + Dexterity modifier damage and make a secondary attack against all
      enemies within burst 3 of the target. Secondary Attack: Dexterity vs AC;
      2dW + Dexterity modifier damage.
    Flavor: >-
      Once you get the measure of one enemy, their allies are easy pickings.

