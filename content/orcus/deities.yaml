# Deities (Orcus). Orcus treats gods as "domains": a worshipper takes the matching
# "Worships the God of ..." kit (kits.yaml), which grants Channel Divinity and that
# god's Blessing. These `Deity` elements record the gods themselves for reference
# and for the kit's `Deity` field to point at. (Descriptive; the mechanical
# benefits live on the kit.)

- id: ORCUS_DEITY_WAR
  name: God of War
  type: Deity
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Domain: War
    Kit: "Worships the God of War"
    "Channel Divinity": "Shielded Soul"

