# === Eats Monster Hearts ======================================================
- id: ORCUS_KIT_EATS_MONSTER_HEARTS
  name: "Eats Monster Hearts"
  type: Theme
  source: "Orcus Original"
  fields:
    Description: >-
      You have a mystical connection to monsters, and can steal a measure of
      their supernatural power from their bodies.
  rules:
    - { grant: ORCUS_MARKER_HAS_KIT, type: Marker }
    - { grant: ORCUS_DISCACCESS_RED_IN_TOOTH_AND_CLAW, type: Discipline Access }
    - { grant: ORCUS_KITF_CONSUME_STRENGTH, type: Class Feature }

- id: ORCUS_KITF_CONSUME_STRENGTH
  name: "Consume Strength"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "1"
    Description: >-
      After an encounter in which you defeated a monster, you can replace one of
      your encounter attack powers with an at-will attack power of the
      monster’s. The power is an encounter power for you. The encounter power
      you replace must be of a level equal to or greater than the monster’s
      level. You can instead or also replace one of your daily attack powers
      with an encounter or refresh attack power of the monster’s. The power is a
      daily power for you. The daily power you replace must be of a level equal
      to or greater than the monster’s level. If the daily power you replaced
      had already been expended, you must wait until after your next long rest
      before using the new power acquired from the monster. Powers you gain
      through this feature have the Focus tag and use the ability score of your
      choice for the attack. After each long rest, roll 1d6 for each monster
      power you used that day. On a 1, you lose that monster power.
      Alternatively, you can choose to lose a monster power after any short or
      long rest. However you lose the power, it is replaced with the encounter
      or daily attack power you originally replaced it with. Level 5: After an
      encounter in which you defeated a monster, you can replace one of your
      utility powers with a non-attack power, movement speed, resistance,
      immunity or sense of the monster’s. The utility power you replace must be
      of a level equal to or greater than the monster’s level. If the monster
      could use the power at-will or it was always active, your utility power is
      an encounter power that lasts until the end of your next round or a daily
      power that lasts until the end of the encounter (your choice). If the
      monster could use the power once per encounter or on a refresh basis, your
      utility power is a daily power. After each long rest, roll 1d6 for each
      monster power you used that day. On a 1, you lose that monster power.
      Alternatively, you can choose to lose a monster power after any short or
      long rest. However you lose the power, it is replaced with the utility
      power you originally replaced it with. Level 10: After an encounter in
      which you defeated a monster of your level or lower, you can gain an aura
      of the monster. You can only have one such aura active at any one time. In
      addition, you do not need to defeat a monster to use your Level 1, 5 or 10
      features. The monster can willingly grant you the power(s) instead.

# === Embodies Charisma ========================================================
- id: ORCUS_KIT_EMBODIES_CHARISMA
  name: "Embodies Charisma"
  type: Theme
  source: "Orcus Original"
  fields:
    Description: >-
      You have always displayed confidence in the way you talk and present
      yourself. You’re also clever enough to know what to say at the right times
      to have the greatest effect. You know that how you speak means more than
      the words themselves.
  rules:
    - { grant: ORCUS_MARKER_HAS_KIT, type: Marker }
    - { grant: ORCUS_DISCACCESS_ANGELS_TRUMPET, type: Discipline Access }
    - { grant: ORCUS_KITF_COMMANDING_PRESENCE, type: Class Feature }
    - { grant: ORCUS_KITF_PEOPLE_S_HERO, type: Class Feature, level: 5 }
    - { grant: ORCUS_KITF_PRESENCE_OF_LEADERSHIP, type: Class Feature, level: 10 }

- id: ORCUS_KITF_COMMANDING_PRESENCE
  name: "Commanding Presence"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "1"
    Description: >-
      Choose one of the following auras at character generation. Once per day,
      you can activate an aura as a swift action, which lasts until the end of
      the encounter, unless you end it as a swift action or you fall
      unconscious. By Example aura 2; allies in the aura gain a +2 power bonus
      to Fortitude defense and Will defense. Field Advice aura 2; allies in the
      aura gain a +2 bonus to all saving throws except death saves and saves
      against unconsciousness. Mask of Authority aura 2; allies in the aura gain
      a +2 power bonus to damage rolls with basic attacks. Level 11: +3 power
      bonus. Level 21: +4 power bonus. Stand as One aura 2; whenever an ally in
      the aura regains hit points, they regain additional hit points equal to
      your Charisma or Intelligence modifier. In addition, the action required
      for rally is reduced from standard to move, or from move to swift. Level
      11: Additional hit points equal to 4 + your Charisma or Intelligence
      modifier Level 21: Additional hit points equal to 8 + your Charisma or
      Intelligence modifier Strategic Precision aura 2; allies in the aura gain
      a +1 power bonus to attack rolls against the last target you hit.
- id: ORCUS_KITF_PEOPLE_S_HERO
  name: "People’s Hero"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "5"
    Description: >-
      As a swift action, you can spend a recovery, but regain no hit points;
      instead, you extend any Command Presence auras you have in effect by a
      number of squares equal to your Charisma modifier until the end of your
      next turn.
- id: ORCUS_KITF_PRESENCE_OF_LEADERSHIP
  name: "Presence of Leadership"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "10"
    Description: >-
      When you use the Rally action, one ally in your aura can spend a recovery
      to heal damage equal to their recovery value.

# === Embodies Intelligence ====================================================
- id: ORCUS_KIT_EMBODIES_INTELLIGENCE
  name: "Embodies Intelligence"
  type: Theme
  source: "Orcus Original"
  fields:
    Description: >-
      Your strengths are not in your endurance, speed, or ability to strike
      something with pinpoint accuracy. You use a part of the body most of your
      comrades seem to let rot, your brain. You understand that you may be on
      the border between genius and madness, but all the great minds of the
      world balance that knife-edge.
  rules:
    - { grant: ORCUS_MARKER_HAS_KIT, type: Marker }
    - { grant: ORCUS_DISCACCESS_HIGH_CUNNING, type: Discipline Access }
    - { grant: ORCUS_KITF_PRIORITY_TARGET, type: Class Feature }
    - { grant: ORCUS_KITF_FOCUSED_EXPERTISE, type: Class Feature, level: 5 }
    - { grant: ORCUS_KITF_SURGICAL_PRECISION, type: Class Feature, level: 10 }

- id: ORCUS_KITF_PRIORITY_TARGET
  name: "Priority Target"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "1"
    Description: >-
      You gain a +1 feat bonus to AC and Reflex. If you don’t use any attack
      powers on your turn, your feat bonus increases to +2 until the start of
      your next turn.
- id: ORCUS_KITF_FOCUSED_EXPERTISE
  name: "Focused Expertise"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "5"
    Description: >-
      Select one Intelligence- or Wisdom-based skill. Apply both your
      Intelligence and Wisdom modifiers to that skill.
- id: ORCUS_KITF_SURGICAL_PRECISION
  name: "Surgical Precision"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "10"
    Description: >-
      Targets suffer a -2 penalty to saving throws against any conditions you
      inflict.

