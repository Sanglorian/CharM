  name: "Buckle Your Swashes"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "1"
    Description: >-
      You belong to the Exemplar class (along with any other classes that you
      belong to), with Exemplar becoming your “secondary class”. You gain the
      following benefits: When you hit an enemy with a melee attack, and do not
      already have momentum, you gain momentum. When you are hit by any kind of
      attack, you lose momentum. Momentum has no effect on its own, but it is
      required for your Triumphant Strike and Bide Your Time features and is
      referenced by some powers. Once per encounter, you can use the Exemplar’s
      Triumphant Strike feature (noting that it requires momentum to use).
