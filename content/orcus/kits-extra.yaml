  name: "Enduring Summons"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "1"
    Description: >-
      When you use a daily Summon power, the summoned creature immediately gets
      to take an action of the same type as the type you used to summon them
      (for example, if you use prestige binding, a standard action, the big
      burner you summon can immediately use a standard action).
