# === Binds Familiar ===========================================================
- id: ORCUS_KIT_BINDS_FAMILIAR
  name: "Binds Familiar"
  type: Theme
  source: "Orcus Original"
  fields:
    Description: >-
      You have bound to your service a familiar, a Tiny animal or creature that
      aids you and provides companionship.
  rules:
    - { grant: ORCUS_MARKER_HAS_KIT, type: Marker }
    - { select: { type: Power, number: 1, category: ORCUS_FAMILIAR, name: Familiar } }
    - { grant: ORCUS_DISCACCESS_STRONG_BIDDING, type: Discipline Access }
    - { grant: ORCUS_KITF_SPIRIT_FRIEND, type: Class Feature }
    - { grant: ORCUS_KITF_COMBAT_ASSISTANT, type: Class Feature, level: 5 }
    - { grant: ORCUS_KITF_SPEEDY_SUMMONS, type: Class Feature, level: 10 }

- id: ORCUS_KITF_SPIRIT_FRIEND
  name: "Spirit Friend"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "1"
    Description: >-
      You gain the service of a familiar, a spirit that takes an animal form you
      choose (from the list below). You also get the benefit listed in the
      “Constant Benefit” column. The familiar follows the Companion rules, as
      well as the following special rules: If you are incapacitated or not
      present, your familiar gets its full complement of actions without needing
      to be “commanded”. The familiar’s maximum HP are equal to your recovery
      value. Your familiar uses your Armor Class, Fortitude, Reflex and Will
      defenses. When your familiar drops to 0 hit points, it disappears, leaving
      behind no physical form. You lose one recovery or, if not able to lose a
      recovery, take damage equal to your recovery value. Your familiar
      reappears after your next long rest, at full HP. While your familiar is
      within 20 squares of you, you can communicate with it telepathically. The
      familiar is of human-like intelligence, although it may think very
      differently to humanoids or not be communicative. Hidden Away/Called As a
      swift action, your familiar can hide away on your person, which may
      involve disappearing in a puff of smoke until you call them again, or
      turning into a tattoo on your arm or a statuette in your pocket, or simply
      slipping into your pocket. While hidden away, it cannot act, but it also
      cannot be targeted by any effect, does not take damage, etc. You can call
      a hidden away familiar as a swift action. It appears in a square adjacent
      to you. While called, the familiar gives you the benefit listed in the
      “While Called” column.
- id: ORCUS_KITF_COMBAT_ASSISTANT
  name: "Combat Assistant"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "5"
    Description: >-
      Your familiar gets a +1 bonus to all defenses. While your familiar is
      hidden away, you get a +1 bonus to Reflex defense. While your familiar is
      called, you get a +1 bonus on attack rolls against enemies adjacent to or
      in the same space as your familiar.
- id: ORCUS_KITF_SPEEDY_SUMMONS
  name: "Speedy Summons"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "10"
    Description: >-
      Your familiar gets a further +1 bonus to all defenses. Your familiar
      reappears after your next short rest if it drops to 0 hit points.

# === Brews Poisons ============================================================
- id: ORCUS_KIT_BREWS_POISONS
  name: "Brews Poisons"
  type: Theme
  source: "Orcus Original"
  rules:
    - { grant: ORCUS_MARKER_HAS_KIT, type: Marker }
    - { grant: ORCUS_DISCACCESS_BLADES_IN_THE_DARK, type: Discipline Access }
    - { grant: ORCUS_KITF_POISON_KIT, type: Class Feature }
    - { grant: ORCUS_KITF_RAPID_POISON, type: Class Feature, level: 5 }
    - { grant: ORCUS_KITF_VICIOUS_POISON, type: Class Feature, level: 10 }

- id: ORCUS_KITF_POISON_KIT
  name: "Poison Kit"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "1"
    Description: >-
      You have a poisonmaker’s kit, which you can use to brew poisons. You know
      the Craft Poison craft, and its completion time is only 1 minute for you
      After each long rest, you can give up any number of daily attack powers
      for the day. For each power that you give up, choose a poison of that
      level or lower. You prepare that poison without paying the component cost.
      If you do not use the poison before your next long rest, it goes stale and
      has no effect if used.
- id: ORCUS_KITF_RAPID_POISON
  name: "Rapid Poison"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "5"
    Description: >-
      Once per day, you can give up a daily attack power or a poison as a swift
      action. If you do so, choose a poison of that level or lower. You prepare
      that poison. If you do not use the poison before your next long rest, it
      goes stale and has no effect if used.
- id: ORCUS_KITF_VICIOUS_POISON
  name: "Vicious Poison"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "10"
    Description: >-
      Creatures that are affected by one or more of your poisons suffer a -1
      penalty to saving throws.

# === Channels Godmind =========================================================
- id: ORCUS_KIT_CHANNELS_GODMIND
  name: "Channels Godmind"
  type: Theme
  source: "Orcus Original"
  fields:
    Description: "You can focus your mind to unlock your psychic potential."
  rules:
    - { grant: ORCUS_MARKER_HAS_KIT, type: Marker }
    - { grant: ORCUS_DISCACCESS_THIRD_MIND, type: Discipline Access }
    - { grant: ORCUS_KITF_PSI_FOCUS, type: Class Feature }
    - { grant: ORCUS_KITF_MANTLE, type: Class Feature, level: 5 }
    - { grant: ORCUS_KITF_FOCUSED, type: Class Feature, level: 10 }
    - { grant: ORCUS_POWER_INTENSITY, type: Power }

- id: ORCUS_KITF_PSI_FOCUS
  name: "Psi Focus"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "1"
    Description: "You gain the Wild Talent feat."
- id: ORCUS_KITF_MANTLE
  name: "Mantle"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "5"
    Description: >-
      You gain the Phrenic Talent feat. You can give up your focus surge for an
      encounter to use the intensity power instead.
- id: ORCUS_KITF_FOCUSED
  name: "Focused"
  type: Class Feature
  source: "Orcus Original"
  fields:
    Level: "10"
    Description: >-
      You can perform the meditate action. > MEDITATE: STANDARD ACTION > > You
      meditate for a short while, regaining your inner focus and becoming in
      tune with both your inner well of power and the world around you. > >
      Focus Surge: You may spend a recovery to regain your psi focus. > > +2
      bonus to Will Defense: You gain a +2 bonus to your Will Defense until the
      start of your next turn. > > Once per Encounter: You can meditate once per
      encounter and can use this action again after you take a short or long
      rest.

- id: ORCUS_POWER_INTENSITY
  name: "Intensity"
  type: Power
  source: "Orcus Original"
  categories: [feature]
  fields:
    Level: "Feature"
    "Power Usage": "Encounter"
    "Power Type": "Utility"
    "Action Type": "Swift Action"
    Keywords: "Phrenic"
    Target: "Self"
    Effect: "You gain a +1 bonus to your next attack and damage roll."
    Flavor: >-
      You focus on your connection with your Godmind and you become more
      intensely focused on your next action.

