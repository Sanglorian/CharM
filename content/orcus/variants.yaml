# Optional rules / variants (Orcus) — generated by tools/CharM.Orcus.Import
# (generate-variants). Each is a toggleable Variant element: the app's Campaign
# Settings panel lists every House Rule / Variant as an on/off option, and the
# engine applies a toggled-on element's own rules / lets content gate on it via
# requires. Intro prose is the verbatim Description (round-trip checked). Bonus
# Feats carries build rules (Keen Defenses + a Weapon Focus / Focused Caster
# pick at level 11). The "Feats and Kits" House Rule lives in kits.yaml. Do not
# hand-edit; regenerate.

- id: ORCUS_VARIANT_TRUE_GRIT
  name: "True Grit"
  type: Variant
  source: "Orcus Original"
  fields:
    Description: >-
      Instead of giving humans the Dabbler feature, GMs may want to offer them
      the true grit power instead – especially if they are taking a class that
      does not have at-will attack powers. However, GMs should note that true
      grit is unusually powerful for an ancestry power and it overlaps with the
      elf's careful focus power.

- id: ORCUS_VARIANT_BONUS_FEATS
  name: "Bonus Feats"
  type: Variant
  source: "Orcus Original"
  fields:
    Description: >-
      Some Game Masters give all characters the Keen Defenses feat and either
      the Weapon Focus or Focus Caster feats for free, because they are almost
      default choices from level 11 onwards.
  rules:
    - { grant: ORCUS_FEAT_KEEN_DEFENSES, type: Feat, level: 11 }
    - { select: { type: Feat, number: 1, category: ORCUS_BONUS_FEAT_CHOICE, name: "Bonus Feat (Weapon Focus or Focused Caster)", level: 11 } }

- id: ORCUS_VARIANT_GATED_ARTS
  name: "Gated Arts"
  type: Variant
  source: "Orcus Original"
  fields:
    Description: >-
      In this rules variant, you must have a relevant feat before you can learn
      arts. Add these feats to the list of feats that characters can learn
      through Arcane Training or Magical Training.

- id: ORCUS_VARIANT_SKILLS_DIFFERENT_ABILITIES
  name: "Skills with Different Abilities"
  type: Variant
  source: "Orcus Original"
  fields:
    Description: >-
      Normally, a set ability modifier applies to all checks with a particular
      skill. For example, Athletics checks add your Strength modifier. In some
      situations, though, a different ability might reasonably apply. In such
      cases, the GM might ask for a check using an unusual combination of
      ability and skill, or you might ask your GM if you can apply a different
      modifier.

- id: ORCUS_VARIANT_NINE_POINT_ALIGNMENT
  name: "Nine-Point Alignment"
  type: Variant
  source: "Orcus Original"
  fields:
    Description: >-
      In this variant, instead of five alignments there are nine. Alignment is a
      combination of two factors: one identifies morality (good, evil, or
      neutral), and the other describes attitudes toward society and order
      (lawful, chaotic, or neutral). Thus, nine distinct alignments define the
      possible combinations. These brief summaries of the nine alignments
      describe the typical behavior of a creature with that alignment.
      Individuals might vary significantly from that typical behavior, and few
      people are perfectly and consistently faithful to the precepts of their
      alignment.

- id: ORCUS_VARIANT_NO_SMALL_WEAPON_LIMITS
  name: "No Weapon Limitations for Small Characters"
  type: Variant
  source: "Orcus Original"
  fields:
    Description: >-
      While officially Small characters are limited in which weapons they can
      use, this can be frustrating for players and is not very important for
      game balance. GMs may prefer to let Small characters use any weapon they
      like.

- id: ORCUS_VARIANT_ONE_FREE_ACTION
  name: "One Free Action per Turn"
  type: Variant
  source: "Orcus Original"
  fields:
    Description: >-
      You can only take one free action per turn (including other characters’
      turns). For example, you could drop one item on your turn, and then
      another item on the creature’s turn following yours.

- id: ORCUS_VARIANT_NO_NEGATIVE_HP
  name: "No Negative HP"
  type: Variant
  source: "Orcus Original"
  fields:
    Description: >-
      In this variant, characters never go below 0 HP. They only die from hit
      point loss (rather than from failed death saves) if a single attack would
      reduce them to negative hit points equal to their staggered value or
      worse. For example, a cleric with 22 HP takes 23 damage. They fall to 0
      HP. They then take an attack that does 7 damage. Since it is less than
      their staggered value, they stay at 0 HP. Then they take an attack that
      does 13 damage – since that exceeds their staggered value, they die.

