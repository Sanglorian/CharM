# --- Universal basic attack powers ---
# Every character gets these two powers automatically via ID_INTERNAL_LEVEL_1
# grant directives above. The engine's PowerStatCalculator recognises them by
# name to compute attack/damage from the equipped weapon.

- id: ID_INTERNAL_POWER_MELEE_BASIC_ATTACK
  name: "Melee Basic Attack"
  type: Power
  source: "Orcus Original"
  categories: [at-will]
  fields:
    Level: "1"
    "Power Usage": "At-Will"
    "Power Type": "Attack"
    "Action Type": "Standard Action"
    Keywords: "Martial, Weapon"
    "Attack Type": "Melee Weapon"
    Target: "One creature"
    Attack: "Strength vs. AC"
    Hit: "1[W] + Strength modifier damage."

- id: ID_INTERNAL_POWER_RANGED_BASIC_ATTACK
  name: "Ranged Basic Attack"
  type: Power
  source: "Orcus Original"
  categories: [at-will]
  fields:
    Level: "1"
    "Power Usage": "At-Will"
    "Power Type": "Attack"
    "Action Type": "Standard Action"
    Keywords: "Martial, Weapon"
    "Attack Type": "Ranged Weapon"
    Target: "One creature"
    Attack: "Dexterity vs. AC"
    Hit: "1[W] + Dexterity modifier damage."
