# Character-creation bootstrap. The engine looks up ID_INTERNAL_LEVEL_<n> by id
# and runs its directives to (a) seed the Race/Class choice slots and (b) supply
# the core stat formulas. Orcus inherits 4e's defense/skill maths:
#   defense = 10 + half level + best of two abilities (non-stacking) + bonuses
#   skill   = key-ability mod + half level + trained (+5) + misc
# At level 1 HALF-LEVEL resolves to 0 (lazily, as an undefined stat reference).

- id: ID_INTERNAL_LEVEL_1
  name: "1"
  type: Level
  rules:
    # Let class/feature content target either the short or long defense name.
    - statalias: Fortitude Defense
      alias: Fortitude
    - statalias: Reflex Defense
      alias: Reflex
    - statalias: Will Defense
      alias: Will
    - grant: ID_INTERNAL_LEVEL1RULES
      type: Level1Rules
    # The two root choices that begin character creation.
    - select:
        type: Race
        number: 1
        name: Race
    - select:
        type: Class
        number: 1
        name: Class
    # HEROIC-TIER PATH: feats OR a kit (compulsory, exactly one). Every character
    # makes this meta-choice at level 1; its two options grant either the "Heroic
    # Feats" marker or the "Kit Path" marker (see kits.yaml). The "Feats and Kits"
    # House Rule lets a character have both — while it is present this meta-choice
    # is suppressed and both the feat slots and the kit slot are enabled directly
    # via their "| Feats and Kits" alternative.
    - { select: { type: Class Feature, number: 1, category: ORCUS_HEROIC_CHOICE, name: "Feat or Kit", requires: "(!Feats and Kits)" } }
    # Feats: one at level 1, then one at every even level (16 by level 30). The
    # slots live here with per-slot `level:` gates rather than in each LEVEL_n
    # element. Each is a single pick from the Feat pool (the engine consumes a
    # chosen feat globally, so every slot gets a distinct feat).
    #
    # The six HEROIC-tier feat slots (levels 1, 2, 4, 6, 8, 10) carry
    # `requires: "Heroic Feats | Feats and Kits"`: they appear only when the
    # "Heroic Feats" path was chosen above (or the "Feats and Kits" House Rule is
    # on). Paragon/epic feat slots (level 12+) are unaffected.
    - { select: { type: Feat, number: 1, name: "Feat (Lv 1)", requires: "Heroic Feats | Feats and Kits" } }
    - { select: { type: Feat, number: 1, name: "Feat (Lv 2)", level: 2, requires: "Heroic Feats | Feats and Kits" } }
    # The kit slot (a Theme). Appears only on the "Kit Path" (or under the House
    # Rule). It is not optional — once you are on the kit path a kit is compulsory.
    # (The app still treats Theme choices as skippable and orders them after powers.)
    - { select: { type: Theme, number: 1, name: "Kit", requires: "Kit Path | Feats and Kits" } }
    # Elemental Flux energy (lightning/acid/cold/fire/thunder). Offered to any
    # character with Elemental Flux access — gated on the "Elemental Flux Access"
    # marker granted by whatever provides it (class/kit/feat), so it is not tied
    # to one class. See flux.yaml.
    - { select: { type: Class Feature, number: 1, category: ORCUS_FLUX_ENERGY, name: "Flux Energy", requires: "Elemental Flux Access" } }
    - { select: { type: Feat, number: 1, name: "Feat (Lv 4)", level: 4, requires: "Heroic Feats | Feats and Kits" } }
    - { select: { type: Feat, number: 1, name: "Feat (Lv 6)", level: 6, requires: "Heroic Feats | Feats and Kits" } }
    - { select: { type: Feat, number: 1, name: "Feat (Lv 8)", level: 8, requires: "Heroic Feats | Feats and Kits" } }
    - { select: { type: Feat, number: 1, name: "Feat (Lv 10)", level: 10, requires: "Heroic Feats | Feats and Kits" } }
    - { select: { type: Feat, number: 1, name: "Feat (Lv 12)", level: 12 } }
    - { select: { type: Feat, number: 1, name: "Feat (Lv 14)", level: 14 } }
    - { select: { type: Feat, number: 1, name: "Feat (Lv 16)", level: 16 } }
    - { select: { type: Feat, number: 1, name: "Feat (Lv 18)", level: 18 } }
    - { select: { type: Feat, number: 1, name: "Feat (Lv 20)", level: 20 } }
    - { select: { type: Feat, number: 1, name: "Feat (Lv 22)", level: 22 } }
    - { select: { type: Feat, number: 1, name: "Feat (Lv 24)", level: 24 } }
    - { select: { type: Feat, number: 1, name: "Feat (Lv 26)", level: 26 } }
    - { select: { type: Feat, number: 1, name: "Feat (Lv 28)", level: 28 } }
    - { select: { type: Feat, number: 1, name: "Feat (Lv 30)", level: 30 } }
    # All characters get both basic attacks automatically.
    - grant: ID_INTERNAL_POWER_MELEE_BASIC_ATTACK
      type: Power
    - grant: ID_INTERNAL_POWER_RANGED_BASIC_ATTACK
      type: Power

- id: ID_INTERNAL_LEVEL1RULES
  name: Level 1 Rules
  type: Level1Rules
  rules:
    - statadd: Level
      value: 1

    # --- Armor Class: 10 + half level + best of Dex/Int ---
    # The Dex/Int contribution is suppressed while wearing heavy armor (the
    # engine registers `armor:heavy` from an Armor element's `Armor Type` field),
    # matching 4e: light armor adds your ability mod to AC, heavy armor does not.
    - statadd: AC
      value: 10
    - statadd: AC
      value: { statref: HALF-LEVEL }
    - statadd: AC
      value: { abilmod: Dexterity }
      bonusType: Ability
      notWearing: armor:heavy
    - statadd: AC
      value: { abilmod: Intelligence }
      bonusType: Ability
      notWearing: armor:heavy

    # --- Fortitude: 10 + half level + best of Str/Con ---
    - statadd: Fortitude Defense
      value: 10
    - statadd: Fortitude Defense
      value: { statref: HALF-LEVEL }
    - statadd: Fortitude Defense
      value: { abilmod: Strength }
      bonusType: Ability
    - statadd: Fortitude Defense
      value: { abilmod: Constitution }
      bonusType: Ability

    # --- Reflex: 10 + half level + best of Dex/Int ---
    - statadd: Reflex Defense
      value: 10
    - statadd: Reflex Defense
      value: { statref: HALF-LEVEL }
    - statadd: Reflex Defense
      value: { abilmod: Dexterity }
      bonusType: Ability
    - statadd: Reflex Defense
      value: { abilmod: Intelligence }
      bonusType: Ability

    # --- Will: 10 + half level + best of Wis/Cha ---
    - statadd: Will Defense
      value: 10
    - statadd: Will Defense
      value: { statref: HALF-LEVEL }
    - statadd: Will Defense
      value: { abilmod: Wisdom }
      bonusType: Ability
    - statadd: Will Defense
      value: { abilmod: Charisma }
      bonusType: Ability

    # --- Non-proficiency penalties ------------------------------------------
    # "A character suffers a -2 penalty to Reflex defense and attack rolls if
    # they wear armor or use a shield they are not proficient with." (Orcus
    # Rulebook.) Each equipped armor/shield registers an `armor:<category>`
    # wearing-category; the penalty fires while that category is worn AND the
    # matching `Armor Proficiency (X)` element is absent. "attack rolls" is the
    # global attack-bonus stat every attack power reads. Armor and shield
    # penalties are separate (they stack), per 4e. (Weapon non-proficiency —
    # losing the weapon's proficiency bonus — is handled by the engine, which
    # only adds the bonus for a trained weapon.) Cloth ("regular clothes or a
    # robe") and no armor need no proficiency, so they are never penalised.
    - { statadd: Reflex Defense, value: -2, wearing: "armor:leather", requires: "!Armor Proficiency (Leather)" }
    - { statadd: "attack rolls", value: -2, wearing: "armor:leather", requires: "!Armor Proficiency (Leather)" }
    - { statadd: Reflex Defense, value: -2, wearing: "armor:hide", requires: "!Armor Proficiency (Hide)" }
    - { statadd: "attack rolls", value: -2, wearing: "armor:hide", requires: "!Armor Proficiency (Hide)" }
    - { statadd: Reflex Defense, value: -2, wearing: "armor:chainmail", requires: "!Armor Proficiency (Chainmail)" }
    - { statadd: "attack rolls", value: -2, wearing: "armor:chainmail", requires: "!Armor Proficiency (Chainmail)" }
    - { statadd: Reflex Defense, value: -2, wearing: "armor:scale", requires: "!Armor Proficiency (Scale)" }
    - { statadd: "attack rolls", value: -2, wearing: "armor:scale", requires: "!Armor Proficiency (Scale)" }
    - { statadd: Reflex Defense, value: -2, wearing: "armor:plate", requires: "!Armor Proficiency (Plate)" }
    - { statadd: "attack rolls", value: -2, wearing: "armor:plate", requires: "!Armor Proficiency (Plate)" }
    - { statadd: Reflex Defense, value: -2, wearing: "armor:light shield", requires: "!Armor Proficiency (Light Shield)" }
    - { statadd: "attack rolls", value: -2, wearing: "armor:light shield", requires: "!Armor Proficiency (Light Shield)" }
    - { statadd: Reflex Defense, value: -2, wearing: "armor:heavy shield", requires: "!Armor Proficiency (Heavy Shield)" }
    - { statadd: "attack rolls", value: -2, wearing: "armor:heavy shield", requires: "!Armor Proficiency (Heavy Shield)" }

    # --- Skills: key-ability mod + half level + trained (+5). All 17 Orcus
    #     skills, so any class's class-skill list can be trained. ---
    - { statadd: Acrobatics, value: { abilmod: Dexterity } }
    - { statadd: Acrobatics, value: { statref: HALF-LEVEL } }
    - { statadd: Acrobatics, value: { statref: Acrobatics Trained } }
    - { statadd: Arcana, value: { abilmod: Intelligence } }
    - { statadd: Arcana, value: { statref: HALF-LEVEL } }
    - { statadd: Arcana, value: { statref: Arcana Trained } }
    - { statadd: Athletics, value: { abilmod: Strength } }
    - { statadd: Athletics, value: { statref: HALF-LEVEL } }
    - { statadd: Athletics, value: { statref: Athletics Trained } }
    - { statadd: Bluff, value: { abilmod: Charisma } }
    - { statadd: Bluff, value: { statref: HALF-LEVEL } }
    - { statadd: Bluff, value: { statref: Bluff Trained } }
    - { statadd: Diplomacy, value: { abilmod: Charisma } }
    - { statadd: Diplomacy, value: { statref: HALF-LEVEL } }
    - { statadd: Diplomacy, value: { statref: Diplomacy Trained } }
    - { statadd: Dungeoneering, value: { abilmod: Wisdom } }
    - { statadd: Dungeoneering, value: { statref: HALF-LEVEL } }
    - { statadd: Dungeoneering, value: { statref: Dungeoneering Trained } }
    - { statadd: Endure, value: { abilmod: Constitution } }
    - { statadd: Endure, value: { statref: HALF-LEVEL } }
    - { statadd: Endure, value: { statref: Endure Trained } }
    - { statadd: Heal, value: { abilmod: Wisdom } }
    - { statadd: Heal, value: { statref: HALF-LEVEL } }
    - { statadd: Heal, value: { statref: Heal Trained } }
    - { statadd: History, value: { abilmod: Intelligence } }
    - { statadd: History, value: { statref: HALF-LEVEL } }
    - { statadd: History, value: { statref: History Trained } }
    - { statadd: Insight, value: { abilmod: Wisdom } }
    - { statadd: Insight, value: { statref: HALF-LEVEL } }
    - { statadd: Insight, value: { statref: Insight Trained } }
    - { statadd: Intimidate, value: { abilmod: Charisma } }
    - { statadd: Intimidate, value: { statref: HALF-LEVEL } }
    - { statadd: Intimidate, value: { statref: Intimidate Trained } }
    - { statadd: Nature, value: { abilmod: Wisdom } }
    - { statadd: Nature, value: { statref: HALF-LEVEL } }
    - { statadd: Nature, value: { statref: Nature Trained } }
    - { statadd: Perception, value: { abilmod: Wisdom } }
    - { statadd: Perception, value: { statref: HALF-LEVEL } }
    - { statadd: Perception, value: { statref: Perception Trained } }
    - { statadd: Religion, value: { abilmod: Intelligence } }
    - { statadd: Religion, value: { statref: HALF-LEVEL } }
    - { statadd: Religion, value: { statref: Religion Trained } }
    - { statadd: Sleight of Hand, value: { abilmod: Dexterity } }
    - { statadd: Sleight of Hand, value: { statref: HALF-LEVEL } }
    - { statadd: Sleight of Hand, value: { statref: Sleight of Hand Trained } }
    - { statadd: Stealth, value: { abilmod: Dexterity } }
    - { statadd: Stealth, value: { statref: HALF-LEVEL } }
    - { statadd: Stealth, value: { statref: Stealth Trained } }
    - { statadd: Streetsmarts, value: { abilmod: Charisma } }
    - { statadd: Streetsmarts, value: { statref: HALF-LEVEL } }
    - { statadd: Streetsmarts, value: { statref: Streetsmarts Trained } }
    # Initiative = Dexterity modifier + Level Bonus (half level). Feat/other
    # bonuses (e.g. Improved Initiative) add on top.
    - { statadd: Initiative, value: { abilmod: Dexterity } }
    - { statadd: Initiative, value: { statref: HALF-LEVEL } }
    # Passive Perception / Insight = 10 + the skill's total. The statref pulls
    # the fully-computed skill value (ability mod + Level Bonus + training + any
    # feat/item bonus), so these track the skill and scale with level.
    - { statadd: Passive Perception, value: 10 }
    - { statadd: Passive Perception, value: { statref: Perception } }
    - { statadd: Passive Insight, value: 10 }
    - { statadd: Passive Insight, value: { statref: Insight } }

# Higher-level bootstraps. Each is added cumulatively (the engine processes
# ID_INTERNAL_LEVEL_1..N), so they apply *increments*: Level rises by 1 each
# level, and HALF-LEVEL (= Orcus's "Level Bonus", floor(level/2)) rises by +1 on
# even levels, +0 on odd. (Per-level HP comes from the class, scaled by the Level
# stat.) Per the Levels and Their Benefits table, characters also get:
#   - "Increase two by +1" ability bumps at 4, 8, 14, 18, 24 and 28 (a select);
#   - "Increase all by +1" at 11 and 21 (a granted bundle);
#   - a prestige path at 11 and an epic path at 21 (a select).
# Feats are modelled (content/orcus/feats.yaml); the level-1 + even-level feat
# slots all live in ID_INTERNAL_LEVEL_1 above, each gated by `level:`.
- id: ID_INTERNAL_LEVEL_2
  name: "2"
  type: Level
  rules:
    - { statadd: Level, value: 1 }
    - { statadd: HALF-LEVEL, value: 1 }

- id: ID_INTERNAL_LEVEL_3
  name: "3"
  type: Level
  rules:
    - { statadd: Level, value: 1 }

- id: ID_INTERNAL_LEVEL_4
  name: "4"
  type: Level
  rules:
    - { statadd: Level, value: 1 }
    - { statadd: HALF-LEVEL, value: 1 }
    - select:
        type: Level Ability Bonus
        number: 2
        category: ORCUS_LVLUP_4
        name: Ability Increase (Lv 4)

- id: ID_INTERNAL_LEVEL_5
  name: "5"
  type: Level
  rules:
