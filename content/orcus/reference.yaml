# --- Skill Training rows (grant +5 trained; tagged by class skill list) -------
# Only the Guardian's class skills are tagged ORCUS_GUARDIAN_SKILLS for the slice.
- id: ORCUS_TRAIN_ATHLETICS
  name: Athletics
  type: Skill Training
  categories: [ORCUS_GUARDIAN_SKILLS]
  rules:
    - statadd: Athletics Trained
      value: 5
      bonusType: trained
- id: ORCUS_TRAIN_ENDURE
