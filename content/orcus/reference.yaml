# --- Skill Training rows (grant +5 trained; tagged by class skill list) -------
# Tags: G = Guardian class skill, C = Commander class skill. Untagged skills are
# still pickable by category-less selects (e.g. the Sage crux's "extra skill").
- id: ORCUS_TRAIN_ACROBATICS
  name: Acrobatics
  type: Skill Training
  categories: [ORCUS_EXEMPLAR_SKILLS, ORCUS_REAPER_SKILLS]
  rules: [{ statadd: Acrobatics Trained, value: 5, bonusType: trained }]
- id: ORCUS_TRAIN_ARCANA
  name: Arcana
  type: Skill Training
  categories: [ORCUS_PRIEST_SKILLS]
