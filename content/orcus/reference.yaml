# Orcus foundational reference rows: sizes, vision, skills, skill-training, and
# ability-bonus plumbing. These are the lookup elements that grants/selects point
# at. Skill key abilities are from the Rulebook skill list.

# --- Sizes & vision -----------------------------------------------------------
- id: ORCUS_SIZE_MEDIUM
  name: Medium
  type: Size

- id: ORCUS_SIZE_SMALL
  name: Small
  type: Size

- id: ORCUS_VISION_NORMAL
  name: Normal
  type: Vision

- id: ORCUS_VISION_LOW-LIGHT
  name: Low-light
  type: Vision

- id: ORCUS_VISION_DARKVISION
  name: Darkvision
  type: Vision

# --- Ability-bonus rows (for ancestry "+2 to a chosen ability") ---------------
# The trio categories (ORCUS_ABILTRIO_*) let a species restrict its "pick two of
# three +2s" to a specific set of three abilities via a category-filtered select.
- id: ORCUS_ABILITY_STR
  name: "+2 Strength"
  type: Race Ability Bonus
  categories: [ORCUS_ABILTRIO_STR_CON_CHA, ORCUS_ABILTRIO_STR_CON_WIS, ORCUS_ABILTRIO_STR_CON_DEX, ORCUS_ABILTRIO_STR_INT_WIS]
  rules:
    - statadd: Strength
      value: 2
      bonusType: Ancestry
- id: ORCUS_ABILITY_CON
  name: "+2 Constitution"
  type: Race Ability Bonus
  categories: [ORCUS_ABILTRIO_STR_CON_CHA, ORCUS_ABILTRIO_CON_INT_WIS, ORCUS_ABILTRIO_STR_CON_WIS, ORCUS_ABILTRIO_CON_DEX_CHA, ORCUS_ABILTRIO_STR_CON_DEX]
  rules:
    - statadd: Constitution
      value: 2
      bonusType: Ancestry
- id: ORCUS_ABILITY_DEX
  name: "+2 Dexterity"
  type: Race Ability Bonus
  categories: [ORCUS_ABILTRIO_DEX_WIS_CHA, ORCUS_ABILTRIO_DEX_INT_CHA, ORCUS_ABILTRIO_CON_DEX_CHA, ORCUS_ABILTRIO_STR_CON_DEX, ORCUS_ABILTRIO_DEX_INT_WIS]
  rules:
    - statadd: Dexterity
      value: 2
      bonusType: Ancestry
- id: ORCUS_ABILITY_INT
  name: "+2 Intelligence"
  type: Race Ability Bonus
  categories: [ORCUS_ABILTRIO_CON_INT_WIS, ORCUS_ABILTRIO_DEX_INT_CHA, ORCUS_ABILTRIO_STR_INT_WIS, ORCUS_ABILTRIO_DEX_INT_WIS]
  rules:
    - statadd: Intelligence
      value: 2
      bonusType: Ancestry
- id: ORCUS_ABILITY_WIS
  name: "+2 Wisdom"
  type: Race Ability Bonus
  categories: [ORCUS_ABILTRIO_CON_INT_WIS, ORCUS_ABILTRIO_STR_CON_WIS, ORCUS_ABILTRIO_DEX_WIS_CHA, ORCUS_ABILTRIO_STR_INT_WIS, ORCUS_ABILTRIO_DEX_INT_WIS]
  rules:
    - statadd: Wisdom
      value: 2
      bonusType: Ancestry
- id: ORCUS_ABILITY_CHA
  name: "+2 Charisma"
  type: Race Ability Bonus
