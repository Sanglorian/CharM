# === Shadow Elf ===============================================================
- id: ORCUS_RACE_SHADOW_ELF
  name: Shadow Elf
  type: Race
  source: "Orcus Original"
  categories: [Medium]
  fields:
    Size: Medium
    Vision: Low-light
    "Ability Scores": "Pick two of +2 Dexterity, +2 Intelligence and +2 Wisdom"
    Description: >-
      Medium shadow humanoid Shadow elves are enigmatic beings from the Plane of
      Shadow, the descendents of refugees from the Seelie–Unseelie wars on the
      Plane of Faerie. They are known for their haunting beauty and inclination
      towards secrecy and intrigue.
    Speed: "6 squares."
    Languages: "You can speak, read, and write Common, Elven."
    "Minor Magics": "You know the ghost sound power from the Cantrips discipline."
    Trance: >-
      You don’t need to sleep. Instead, you meditate deeply, remaining
      semiconscious, for 4 hours a day. While meditating, you can dream after a
      fashion; such dreams are actually mental exercises that have become
      reflexive through years of practice. Your 4-hour trance has the same
      effect as a 6-hour long rest.
  rules:
    - grant: ORCUS_SIZE_MEDIUM
      type: Size
    - grant: ORCUS_VISION_LOW-LIGHT
      type: Vision
    - statadd: Speed
      value: 6
    - statadd: Language Count
      value: 2
    - statadd: Bluff
      value: +2
      bonusType: Ancestry
    - statadd: Insight
      value: +2
      bonusType: Ancestry
    - select:
