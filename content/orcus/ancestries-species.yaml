# Orcus species ancestries (Advanced Options). A species is selected in the Race
# slot *instead* of Humanity's crux + heritage. Each species grants size, vision,
# speed, fixed skill bonuses, a "pick two of three" ability-score select (filtered
# by an ORCUS_ABILTRIO_* category from reference.yaml) and one or more powers.
#
# Conditional / always-on traits that don't map to a single stat (resistances,
# natural weapons, fly/swim speeds, etc.) are recorded in descriptive fields so
# they surface on the sheet without inventing stats the engine can't apply.

# === Apefolk ==================================================================
- id: ORCUS_RACE_APEFOLK
  name: Apefolk
  type: Race
  source: "Orcus Original"
  categories: [Medium]
  fields:
    Size: Medium
    Vision: Normal
    "Ability Scores": "Pick two of +2 Strength, +2 Constitution and +2 Charisma"
    Description: >-
      Medium natural humanoid Apefolk are humanoids reminiscent of humankind’s
      closest relatives: gorillas, orang utans and chimpanzees. Most apefolk
      take a particular pride in legacy and enduring might: memorizing their
      genealogy, celebrating the history of their centuries-old city-states and
      seeking personal glory.
    Speed: "6 squares."
    Languages: >-
      You can speak, read, and write Common and one extra language of your
      choice..
    "Heart of the Legion": >-
      When adjacent to at least two allies, you receive a +1 power bonus to all
      defenses.
  rules:
    - grant: ORCUS_SIZE_MEDIUM
      type: Size
    - grant: ORCUS_VISION_NORMAL
      type: Vision
    - statadd: Speed
      value: 6
    - statadd: Language Count
      value: 2
    - statadd: Diplomacy
      value: +2
      bonusType: Ancestry
    - statadd: Religion
      value: +2
      bonusType: Ancestry
    - select:
        type: Race Ability Bonus
        number: 2
        category: ORCUS_ABILTRIO_STR_CON_CHA
        name: Apefolk Ability Scores
    - select:
        type: Power
        number: 1
        category: ORCUS_APEFOLK_POWER
        name: Apefolk Power

- id: ORCUS_POWER_CULL_THE_WEAK
  name: Cull the Weak
  type: Power
  source: "Orcus Original"
  categories: [feature, ORCUS_APEFOLK_POWER]
  fields:
    Level: "Feature"
    "Power Usage": "Encounter"
    "Power Type": "Attack"
    "Action Type": "Standard Action"
    Target: "Self"
    Effect: "Make two basic attacks against a staggered target."
- id: ORCUS_POWER_RALLY_THE_TROOPS
  name: Rally the Troops
  type: Power
  source: "Orcus Original"
  categories: [feature, ORCUS_APEFOLK_POWER]
  fields:
    "Power Usage": "Encounter"
    "Power Type": "Utility"
    "Action Type": "Swift Action"
    Target: "Near burst 5, one ally"
    Effect: >-
      The target can take the rally action as a free action, if they are
      eligible to do so.
    Special: >-
      This does not count against the maximum number of times a character can
      use the rally action in an encounter.
# === Automaton ===============================================================
- id: ORCUS_RACE_AUTOMATON
  name: Automaton
  type: Race
  source: "Orcus Original"
  categories: [Medium]
  fields:
    Size: Medium
    Vision: Normal
    "Ability Scores": "Pick two of +2 Constitution, +2 Intelligence and +2 Wisdom"
    Description: >-
      Medium natural automaton (construct) Created beings of brass, clockwork
      and a pinch of sorcery, the automatons are a relatively new people, one
      still finding their place in the world.
    Speed: "6 squares."
    Languages: >-
      You can speak, read, and write Common and one extra language of your
      choice..
    "Relentless Endurance": >-
      The first time in an encounter that you are staggered, you gain temporary
      HP equal to your level.
    "Made of Metal": >-
      You do not make death saving throws. You still die if reduced to negative
      hit points equal to your maximum hit points. You do not sleep, breathe,
      eat or drink.
  rules:
    - grant: ORCUS_SIZE_MEDIUM
      type: Size
    - grant: ORCUS_VISION_NORMAL
      type: Vision
    - statadd: Speed
      value: 6
    - statadd: Language Count
      value: 2
    - statadd: Endure
      value: +2
      bonusType: Ancestry
    - statadd: History
      value: +2
      bonusType: Ancestry
    - select:
        type: Race Ability Bonus
        number: 2
        category: ORCUS_ABILTRIO_CON_INT_WIS
        name: Automaton Ability Scores
    - grant: ORCUS_POWER_INGENUITY
      type: Power

