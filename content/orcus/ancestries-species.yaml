# === Mephit ===================================================================
- id: ORCUS_RACE_MEPHIT
  name: Mephit
  type: Race
  source: "Orcus Original"
  categories: [Small]
  fields:
    Size: Small
    Vision: Darkvision
    "Ability Scores": "Pick two of +2 Dexterity, +2 Intelligence and +2 Charisma"
    Description: >-
      Small elemental humanoid (air, cold, earth, fire) Mephits are small,
      winged imps from the elemental planes. They are mischevious and clever,
      and often talkative to a fault among strangers and friends alike. Mephits
      delight in wallowing in the element with which they are associated. Air
