# === Half-Giant ===============================================================
- id: ORCUS_RACE_HALF_GIANT
  name: Half-Giant
  type: Race
  source: "Orcus Original"
  categories: [Medium]
  fields:
    Size: Medium
    Vision: Normal
    "Ability Scores": "Pick two of +2 Strength, +2 Constitution and +2 Wisdom"
    Description: >-
      Medium natural humanoid (giant) Half-giants typically stand from 7 feet to
      nearly 8 feet tall. Despite their name, they are their own people and not
      the product of relations between giants and other humanoids. Half-giants
      tend to be proud, and see themselves as natural leaders.
    Speed: "6 squares."
    Languages: "You can speak, read, and write Common, Giant."
    "Powerful Build": >-
      You have a +2 ancestry bonus to checks to escape a grapple. When you are
      the target of any attack or power that has a different effect based on the
      target’s size, you may choose to be treated as size Large instead of size
      Medium for the purposes of that attack.
    Unmoved: >-
      You may reduce any unwilling movement you are subject to by 1 square. When
      you would fall prone as the result of an attack, make a saving throw – on
      a success, you do not fall.
  rules:
    - grant: ORCUS_SIZE_MEDIUM
      type: Size
    - grant: ORCUS_VISION_NORMAL
      type: Vision
    - statadd: Speed
      value: 6
    - statadd: Language Count
      value: 2
    - statadd: Athletics
      value: +2
      bonusType: Ancestry
    - statadd: Diplomacy
      value: +2
      bonusType: Ancestry
    - select:
        type: Race Ability Bonus
        number: 2
        category: ORCUS_ABILTRIO_STR_CON_WIS
        name: Half-Giant Ability Scores
    - grant: ORCUS_POWER_STOMP
      type: Power

