# Elemental Flux energy choice (Orcus Classes and Powers, Elemental Flux note:
# "When you first gain a power with the Flux tag, choose an element: lightning,
# acid, cold, fire or thunder."). Modeled as a 1-of-5 selectable Class Feature.
# The "Flux Energy" select (in _internal/level.yaml) is gated on the
# "Elemental Flux Access" marker, so it appears for ANY source of Elemental Flux
# — the Mageblade class, or a kit/feat that grants the marker — not just one
# class. The chosen energy is what a power's [flux] token resolves to.

# Granted by anything that gives Elemental Flux access (class, kit, or feat).
- id: ORCUS_MARKER_FLUX_ACCESS
  name: "Elemental Flux Access"
  type: Marker
  source: "Orcus Original"

- id: ORCUS_FLUX_LIGHTNING
  name: "Flux Energy: Lightning"
  type: Class Feature
  source: "Orcus Original"
  categories: [ORCUS_FLUX_ENERGY]
  fields: { "Flux Energy": Lightning }

- id: ORCUS_FLUX_ACID
  name: "Flux Energy: Acid"
  type: Class Feature
  source: "Orcus Original"
  categories: [ORCUS_FLUX_ENERGY]
  fields: { "Flux Energy": Acid }

- id: ORCUS_FLUX_COLD
  name: "Flux Energy: Cold"
  type: Class Feature
  source: "Orcus Original"
  categories: [ORCUS_FLUX_ENERGY]
  fields: { "Flux Energy": Cold }

- id: ORCUS_FLUX_FIRE
  name: "Flux Energy: Fire"
  type: Class Feature
  source: "Orcus Original"
  categories: [ORCUS_FLUX_ENERGY]
  fields: { "Flux Energy": Fire }

- id: ORCUS_FLUX_THUNDER
  name: "Flux Energy: Thunder"
  type: Class Feature
  source: "Orcus Original"
  categories: [ORCUS_FLUX_ENERGY]
  fields: { "Flux Energy": Thunder }
