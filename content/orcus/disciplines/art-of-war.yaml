- id: ORCUS_POWER_COUNTER_SURGE
  name: Counter-Surge
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_ART_OF_WAR, utility]
  fields:
    Level: "2"
    "Power Usage": Daily
    "Power Type": Utility
    "Action Type": Reaction Action
    Keywords: Martial
    Target: Self
    Trigger: "You take damage from a melee or ranged attack."
    Effect: "You gain temporary hit points equal to the damage dealt (to a maximum of your recovery value)."
    Flavor: "An opponent strikes you with an attack. You take the impact and channel it into strength."

# --- Higher-level powers (to populate the level 4-30 class selects) ------------
- id: ORCUS_POWER_ALL_OR_NOTHING
  name: All or Nothing
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_ART_OF_WAR, daily, ability-swap]
  fields:
    Level: "5"
    "Power Usage": Daily
    "Power Type": Attack
    "Action Type": Free Action
    Keywords: Martial
    Target: Self
    Trigger: "You hit an enemy."
    Effect: >
      The target takes 2dW extra damage from the triggering attack and is knocked
      prone. Boost (Level 15): the target takes 3dW extra damage and is knocked prone.
    Flavor: "You strike so fast, both attacks are literally too close to distinguish."

