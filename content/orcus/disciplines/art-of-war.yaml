# The Art of War discipline (Guardian / Worships the God of War). Powers carry a
# real `Level` field (the engine's category level filter is `level <= N` against
# that field) and are tagged [disciplineId, <frequency>] where frequency is one
# of at-will / encounter / daily for ATTACK powers, or `utility` for utility
# powers — so attack selects never pull in utilities. Levels 1-3 transcribed.

- id: ORCUS_DISCIPLINE_ART_OF_WAR
  name: Art of War
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": Strength
    "Secondary Ability": Dexterity
    Sources: "Guardian (class), Worships the God of War (kit)"
    Description: "You are a highly effective fighter who takes advantage of any weakness left by your enemy."

# --- At-Will attack powers (level 1) ------------------------------------------
- id: ORCUS_POWER_PASSING_KILL
  name: Passing Kill
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_ART_OF_WAR, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Swift Action
    Keywords: "Martial, Weapon"
    Target: "Melee or Ranged weapon, one creature"
    Attack: "Dexterity (ranged) or Strength (melee) vs AC"
    Hit: "1 point of damage."
    Special: "At 21st level, you can make two attacks."
    Flavor: "A mere low-level thug blocks your path. You don't even give them the luxury of losing momentum."

- id: ORCUS_POWER_SWIFT_STRIKE
  name: Swift Strike
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_ART_OF_WAR, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: "Martial, Weapon"
    Target: "Melee or Ranged weapon, one creature"
    Attack: "Dexterity (ranged) or Strength (melee) vs AC"
    Hit: "Dexterity (ranged) or Strength (melee) modifier damage, and the target is dazed until the start of your next turn."
    Flavor: "You find a split-second opening and deliver the attack, hoping to hold the enemy back."

# --- Encounter attack powers --------------------------------------------------
- id: ORCUS_POWER_IN_THEIR_FACE
