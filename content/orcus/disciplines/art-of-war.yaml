# --- Daily attack power (level 1) ---------------------------------------------
- id: ORCUS_POWER_THE_FINISHER
  name: The Finisher
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_ART_OF_WAR, daily, "1"]
  fields:
    "Power Usage": Daily
    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: "Consistent, Martial, Weapon"
    Target: "Melee or Ranged weapon, one creature"
    Attack: "Dexterity (ranged) or Strength (melee) vs AC"
    Hit: "3dW + Dexterity (ranged) or Strength (melee) modifier damage."
    Flavor: "You hit hard. That's it. That's enough."

# --- Utility powers (level 2) -------------------------------------------------
- id: ORCUS_POWER_HERON_DEFENSE
  name: Heron Defense
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_ART_OF_WAR, at-will, utility, "2"]
  fields:
    "Power Usage": At-Will
    "Power Type": Utility
    "Action Type": Move Action
    Keywords: Martial
    Target: Self
    Effect: "You do not grant combat advantage until the start of your next turn."
    Flavor: "Your enemy tries to find a weakness. It finds none."

- id: ORCUS_POWER_COUNTER_SURGE
  name: Counter-Surge
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_ART_OF_WAR, daily, utility, "2"]
  fields:
    "Power Usage": Daily
    "Power Type": Utility
    "Action Type": Reaction Action
    Keywords: Martial
    Target: Self
    Trigger: "You take damage from a melee or ranged attack."
    Effect: "You gain temporary hit points equal to the damage dealt (to a maximum of your recovery value)."
    Flavor: "An opponent strikes you with an attack. You take the impact and channel it into strength."
