# The Golden Lion discipline (Commander). An inspiring front-line leader who
# multiplies the value of fighting alongside allies. Same tagging contract as the
# other disciplines: [disciplineId, <frequency>] (+ `ability-swap` on powers that
# make the character's own attack) with a real Level field. This discipline is
# transcribed in FULL: every published power, levels 1-29. (The class power
# selects only reach some of these; the higher-level encounter/daily attacks are
# the pool for the optional power-replacement swaps at levels 13/15/17/...)

- id: ORCUS_DISCIPLINE_GOLDEN_LION
  name: Golden Lion
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": Strength
    "Secondary Ability": Charisma
    Sources: "Commander (class)"
    Description: "You are an inspiring leader who throws themselves into the thick of battle."

# --- At-Will attack power (level 1) -------------------------------------------
- id: ORCUS_POWER_PACK_POUNCE
  name: Pack Pounce
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_GOLDEN_LION, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: "Martial, Weapon"
    Target: "Melee or Ranged weapon, one target"
    Attack: "Strength vs AC"
    Hit: >
      1dW + Strength modifier damage, +2 for every ally that is adjacent to the
      target. Level 21: 2dW + Strength modifier damage, +4 for every ally that is
      adjacent to the target.
    Flavor: "By capitalizing on the opportunities granted by your attacking allies, your lethality increases dramatically through your knowledge of pack tactics."

