  categories: [ORCUS_DISCIPLINE_GOLDEN_LION, utility]
  fields:
    Level: "2"
    "Power Usage": Encounter
    "Power Type": Utility
    "Action Type": Swift Action
    Keywords: Martial
    Target: "Melee touch, one ally"
    Effect: "The target can take a move action right away."
    Flavor: "With a watchful eye on the flow of combat, you know when to spur an ally into a better position."

