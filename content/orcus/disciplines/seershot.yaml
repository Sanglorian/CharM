# Seershot discipline (Reaper). A keen, measured sharpshooter — single-target
# precision (contrast Starfall's area control). Key Dexterity / secondary Wisdom.
# Same tagging contract. Levels 1-16 transcribed.

- id: ORCUS_DISCIPLINE_SEERSHOT
  name: Seershot
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": Dexterity
    "Secondary Ability": Wisdom
    Sources: "Reaper (class)"
    Description: "You are a keen, measured sharpshooter."

