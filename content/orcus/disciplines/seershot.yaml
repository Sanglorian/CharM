    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: "Martial, Weapon"
    Target: "Ranged weapon, one creature"
    Attack: "Dexterity vs AC"
    Hit: "1dW + Dexterity modifier damage and choose one: the target is slowed until the end of your next turn, or suffers -2 to defenses until the end of your next turn. Level 21: 2dW."

- id: ORCUS_POWER_SNAP_SHOT
  name: Snap-Shot
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_SEERSHOT, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: "Martial, Weapon"
    Target: "Ranged weapon, one creature"
    Attack: "Dexterity vs AC"
    Hit: "1dW + Dexterity modifier damage and choose one: the target is marked until the end of your next turn, or is knocked prone. Level 21: 2dW."
    Special: "If a creature you marked with snap-shot attacks without including you, you may make a snap-shot against it as a counter."

