# Cantrips discipline — generated verbatim from the source book by
# tools/CharM.Orcus.Import (do not hand-edit the text fields). Engine
# semantics (id/type/categories/level) are derived mechanically.

- id: ORCUS_DISCIPLINE_CANTRIPS
  name: "Cantrips"
  type: Discipline
  source: "Orcus Original"
  fields:
    Sources: "Heir (crux), Magician (class), Cantrip Master (feat)"
    Description: "You have mastered minor magics."
    Note: >-
      The Cantrips “discipline” is a collection of powers that can be selected
      by characters with the Cantrips feat. As such, it does not have a key or
      secondary ability.

- id: ORCUS_POWER_CHILL_SPIRIT
  name: "Chill Spirit"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_CANTRIPS, utility]
  fields:
    Level: "Feature"
    "Power Usage": "At-Will"
    "Power Type": "Utility"
    "Action Type": "Standard Action"
    Keywords: "Arcane, Cold"
    Target: "Self"
    Effect: >-
      Use this power to accomplish one of the effects given below, or an
      equivalent with the GM’s approval. Continuing effects persist until the
      end of your next turn. ● Extinguish a flame no larger than one square or
      cool up to one square of a hot surface so that it can be safely touched. ●
      Freeze a gallon of water (other liquids may be affected at different
      volumes, at the GM’s discretion). This effect can be maintained on
      successive turns to affect larger bodies of water: it requires two turns
      to freeze one full square, and each subsequent turn increases the size of
      the affected area by burst 1. ● Create an ice cube in your hand (size
      dependent on ambient moisture), or give an enemy an uncomfortable and
      distracting freezer burn if used in combat. ● Chill food to a desired
      temperature.
    Maintain: >-
      Swift The effect persists until the end of your next turn. After you stop
      maintaining this power, things warm and ice melts out over time according
      to ambient conditions.

- id: ORCUS_POWER_FIERY_SPIRIT
  name: "Fiery Spirit"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_CANTRIPS, utility]
  fields:
    Level: "Feature"
    "Power Usage": "At-Will"
    "Power Type": "Utility"
    "Action Type": "Standard Action"
    Keywords: "Arcane, Fire"
    Target: "Self"
    Effect: >-
      Use this power to accomplish one of the effects given below, or an
      equivalent with the GM’s approval. Continuing effects persist until the
      end of your next turn. ● You can cajole, bully and bribe fire as if it
      were a person. ● You can heat things by concentrating on them. ● You can
      start a fire by clicking your fingers. ● You can burn small objects to
      provide yourself with sustenance. ● Light something easily flammable, such
      as gasoline, paper, or gunpowder. ● Boil a gallon of water (other liquids
      may be affected at different volumes, at the GM’s discretion). This effect
      can be maintained on successive turns to affect larger bodies of water: it
      requires two turns to boil one full square, and each subsequent turn
      increases the size of the affected area by burst 1. ● Create a flame in
      your hand. It can produce uncomfortable and distracting burns if used in
      combat but does not inflict any damage. ● Cook food to a desired
      temperature.
    Maintain: >-
      Swift The effect persists until the end of your next turn. After you stop
      maintaining this power, heat dissipates and fires burn out over time
      according to ambient conditions.

- id: ORCUS_POWER_FRIENDLY_ZEPHYR
  name: "Friendly Zephyr"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_CANTRIPS, utility]
  fields:
    Level: "Feature"
    "Power Usage": "At-Will"
    "Power Type": "Utility"
    "Action Type": "Standard Action"
    Keywords: "Arcane, Air"
    Target: "Ranged 20"
    Effect: >-
      You may do to one target in the area one of the following: ● Shunt a Tiny
      object 10 squares, a Small object 5 squares, a Medium object 2 squares or
      a Large object 1. ● Hear what a creature says this round as if you were
      standing right beside them. ● Moisten a creature, giving it resistance to
      fire 5 until the end of your next turn.
    Maintain: "Swift Repeat the effect."

- id: ORCUS_POWER_GHOST_SOUND
  name: "Ghost Sound"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_CANTRIPS, utility]
  fields:
    Level: "Feature"
    "Power Usage": "At-Will"
    "Power Type": "Utility"
    "Action Type": "Standard Action"
    Keywords: "Illusion"
    Target: "Ranged 10, one object or empty square"
    Effect: >-
      Create a sound that rises, recedes, approaches, or remains at a fixed
      place. You choose what type of sound when spending the standard action to
      create it. You must use another standard action to change the sound’s
      basic character. You can produce as much noise as a person. The noise can
      be virtually any type of sound within the volume limit. The noise persists
      until the end of your next turn.
    Maintain: "Swift The effect persists until the end of your next turn."

