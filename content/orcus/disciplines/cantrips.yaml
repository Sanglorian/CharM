- id: ORCUS_POWER_DOUBLE_DIMENSION
  name: "Double Dimension"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_CANTRIPS, utility]
  fields:
    Level: "Feature"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Standard Action"
    Keywords: "Arcane"
    Target: "Melee touch, one item"
    Effect: >-
      You make an item two times longer, two times wider and two times deeper on
      the inside than it is on the outside, until your next long rest. At that
      point, if the contents of the item are too large to be contained by it,
      all the contents are emptied out of the item just beside it.

- id: ORCUS_POWER_SHELTERING_LAMP
  name: "Sheltering Lamp"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_CANTRIPS, utility]
  fields:
    Level: "Feature"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Counter Action"
    Keywords: "Arcane, Transmutation"
    Target: "Self"
    Requirements: "You are hit by an attack, or as a standard action at any time."
    Effect: >-
      Spend a recovery. You take the form of a lamp, bottle or other small
      container. In this form you have your defenses, but cannot take any
      actions other than a swift action to end this power. The bottle has HP
      equal to your recovery value - minus whatever damage is done by the
      triggering attack, if any. If the bottle is destroyed, you take any excess
      damage yourself and appear in the space the bottle occupied.
    Special: "You can take a long rest while in lamp form."

- id: ORCUS_POWER_STOW
  name: "Stow"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_CANTRIPS, utility]
  fields:
    Level: "Feature"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Swift Action"
    Keywords: "Arcane"
    Target: "Melee touch, one item of your size or smaller"
    Effect: >-
      An item you are holding disappears. It reappears in your hands the next
      time that you take a long rest. If you are reduced to 0 HP or below, it
      appears immediately in an unoccupied square adjacent to you. The item does
      not weigh anything while stowed.

