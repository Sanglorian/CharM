  categories: [ORCUS_DISCIPLINE_THIRD_MIND, daily, ability-swap]
  fields:
    Level: "1"
    "Power Usage": "Daily"
    "Power Type": "Attack"
    "Action Type": "Standard Action"
    Keywords: "Augmentable, Aura, Phrenic, Focus, Psychic"
    Target: "Near burst 1, all creatures"
    Effect: >-
      Allies that begin their turn inside the aura gain a +2 power bonus to
      their next attack roll. Enemies inside the aura have vulnerability to all
      damage 2. Special—Augment: As a standard action, make a Wisdom vs Will
