- id: ORCUS_POWER_AURA_OF_MENDING
  name: "Aura of Mending"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_THIRD_MIND, utility]
  fields:
    Level: "6"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Swift Action"
    Keywords: "Augmentable, Aura, Phrenic, Healing"
    Target: "Near burst 2, all allies"
    Effect: >-
      Every ally inside the aura at the start of their turn gains regeneration
