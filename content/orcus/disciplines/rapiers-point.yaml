- id: ORCUS_DISCIPLINE_RAPIERS_POINT
  name: "Rapier's Point"
  type: Discipline
  source: "Orcus Original"
  fields:
    "Key Ability": "Dexterity"
    "Secondary Ability": "Charisma"
    Sources: "Exemplar (class)"
    Description: >-
      You are a graceful, skilled duelist. If you do gain momentum from a power,
      the same rule for losing momentum applies as for the Exemplar: you lose it
      if you are hit by any attack.
    Note: >-
      Other than the powers of the Rapier’s Point and Blades in the Dark
      Discipline, the main ways to gain momentum are the features of the
      Exemplar class. Powers that involve momentum may be of limited use to
      non-Exemplars.

