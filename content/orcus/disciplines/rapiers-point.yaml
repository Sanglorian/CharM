# Rapier's Point discipline (Exemplar). A graceful duelist's powers. Key ability
# Dexterity (Exemplar class key). Same tagging contract as the other disciplines:
# [disciplineId, <frequency>] (+ `ability-swap` on the character's own attacks).
# Levels 1-10 transcribed (enough for the full class power progression).

- id: ORCUS_DISCIPLINE_RAPIERS_POINT
  name: Rapier's Point
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": Dexterity
    "Secondary Ability": Charisma
    Sources: "Exemplar (class)"
    Description: "You are a graceful, skilled duelist."

