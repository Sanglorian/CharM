# Elemental Flux discipline — generated verbatim from the source book by
# tools/CharM.Orcus.Import (do not hand-edit the text fields). Engine
# semantics (id/type/categories/level) are derived mechanically.

- id: ORCUS_DISCIPLINE_ELEMENTAL_FLUX
  name: "Elemental Flux"
  type: Discipline
  source: "Orcus Original"
  fields:
    "Key Ability": "Intelligence"
    "Secondary Ability": "Constitution"
    Sources: "Mageblade (class)"
    Description: >-
      You supplement your attacks with powerful elemental energies. When a power
      refers to [flux], it always means your current flux energy, even if you
      used the power when your flux energy was different. For example, if you
      conjured a vortex devil, it does damage of your current flux energy not
      the flux energy you had when you conjured it.
    Note: >-
      When you first gain a power with the Flux tag, choose an element:
      lightning, acid, cold, fire or thunder. All powers with the Flux tag have
      that energy as a tag, and replace any reference to [flux] in the power
      text with that energy. There are some powers that allow you to change your
      Flux energy, if you take them. You can also change your Flux energy when
      you retrain at a new level. Some classes interact with Flux powers in
      other ways.

