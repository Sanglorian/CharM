# Cup of Brimstone discipline (Magician / Conjures Fiends kit). Demonic attacks
# and fiend summons. Key Charisma / secondary Constitution; the Magician's class
# key (Intelligence) substitutes via `ability-swap`. Implement/Focus powers
# (fixed dice + ability mod). Levels 1-10 transcribed (summon stat blocks omitted).

- id: ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE
  name: Cup of Brimstone
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": Charisma
    "Secondary Ability": Constitution
    Sources: "Magician (class); Conjures Fiends (kit)"
    Description: "You call on demonic forces for your attacks, and summon fiends to fight for you."

