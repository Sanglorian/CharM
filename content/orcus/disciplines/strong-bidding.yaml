- id: ORCUS_POWER_COMPANION_FORM
  name: "Companion Form"
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_STRONG_BIDDING, utility]
  fields:
    Level: "10"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Swift Action"
    Keywords: "Spirit, Form"
    Target: "Self"
    Effect: >-
      You take the form of your companion, including size, source and type,
      senses and speed. You can also spend one recovery to heal your recovery
      value. While in this form you cannot use powers unless they have the Wild
      Shape tag. You can leave this form as a swift action, and you do so
      automatically if you are reduced to 0 HP or below. Otherwise, it lasts
      until you take a long rest.

