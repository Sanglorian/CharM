- id: ORCUS_DISCIPLINE_STRONG_BIDDING
  name: "Strong Bidding"
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": "Charisma"
    "Secondary Ability": "Wisdom"
    Sources: "Sylvan (class), Binds Familiar (kit)"
    Description: >-
      You share a special bond with your companion that allows you to fight as
      one.
    Note: >-
      “Companion” refers to a familiar, animal companion or summoned creature.
      Unless otherwise mentioned, your companion must be within line of sight or
      20 squares for a Strong Bidding power that uses your companion.

