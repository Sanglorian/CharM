- id: ORCUS_POWER_SHARE_SENSES
  name: "Share Senses"
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_STRONG_BIDDING, utility]
  fields:
    Level: "2"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Swift Action"
    Keywords: "Spirit, Companion"
    Effect: >-
      Until the end of your next turn, you can use any or all of your
      companion’s senses as your own, gaining the benefits of any special senses
      that it has. During this time, you lose any of the senses that you take
      from your companion, but retain your other senses as normal. For example,
      you could share your companion’s sight, but keep your hearing.
    Maintain: "Swift The effect persists until the end of your next turn."
    Boost: "Level 16 This becomes an encounter power."

