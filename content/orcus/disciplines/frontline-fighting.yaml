# Frontline Fighting discipline (Sylvan). Knock-down, drag-out brawler powers
# mixing weapon blows and haymakers. Key ability Strength, secondary Constitution.
# The Sylvan's class key (Strength) substitutes via the `ability-swap` tag on
# attack powers. Levels 1-29 transcribed (full class power progression).

- id: ORCUS_DISCIPLINE_FRONTLINE_FIGHTING
  name: Frontline Fighting
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": Strength
    "Secondary Ability": Constitution
    Sources: "Sylvan (class)"
    Description: "You are a knock-down, drag-out battler, happy to mix haymakers with weapon blows."

# --- At-Will attack powers (level 1) ------------------------------------------
- id: ORCUS_POWER_ROPE_A_DOPE
  name: Rope-A-Dope
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_FRONTLINE_FIGHTING, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: "Martial, Weapon"
    Target: "Melee weapon, one creature"
    Attack: "Strength vs AC"
    Hit: "1dW + Strength modifier damage. Level 21: 2dW + Strength modifier."
    Effect: "Shift to any square adjacent to the target. You either push the target 1 square or shunt it into the square you just occupied."

- id: ORCUS_POWER_UNBALANCING_STRIKE
