# Last Laugh discipline (Harlequin / Dabbles in Harlequinry kit). A slippery,
# taunting combatant who fools even skeptical foes — mostly Charisma vs Will
# Psychic control powers. Key ability Charisma, secondary Dexterity. Same tagging
# contract: Attack powers also carry the `ability-swap` tag. Levels 1-29
# transcribed (the full Harlequin class power progression).

- id: ORCUS_DISCIPLINE_LAST_LAUGH
  name: Last Laugh
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": Charisma
    "Secondary Ability": Dexterity
    Sources: "Harlequin (class); Dabbles in Harlequinry (kit)"
    Description: "You are a slippery, taunting combatant who can fool even skeptical foes."

# --- At-Will attack powers (level 1) ------------------------------------------
- id: ORCUS_POWER_BITING_TAUNT
  name: Biting Taunt
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_LAST_LAUGH, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Swift Action
    Keywords: "Martial, Stance"
    Target: Self
    Effect: "When you enter this stance, you may mark one creature within 10 squares. While you are in this stance, creatures you have marked do half damage on any attack that does not include you as a target."

- id: ORCUS_POWER_FAILURE_TO_COMMUNICATE
  name: Failure to Communicate
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_LAST_LAUGH, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: "Martial, Weapon"
    Target: Self
    Effect: "Make a basic attack. After the attack, you can shift a square."
    Special: "If the creature you attacked as part of this action misses you with an attack before the start of your next turn, you can make a basic attack against it as a reaction."

- id: ORCUS_POWER_TRICKY_TAUNT
  name: Tricky Taunt
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_LAST_LAUGH, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Swift Action
    Keywords: "Martial, Stance"
    Target: Self
    Effect: "When you enter this stance, you may mark one creature within 10 squares. While you are in this stance, creatures you have marked provoke an opportunity attack from you if they miss you with an attack. You can make basic ranged attacks for opportunity attacks triggered by this power."

- id: ORCUS_POWER_WHO_ME
  name: Who, Me?
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_LAST_LAUGH, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Move Action
    Keywords: "Martial, Psychic"
    Target: "Near burst 10, three creatures not within 3 of you"
    Attack: "Charisma +2 vs Will"
    Hit: "The target cannot make melee or ranged attacks against you until the start of your next turn. If you mark or inflict damage on the target, the effect ends and the target is immune to this power until the end of the encounter."

