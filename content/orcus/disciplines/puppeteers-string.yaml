# Puppeteer's String discipline (Magician / Worships the God of Tyranny kit).
# Enchant, influence and dominate. Key Wisdom / secondary Charisma; the Magician's
# class key (Intelligence) substitutes via `ability-swap`. Implement/Focus powers.
# Levels 1-7 transcribed (a strong control toolkit; many powers have no damage).

- id: ORCUS_DISCIPLINE_PUPPETEERS_STRING
  name: Puppeteer's String
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": Wisdom
    "Secondary Ability": Charisma
    Sources: "Magician (class); Worships the God of Tyranny (kit)"
    Description: "You can enchant, influence and dominate the weaker-willed."

