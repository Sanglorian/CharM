- id: ORCUS_POWER_PERSONALITY_MANIPULATION
  name: "Personality Manipulation"
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_PUPPETEERS_STRING, daily, ability-swap]
  fields:
    Level: "29"
    "Power Usage": "Daily"
    "Power Type": "Attack"
    "Action Type": "Standard Action"
    Keywords: "Arcane, Charm, Consistent, Focus, Psychic"
    Target: "Near burst 5, one creature"
    Attack: "Wisdom vs Will"
    Hit: >-
      You rewrite the target’s personality so that it is convinced you and your
      allies are its allies until the end of your next turn. You have no direct
      control over the target but are able to give it instructions which it will
      try to follow to the best of its abilities.
    Maintain: >-
      Move Repeat the attack against the same target. You can continue to
      maintain even after the encounter ends. While you are not in an encounter,
      each time you maintain this power, the effect remains for one day.
    Flavor: >-
      Until now, everything you have done has been temporary. People would wake
      up and feel the fool. Now, there is nothing holding you back … this is
      that moment where you need to decide which side you’re really on.

