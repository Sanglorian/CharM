- id: ORCUS_POWER_TRANSPLANT_SENSES
  name: "Transplant Senses"
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_PUPPETEERS_STRING, encounter, ability-swap]
  fields:
    Level: "17"
    "Power Usage": "Encounter"
