    Target: "Ranged 20, one creature"
    Attack: "Wisdom vs Will"
    Hit: >-
      Until the start of your next turn, you either look through the targets
      eyes or you force the target to see what you see. While looking through
      the target’s eyes, you may choose whether or not the target is aware of
      your use of this power. While looking through the target’s eyes, you grant
