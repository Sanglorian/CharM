- id: ORCUS_POWER_DREAMTRANCER
  name: "Dreamtrancer"
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_PUPPETEERS_STRING, utility]
  fields:
    Level: "2"
    "Power Usage": "At-Will"
    "Power Type": "Utility"
    "Action Type": "Standard and Move Action"
    Keywords: "Arcane, Psychic"
    Target: "Unlimited one unconscious creature you have met"
    Effect: >-
      You enter the target’s dream until the start of your next turn. You can
      communicate with the target, convince it you are real or not. Once on your
      turn, make a Wisdom vs Will attack if you wish to take control of the
      dream: otherwise, you can only control your dream body and anything you
      can directly affect with it. If you take control of the dream, the target
      can attempt a Wisdom or Charisma vs Will attack at the start of its next
      turn to regain control. If you inflict harm on the target or the target
      inflicts harm on itself, it wakes up: however, if you are in control of
      the dream, the target can only harm itself if you wish it. While you are
      in the dream, you can take no actions outside of it. If you suffer damage
      in reality, the effect ends.
    Maintain: >-
      Free The effect persists until the start of your next turn. You cannot
      maintain if the target wakes up.
    Flavor: >-
      You move through the netherscape of untapped subconscious to communicate
      with someone else.

- id: ORCUS_POWER_IMPRINT
  name: "Imprint"
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_PUPPETEERS_STRING, utility]
  fields:
    Level: "2"
    "Power Usage": "At-Will"
    "Power Type": "Utility"
    "Action Type": "Standard Action"
    Keywords: "Arcane, Illusion"
    Target: "Melee touch, one tiny object"
    Effect: >-
      You make one object look like something else of the same approximate size
      and shape. The illusion only affects the object’s visual qualities.
      Observers can make a Perception check opposed by your Bluff check to
      identify the illusion. The effect lasts until you dismiss it as a free
      action, or until you stop touching the object.
    Flavor: >-
      You wave your hand and suddenly a piece of paper looks like a letter from
      the king, a copper coin looks like a gold coin, or a rock looks like a
      diamond. Surely there are other applications, but you can’t think of any.

