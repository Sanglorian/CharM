# Mastermind's Gambit discipline (Harlequin). Tactical leader powers that direct
# allies, control enemy positioning, and grant marks and bonus attacks. Printed
# key Intelligence / secondary Charisma (the Harlequin's class key is
# Intelligence, so attack powers carry the `ability-swap` tag). Many attacks use
# Intelligence +2 vs a defense. Levels 1-29 transcribed (full class power pool).

- id: ORCUS_DISCIPLINE_MASTERMINDS_GAMBIT
  name: Mastermind's Gambit
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": Intelligence
    "Secondary Ability": Charisma
    Sources: "Harlequin (class)"
    Description: "A tactical master, you direct your allies to seize victory."

# --- At-Will attack powers (level 1) ------------------------------------------
- id: ORCUS_POWER_INSTINCTUAL_REACTION
  name: Instinctual Reaction
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_MASTERMINDS_GAMBIT, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Move Action
    Keywords: "Focus, Martial"
    Target: "Ranged 10, one creature"
    Attack: "Intelligence +2 vs Will"
    Hit: "Until the start of your next turn, the target loses all benefits of cover or concealment; superior cover and total concealment is reduced to -2. The target grants combat advantage to one ally in range until the start of your next turn."

- id: ORCUS_POWER_MARK_OF_THE_PUPPETEER
