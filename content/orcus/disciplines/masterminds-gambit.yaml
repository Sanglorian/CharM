  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: "Martial, Weapon"
    Target: Self
    Effect: "Make a basic attack. If you hit, you shunt the target two squares."

- id: ORCUS_POWER_TACTICAL_ALTERATION
  name: Tactical Alteration
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_MASTERMINDS_GAMBIT, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Move Action
    Keywords: "Focus, Martial"
