    Attack: "Dexterity vs Reflex"
    Hit: "1 damage and the target is slowed until the start of your next turn."
    Special: "If you do not move this turn, deal your Dexterity modifier in damage instead."

- id: ORCUS_POWER_POTENTIAL_PUSH
