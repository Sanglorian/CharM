    Hit: "1dW + Dexterity modifier damage and push 1 (if it can't be pushed, +Intelligence modifier damage). Level 21: 2dW + Dexterity modifier."
    Special: "If you do not move this turn, push 2 instead."

- id: ORCUS_POWER_RAPID_SHOTS
