- id: ORCUS_DISCIPLINE_STARFALL
  name: "Starfall"
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": "Dexterity"
    "Secondary Ability": "Intelligence"
    Sources: "Reaper (class)"
    Description: >-
      You are a one-person siege weapon, firing down rains of arrows that force
      your foes to duck for cover.

- id: ORCUS_POWER_ATTACK_OF_NECESSITY
  name: "Attack of Necessity"
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_STARFALL, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": "At-Will"
    "Power Type": "Attack"
    "Action Type": "Standard Action"
    Keywords: "Martial, Weapon"
    Target: "Near arc 3, all creatures"
    Attack: "Dexterity vs Reflex"
    Hit: >-
      1dW damage, and the target is pushed to the nearest empty square outside
      of the blast. If the target cannot move to the nearest empty square, the
      target takes additional damage equal to your Dexterity modifier. Level 21
      2dW damage.
    Special: "If you do not move this turn, arc 4 instead."
    Flavor: "Out of options, become a hero."

