# Starfall discipline (Reaper). A ranged area-controller "siege weapon" — rains of
# arrows. Key ability Dexterity (the Reaper class key is also Dexterity). Same
# tagging contract: [disciplineId, <frequency>] (+ `ability-swap` on the
# character's own attacks). Levels 1-16 transcribed (fills the full class
# progression).

- id: ORCUS_DISCIPLINE_STARFALL
  name: Starfall
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": Dexterity
    "Secondary Ability": Intelligence
    Sources: "Reaper (class)"
    Description: "You are a one-person siege weapon, firing rains of arrows that force your foes to duck for cover."

# --- At-Will attack powers (level 1) ------------------------------------------
- id: ORCUS_POWER_ATTACK_OF_NECESSITY
  name: Attack of Necessity
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_STARFALL, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: "Martial, Weapon"
    Target: "Near arc 3, all creatures"
    Attack: "Dexterity vs Reflex"
    Hit: "1dW damage; the target is pushed to the nearest empty square outside the blast (if it can't, it takes Dexterity modifier extra damage). Level 21: 2dW."
    Special: "If you do not move this turn, arc 4 instead."

