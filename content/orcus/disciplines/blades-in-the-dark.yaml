  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: "Martial, Weapon"
    Target: "Melee weapon, one target"
    Attack: "Dexterity vs AC"
    Hit: "1dW + Dexterity modifier damage and you shift 1. Level 21: 2dW + Dexterity modifier damage."

- id: ORCUS_POWER_FLYING_BLADE
  name: Flying Blade
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_BLADES_IN_THE_DARK, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: "Martial, Weapon"
    Target: "Ranged weapon, one target"
    Attack: "Dexterity vs AC"
    Hit: "1dW + Dexterity modifier damage and you gain momentum. Level 21: 2dW + Dexterity modifier damage."

