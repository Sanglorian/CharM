# Blades in the Dark discipline (Exemplar / Brews Poison kit). Tricky, punishing
# attacks that exploit weakness. Key ability Dexterity. Same tagging contract.
# Levels 1-7 transcribed (rounds out the Exemplar's class power pool).

- id: ORCUS_DISCIPLINE_BLADES_IN_THE_DARK
  name: Blades in the Dark
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": Dexterity
    "Secondary Ability": Strength
    Sources: "Exemplar (class); Brews Poison (kit)"
    Description: "Your attacks are tricky and punishing, taking advantage of any signs of weakness."

# --- At-Will attack powers (level 1) ------------------------------------------
- id: ORCUS_POWER_DEADLY_THRUST
  name: Deadly Thrust
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_BLADES_IN_THE_DARK, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: "Martial, Weapon"
    Target: "Melee weapon, one target"
    Attack: "Dexterity vs AC"
    Hit: "1dW + Dexterity modifier damage. If the target is staggered, also add your Strength modifier to the damage. Level 21: 2dW + Dexterity modifier damage."

- id: ORCUS_POWER_EVASIVE_STRIKE
  name: Evasive Strike
