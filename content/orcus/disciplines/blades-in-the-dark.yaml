- id: ORCUS_POWER_SLOPPY_STRIKE
  name: Sloppy Strike
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_BLADES_IN_THE_DARK, encounter, ability-swap]
  fields:
    Level: "7"
    "Power Usage": Encounter
    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: "Martial, Weapon"
    Target: "Melee weapon, one target"
    Attack: "Dexterity vs AC"
    Hit: >
      1dW + Dexterity modifier damage. The next time the target attacks you, you
      can make a secondary attack (Dexterity vs AC; 2dW + Dexterity modifier and
      slowed until the end of your next turn) as an immediate counter action.
      Boost (Level 17): if your secondary attack hits, the triggering attack
      automatically misses.

