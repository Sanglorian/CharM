- id: ORCUS_POWER_TUMBLING_STRIKE
  name: Tumbling Strike
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_BLADES_IN_THE_DARK, encounter, ability-swap]
  fields:
    Level: "3"
