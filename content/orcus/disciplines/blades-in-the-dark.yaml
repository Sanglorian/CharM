- id: ORCUS_DISCIPLINE_BLADES_IN_THE_DARK
  name: "Blades in the Dark"
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": "Dexterity"
    "Secondary Ability": "Strength"
    Description: >-
      Sources: Exemplar (class), Brews Poison (kit) Your attacks are tricky and
      punishing, taking advantage of any signs of weakness. If you do gain
      momentum from a power, the same rule for losing momentum applies as for
      the Exemplar: you lose it if you are hit by any attack.
    Note: >-
      Many of these powers use momentum. Other than these powers, the main way
      to gain momentum are the features of the Exemplar class. Powers that
      involve momentum may be of limited use to non-Exemplars.

