# Veiled Moon discipline (Mageblade / Dabbles in Mageblading kit). Arcane teleport
# and spirit-walking weapon powers that strike from impossible vantage points.
# Key ability Intelligence, secondary Dexterity. Same tagging contract.
# Levels 1-29 transcribed (rounds out the Mageblade's class power pool).

- id: ORCUS_DISCIPLINE_VEILED_MOON
  name: Veiled Moon
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": Intelligence
    "Secondary Ability": Dexterity
    Sources: "Mageblade (class); Dabbles in Mageblading (kit)"
    Description: "You pass through worlds, delivering attacks from impossible vantage points."

