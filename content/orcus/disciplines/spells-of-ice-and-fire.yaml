# Spells of Ice and Fire discipline (Magician). Arcane elemental controller powers
# (the Flux keyword picks a damage energy). Printed key Dexterity / secondary
# Intelligence; the Magician's class key (Intelligence) substitutes via the
# `ability-swap` tag. Implement/Focus powers — damage is fixed dice + ability mod
# (no [W]). Levels 1-22 transcribed (fills the full class power progression).

- id: ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE
  name: Spells of Ice and Fire
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": Dexterity
    "Secondary Ability": Intelligence
    Sources: "Magician (class)"
    Description: "You control elemental ice and fire. (Flux powers take a chosen energy: lightning, acid, cold, fire or thunder.)"

# --- At-Will attack powers (level 1) ------------------------------------------
- id: ORCUS_POWER_THERMAL_TOUCH
  name: Thermal Touch
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: "Arcane, Flux, Focus"
    Target: "Melee touch, one creature"
    Attack: "Dexterity vs Reflex"
    Hit: "1d6 + Dexterity modifier [flux] damage, and the target takes half damage at the start of your next turn. Level 21: 2d6 + Dexterity modifier."
    Special: "Maintain Standard: at the start of your next turn the target takes the half damage again."

- id: ORCUS_POWER_THERMODYNAMIC_BOLT
