  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: "Arcane, Flux, Focus"
    Target: "Ranged 10, one creature"
    Attack: "Dexterity vs Reflex"
    Hit: "1d6 + Dexterity modifier [flux] damage. Level 21: 2d6 + Dexterity modifier."

