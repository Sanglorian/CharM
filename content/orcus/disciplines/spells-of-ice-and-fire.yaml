- id: ORCUS_POWER_ICE_CASTLE
  name: "Ice Castle"
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE, utility]
  fields:
    Level: "22"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Standard and Move Action"
    Keywords: "Arcane, Ice"
    Target: "Self"
    Effect: >-
      You create a single room structure out of ice, including furnishings if
      desired. The structure may be no more than sixteen squares in area and up
      to four squares tall. It can have as many entrances and exits as you
      desire. If the structure is constructed in an area below freezing, it will
      persist indefinitely: otherwise, it will persist for 24 hours before
      melting. A single square of ice or its contents can withstand 50 points of
      damage before shattering.
    Maintain: >-
      Standard and Move Create another room, or expand the size of an existing
      one.
    Flavor: >-
      They say when you become an adult, you put away childish things; but when
      you can make a fort out of ice, some things will never change.

