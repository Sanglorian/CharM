# The Juggernautical discipline (Guardian / Embodies Strength kit). A sturdy,
# unstoppable bruiser who is almost impossible to take down or hold back. Same
# tagging contract as the other disciplines: [disciplineId, <frequency>] (+
# `ability-swap` on powers that make the character's own attack) with a real
# Level field. Levels 1-3 transcribed.

- id: ORCUS_DISCIPLINE_JUGGERNAUTICAL
  name: Juggernautical
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": Strength
    "Secondary Ability": Constitution
    Sources: "Guardian (class); Embodies Strength (kit)"
    Description: "You are sturdy and powerful, and it is almost impossible to take you down or hold you back."

# --- At-Will attack power (level 1) -------------------------------------------
- id: ORCUS_POWER_DEVASTATING_BODY_ATTACK
  name: Devastating Body Attack
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_JUGGERNAUTICAL, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: "Martial, Weapon"
    Target: "Melee weapon, one creature up to one square out of reach"
    Attack: "Strength vs AC"
    Hit: >
      1dW + Strength modifier damage, and you push the target 1 square. If the
      target cannot be pushed because of an obstruction, you inflict maximum
      damage. Level 21: 2dW + Strength modifier damage.
    Effect: "Before your attack, shift up to one square towards the target. This must bring the target within reach."
    Flavor: "You make the target think it just got struck by a gorilla... riding a horse."

# --- Encounter attack powers --------------------------------------------------
- id: ORCUS_POWER_KNOCK_ABOUT_STRIKE
  name: Knock-About Strike
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_JUGGERNAUTICAL, encounter, ability-swap]
  fields:
    Level: "1"
    "Power Usage": Encounter
    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: Martial
    Target: Self
    Effect: "Make a basic melee attack. If you hit, the target is also rattled until the end of your next turn."
    Flavor: "You leave your opponent reeling."

- id: ORCUS_POWER_OUT_OF_THE_FIRE
  name: Out of the Fire
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_JUGGERNAUTICAL, encounter]
  fields:
    Level: "3"
    "Power Usage": Encounter
    "Power Type": Attack
    "Action Type": Free Action
    Keywords: "Martial, Weapon"
    Target: Self
    Trigger: "You hit one creature."
    Effect: >
      The target takes 1dW extra damage from the triggering attack. Secondary
      Effect: you and one adjacent ally can shift a number of squares equal to
      1 + your Strength modifier. You and the ally must be adjacent at the end of
      the shift.
    Flavor: "You know when to fight and when not to. You grab an ally and pull back."

# --- Daily attack power (level 1) ---------------------------------------------
- id: ORCUS_POWER_INCONSEQUENTIAL_INJURY
  name: Inconsequential Injury
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_JUGGERNAUTICAL, daily, ability-swap]
  fields:
    Level: "1"
    "Power Usage": Daily
    "Power Type": Attack
    "Action Type": No Action
    Keywords: Martial
    Target: Self
    Effect: "Select one condition you suffer from. Gain a +4 bonus to the saving throw against that condition until you pass. When you pass, you gain two basic attacks."
    Flavor: "Nothing clears the head like hurting something else."

# --- Utility powers (level 2) -------------------------------------------------
- id: ORCUS_POWER_FOR_THE_COMMON_HONOR
  name: For the Common Honor
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_JUGGERNAUTICAL, utility]
  fields:
    Level: "2"
    "Power Usage": Encounter
    "Power Type": Utility
    "Action Type": Counter Action
    Keywords: Martial
    Target: "Near burst 2, one ally"
    Trigger: "One staggered ally in range is hit by an attack that does not include you."
    Effect: "You are hit by the attack instead of the ally."
    Flavor: "In an instant, you weigh the options and realize someone else's life is more vital than your own."

- id: ORCUS_POWER_IM_THE_JUGGERNAUT
  name: I'm the Juggernaut
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_JUGGERNAUTICAL, utility]
  fields:
    Level: "2"
    "Power Usage": Encounter
    "Power Type": Utility
    "Action Type": Move Action
    Keywords: Martial
    Target: Self
    Effect: >
      Shift a number of squares equal to 1 + your Constitution modifier, ignoring
      difficult terrain. You can move through enemies' squares during this
      movement. Non-creature obstructions in squares you attempt to enter take
      damage equal to 5 x your Strength modifier; if this destroys the
      obstruction, you can enter the square.
    Flavor: "You ignore any obstacles as you plow through terrain and opponents."

- id: ORCUS_POWER_THE_BEHEMOTH
  name: The Behemoth
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_JUGGERNAUTICAL, utility]
  fields:
    Level: "2"
    "Power Usage": Daily
    "Power Type": Utility
    "Action Type": Swift Action
    Keywords: Martial
    Target: Self
    Effect: "You gain temporary hit points equal to twice your Strength modifier."
    Special: "Use a standard action and a move action instead of a swift action with this power to gain temporary hit points equal to twice your Constitution and Strength modifiers."
    Flavor: "You lift up a few inches and widen your stance, finding a newly found surge of adrenaline."
