- id: ORCUS_POWER_DEVASTATING_BODY_ATTACK
  name: "Devastating Body Attack"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_JUGGERNAUTICAL, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": "At-Will"
    "Power Type": "Attack"
    "Action Type": "Standard Action"
    Keywords: "Martial, Weapon"
    Target: "Melee weapon, one creature up to one square out of reach"
    Attack: "Strength vs AC"
    Hit: >-
      1dW + Strength modifier damage, and you push the target 1 square. If the
      target cannot be pushed because of an obstruction, you inflict maximum
      damage. Level 21: 2dW + Strength modifier damage.
    Effect: >-
      Before your attack, shift up to one square towards the target. This must
