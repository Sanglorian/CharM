    "Power Type": "Utility"
    "Action Type": "Move Action"
    Keywords: "Martial"
    Target: "Self"
    Effect: >-
      Shift a number of squares equal to 1 + your Constitution modifier,
      ignoring difficult terrain. You can move through enemies’ squares during
