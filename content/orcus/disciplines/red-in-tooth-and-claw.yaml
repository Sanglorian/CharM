# Red in Tooth and Claw discipline (Sylvan / Eats Monster Hearts, Takes Bestial
# Form kits). Wild-shape beast combat. Key Constitution / secondary Wisdom; the
# Sylvan class key (Constitution) substitutes via `ability-swap`. Implement/Focus
# powers (Con-based, fixed dice). A representative set across levels 1-10.

- id: ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW
  name: Red in Tooth and Claw
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": Constitution
    "Secondary Ability": Wisdom
    Sources: "Sylvan (class); Eats Monster Hearts, Takes Bestial Form (kits)"
    Description: "You take the form of wild beasts, or take on their characteristics while keeping your own form."

# --- At-Will attack powers (level 1) ------------------------------------------
- id: ORCUS_POWER_BLOOD_LUST
  name: Blood Lust
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, at-will, ability-swap]
  fields:
    Level: "1"
