    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: "Focus, Spirit, Wild Shape"
    Target: "Melee 1, one enemy"
    Attack: "Constitution vs AC"
    Hit: "1d8 + Constitution modifier damage, and you gain temporary hit points equal to your Wisdom modifier. Level 21: 2d8 + Constitution modifier."
    Special: "Can be used as a basic melee attack."

