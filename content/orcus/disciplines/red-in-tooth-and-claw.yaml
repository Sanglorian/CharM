    Target: "Melee touch, one target"
    Attack: "Constitution vs AC"
    Hit: "1d8 + Constitution modifier damage and the target is grappled."

- id: ORCUS_POWER_FEARSOME_ROAR
  name: "Fearsome Roar"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, encounter, ability-swap]
  fields:
    Level: "3"
    "Power Usage": "Encounter"
    "Power Type": "Attack"
    "Action Type": "Standard Action"
    Keywords: "Focus, Psychic, Spirit"
    Target: "Near burst 2"
    Attack: "Constitution vs Will"
    Hit: >-
      1d8 + Constitution modifier psychic damage, and the target suffers a -4
      penalty on attacks against you until the end of your next turn.

- id: ORCUS_POWER_HARD_TO_MISS
  name: "Hard to Miss"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, encounter, ability-swap]
  fields:
    Level: "3"
    "Power Usage": "Encounter"
    "Power Type": "Attack"
    "Action Type": "Move Action"
    Keywords: "Spirit"
    Target: "Near burst 5, all enemies"
    Effect: >-
      The target is marked until they inflict damage on you. You gain combat
      advantage against each marked target until the end of your next turn. If
      you take damage from a target while it is marked, as a reaction you may
      shift up to 5 squares and then make a basic attack against the target.
    Maintain: >-
      Move The effect persists against marked targets until the end of your next
      turn.
    Flavor: "Of all the opponents to target, you’re the one that stands out."

- id: ORCUS_POWER_ILLOGICAL_RAGE
  name: "Illogical Rage"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, daily, ability-swap]
  fields:
    Level: "5"
    "Power Usage": "Daily"
    "Power Type": "Attack"
    "Action Type": "Reaction Action"
    Keywords: "Spirit"
    Target: "Self"
    Trigger: "You are staggered."
    Effect: >-
      Until you are no longer staggered or until you fall unconscious, you gain
      a +4 power bonus to all damage rolls. If you don’t hit with any attack on
      your turn, you gain a +2 bonus to damage on your next hit. This bonus is
      cumulative every round until you hit. If you do not hit an enemy before
      the bonus reaches +14, you must make a melee basic attack against the
      nearest creature on your turn.
    Flavor: >-
      You’ve stopped listening to reason. The best thing your allies can do is
      give you a direction a step back.

- id: ORCUS_POWER_PANICKED_SWITCH
  name: "Panicked Switch"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, daily, ability-swap]
  fields:
    Level: "5"
    "Power Usage": "Daily"
    "Power Type": "Attack"
    "Action Type": "Standard Action"
    Keywords: "Polymorph, Focus, Form, Spirit"
    Target: "Near burst 5, one enemy"
    Attack: "Constitution vs Will"
    Hit: >-
      3d10 + your Intelligence modifier damage and shunt the target 2. They are
      helpless and size Small (save ends both). Until they make their saving
      throw, you can use a move action to shunt them 2.
    Flavor: "You turn the target into a small, defenseless animal."

- id: ORCUS_POWER_SHAPE_OF_THE_FROG
  name: "Shape of the Frog"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, daily, ability-swap, ORCUS_SHAPE_POWER]
  fields:
    Level: "5"
    "Power Usage": "Daily"
    "Power Type": "Attack"
    "Action Type": "Swift Action"
    Keywords: "Form, Polymorph, Spirit"
    Target: "Self"
    Effect: >-
      You take the form of a Large frog, with a swim speed of 4. While in this
      form, you gain the tongue lash at-will power. You remain in the form until
      you are reduced to 0 HP or below, take a long rest or take a new form. You
      can return to your original form as a swift action. Once during your time
      in this form, you can make the following attack: Form Attack (swift
      action) ● Focus Melee 1; Con vs Reflex; the target is grappled. Make a
      secondary attack against the target. Secondary Attack: Melee 1; Con vs
      Fortitude, must be grappling the target, the target must be Medium or
      smaller; the target is swallowed. While the target is swallowed, it is
      restrained and takes 5 damage plus 5 acid damage at the start of each of
      its turns. The swallowed creature can make basic melee attacks against you
      with one-handed or natural weapons. You may release the creature as a
      swift action. If the creature succeeds at an escape a grapple action with
      a -4 penalty, it escapes your stomach and appears in an unoccupied space
      of its choice adjacent to you.

- id: ORCUS_POWER_SHAPE_OF_THE_TOAD
  name: "Shape of the Toad"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, daily, ability-swap, ORCUS_SHAPE_POWER]
  fields:
    Level: "5"
    "Power Usage": "Daily"
    "Power Type": "Attack"
    "Action Type": "Swift Action"
    Keywords: "Form, Polymorph, Spirit"
    Target: "Self"
    Effect: >-
      You take the form of a Medium toad, with a swim speed of 4 and resistance
      to poison 5 (10 at level 11, 15 at level 21). While in this form, you gain
      the knockback at-will power. You remain in the form until you are reduced
      to 0 HP or below, take a long rest or take a new form. You can return to
      your original form as a swift action. Once during your time in this form,
      you can make the following attack: Form Attack (swift action) ● Focus,
      Poison Near arc 3; Con vs Fortitude; 2d6 + Constitution modifier poison
      damage and the target grants combat advantage until the end of your next
      turn.

- id: ORCUS_POWER_SHAPE_OF_THE_SERPENT
  name: "Shape of the Serpent"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, daily, ability-swap, ORCUS_SHAPE_POWER]
  fields:
    Level: "5"
    "Power Usage": "Daily"
    "Power Type": "Attack"
    "Action Type": "Swift Action"
    Keywords: "Form, Polymorph, Spirit"
    Target: "Self"
    Effect: >-
      You take the form of a Small, Medium or Large snake, with a swim speed of
      4 and the ability to squeeze through gaps as if you were one size smaller.
      While in this form, you gain the powerful swipe at-will power. You remain
      in the form until you are reduced to 0 HP or below, take a long rest or
      take a new form. You can return to your original form as a swift action.
      Once during your time in this form, you can make the following attack:
      Form Attack (swift action) ● Focus, Poison Melee 2; Con vs Fortitude; 2d6
      + Constitution modifier poison damage, and the target takes persistent 10
      poison damage (save ends); on a miss, the target takes half damage and
      persistent 5 poison damage (save ends).

- id: ORCUS_POWER_SHAPE_OF_THE_WEAVER
  name: "Shape of the Weaver"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, daily, ability-swap, ORCUS_SHAPE_POWER]
  fields:
    Level: "5"
    "Power Usage": "Daily"
    "Power Type": "Attack"
    "Action Type": "Swift Action"
    Keywords: "Form, Polymorph, Spirit"
    Target: "Self"
    Effect: >-
      You take the form of a Small spider, with a climb speed of 4 and the web
      stride feature. While in this form, you gain the venomous strike at-will
      power. You remain in the form until you are reduced to 0 HP or below, take
      a long rest or take a new form. You can return to your original form as a
      swift action. Once during your time in this form, you can make the
      following attack: Form Attack (swift action) ● Focus Ranged 5; Con vs
      Reflex; the target is restrained (save ends); on a miss, the target is
      slowed (save ends).

- id: ORCUS_POWER_ANIMAL_INSTINCTS
  name: "Animal Instincts"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, utility]
  fields:
    Level: "6"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Swift Action"
    Keywords: "Spirit"
    Target: "Self"
    Effect: >-
      Until the end of the encounter, you get a +2 bonus on Athletics,
      Acrobatics, Endure, Stealth and Nature checks. End this power early to
      reroll an Athletics, Acrobatics, Endure, Stealth or Nature check and take
      the second result.

- id: ORCUS_POWER_REGENESIS
  name: "Regenesis"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, utility]
  fields:
    Level: "6"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Move Action"
    Keywords: "Healing, Spirit"
    Target: "Self"
    Effect: "You gain regeneration 3 until the end of the encounter."
    Flavor: >-
      Your injuries knit in seconds to the shock of those around. You assure
      them it still hurts like hell.

- id: ORCUS_POWER_RHINOHIDE
  name: "Rhinohide"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, utility]
  fields:
    Level: "6"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Move Action"
    Keywords: "Spirit"
    Target: "Self"
    Effect: >-
      You gain resistance 3 to all damage until the end of the encounter.
    Flavor: >-
      Your skin becomes thick and leathery, able to withstand considerable
      punishment.

- id: ORCUS_POWER_SCENT
  name: "Scent"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, utility]
  fields:
    Level: "6"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Swift Action"
    Keywords: "Spirit"
    Target: "Self"
    Effect: "You have truesight 6."

- id: ORCUS_POWER_FRENZY
  name: "Frenzy"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, encounter, ability-swap]
  fields:
    Level: "7"
    "Power Usage": "Encounter"
    "Power Type": "Attack"
    "Action Type": "Reaction Action"
    Keywords: "Consistent, Spirit"
    Target: "Self"
    Trigger: "You are hit by an attack."
    Effect: >-
      Shift your speed toward the triggering creature and make a melee basic
      attack against it.
    Flavor: "Your opponent scores a hit; you growl back."

- id: ORCUS_POWER_SHAPE_OF_THE_BAT
  name: "Shape of the Bat"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, daily, ability-swap, ORCUS_SHAPE_POWER]
  fields:
    Level: "9"
    "Power Usage": "Daily"
    "Power Type": "Attack"
    "Action Type": "Swift Action"
    Keywords: "Form, Polymorph, Spirit"
    Target: "Self"
    Effect: >-
      You take the form of a Small bat, with a land speed of 2, a fly speed of
      6, darkvision and blindsense. While in this form, you gain the blood lust
      at-will power. You remain in the form until you are reduced to 0 HP or
      below, take a long rest or take a new form. You can return to your
      original form as a swift action. Once during your time in this form, you
      can make the following attack: Form Attack (standard action) ● Focus Melee
      1; Con vs AC; you may shift 2 before this attack and after this attack;
      1d8 + Constitution modifier damage and the target takes 10 persistent
      damage (save ends); the target takes 5 persistent damage on a miss.
      Effect: Each time the target takes persistent damage from this attack, you
      heal 5 damage.

- id: ORCUS_POWER_SHAPE_OF_THE_EAGLE
  name: "Shape of the Eagle"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, daily, ability-swap, ORCUS_SHAPE_POWER]
  fields:
    Level: "9"
    "Power Usage": "Daily"
    "Power Type": "Attack"
    "Action Type": "Swift Action"
    Keywords: "Form, Polymorph, Spirit"
    Target: "Self"
    Effect: >-
      You take the form of a Large eagle, hawk or other raptor, with a land
      speed of 2 and a fly speed of 8. While in this form, you gain the mad rush
      at-will power. You remain in the form until you are reduced to 0 HP or
      below, take a long rest or take a new form. You can return to your
      original form as a swift action. Once during your time in this form, you
      can make the following attack: Form Attack (standard action) ● Focus Melee
      1; Con vs AC; you may shift 2 before this attack and after this attack;
      2d8 + Constitution modifier damage.

- id: ORCUS_POWER_SHAPE_OF_THE_SHARK
  name: "Shape of the Shark"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, daily, ability-swap, ORCUS_SHAPE_POWER]
  fields:
    Level: "9"
    "Power Usage": "Daily"
    "Power Type": "Attack"
    "Action Type": "Swift Action"
    Keywords: "Form, Polymorph, Spirit"
    Target: "Self"
    Effect: >-
      You take the form of a Medium or Large shark, with a swim speed of 10 and
      no land speed. You can breathe underwater while in this form. While in
      this form, you gain the blood lust at-will power. You remain in the form
      until you are reduced to 0 HP or below, take a long rest or take a new
      form. You can return to your original form as a swift action. Once during
      your time in this form, you can make the following attack: Form Attack
      (swift action) ● Focus Melee 1; Con vs AC; 3d8 + Constitution modifier
      damage; on a miss, the target takes half damage. Effect: Shift a number of
      squares up to your Wisdom modifier. Drag the target behind you.

- id: ORCUS_POWER_SHAPE_OF_THE_WYRMLING
  name: "Shape of the Wyrmling"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, daily, ability-swap, ORCUS_SHAPE_POWER]
  fields:
    Level: "9"
    "Power Usage": "Daily"
    "Power Type": "Attack"
    "Action Type": "Swift Action"
    Keywords: "Form, Polymorph, Spirit"
    Target: "Self"
    Effect: >-
      You take the form of a Medium dragon, with darkvision. Choose a damage
      type (acid, cold, fire, lightning, poison or thunder). You gain resistance
      5 to that damage type (10 at level 11, 15 at level 21). While in this
      form, you gain the knockback at-will power. You remain in the form until
      you are reduced to 0 HP or below, take a long rest or take a new form. You
      can return to your original form as a swift action. Once during your time
      in this form, you can make the following attack: Form Attack (swift
      action) ● Focus, [energy type] Near arc 3; Con vs Fortitude; 2d8 +
      Constitution modifier damage of the energy type you chose.

- id: ORCUS_POWER_YOU_AFRAID
  name: "You, Afraid?"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, daily, ability-swap]
  fields:
    Level: "9"
    "Power Usage": "Daily"
    "Power Type": "Attack"
    "Action Type": "Swift Action"
    Keywords: "Spirit"
    Target: "Near burst 10, one creature"
    Effect: >-
      The target is marked and you gain a +1 bonus to attack and a +2 bonus to
      damage against the target. You are also immune to any fear effects from
      the target. This effect persists until the end of the encounter.
    Flavor: "The bigger they are…"

- id: ORCUS_POWER_ACTIVE_CAMOUFLAGE
  name: "Active Camouflage"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, utility]
  fields:
    Level: "10"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Free Action"
    Keywords: "Spirit,"
    Target: "Self"
    Effect: >-
      You gain a +15 bonus to your next Stealth check and until you leave cover,
      if you make a melee or ranged attack from hiding, you are still considered
      to be hiding.
    Flavor: >-
      Whether it be a natural ability of your skin or an acute sense of your
      surroundings, hiding has never been difficult for you.

- id: ORCUS_POWER_BLOODHOUND
  name: "Bloodhound"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, utility]
  fields:
    Level: "10"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Free Action"
    Keywords: "Spirit"
    Target: "Self"
    Effect: "Gain a +10 power bonus to your next Insight or Perception check."
    Flavor: "They don’t call it a detective’s nose for nothing."

- id: ORCUS_POWER_FLITTERING_FORM
  name: "Flittering Form"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, utility]
  fields:
    Level: "10"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Swift Action"
    Keywords: "Form, Polymorph, Spirit"
    Target: "Self"
    Effect: >-
      You take the form of a Tiny flying animal, like a bird or a bat. You
      cannot talk in this form. While in this form you cannot use powers unless
      they have the Wild Shape tag, and you cannot make attacks or use attack
      powers. Your speed becomes 4 but you get a fly speed of 8. You remain in
      this form until the end of your next turn.
    Maintain: "Swift You remain in this form until the end of your next turn."

- id: ORCUS_POWER_SURVIVOR
  name: "Survivor"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, utility]
  fields:
    Level: "10"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Swift Action"
    Keywords: "Spirit"
    Target: "Self"
    Effect: >-
      You may spend a recovery. If you do so, you heal your recovery value plus
      additional hit points and gain a +10 bonus to Endurance checks for one
      hour.

- id: ORCUS_POWER_TENACITY
  name: "Tenacity"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, utility]
  fields:
    Level: "10"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Counter Action"
    Keywords: "Spirit"
    Target: "Self"
    Trigger: "You fall to 0 HP or below."
    Effect: >-
      Until the end of the encounter, you do not fall unconscious from being at
      0 HP or below, or make death saves. At the end of the encounter, if you
      are still at 0 HP or below, you immediately fall unconscious and start
      making death saves.

- id: ORCUS_POWER_THROUGH_NEW_EYES
  name: "Through New Eyes"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, utility]
  fields:
    Level: "10"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Free Action"
    Keywords: "Focus, Spirit"
    Target: "Self"
    Trigger: "You change form or return to your original form."
    Effect: >-
      Reroll your initiative with a +4 bonus. You use that initiative from next
      round onwards.

- id: ORCUS_POWER_DEIMATIC_DISPLAY
  name: "Deimatic Display"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, encounter, ability-swap]
  fields:
    Level: "13"
    "Power Usage": "Encounter"
    "Power Type": "Attack"
    "Action Type": "Standard Action"
    Keywords: "Focus, Spirit"
    Target: "Near burst 10, one creature"
    Attack: "Constitution vs Will"
    Hit: >-
      2d10 + Constitution modifier psychic damage, and the creature cannot
      willingly move closer to you until the end of your next turn.
    Boost: "Level 27 Range becomes Near burst 10, all enemies"

- id: ORCUS_POWER_FEROCIOUS_FELINE
  name: "Ferocious Feline"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, daily, ability-swap]
  fields:
    Level: "15"
    "Power Usage": "Daily"
    "Power Type": "Attack"
    "Action Type": "Swift Action"
    Keywords: "Spirit"
    Target: "Self"
    Effect: >-
      Until the end of the encounter you gain a +2 power bonus to
      Dexterity-based checks and to AC and Reflex defense, and a +1 bonus to
      speed.
    Boost: >-
      Level 29 Make a basic melee attack when you use this power. Also, you
      receive a +4 power bonus to Dexterity-based checks and to AC and Reflex
      defense, and a +2 bonus to speed, instead of the bonuses listed under
      Effect.
    Flavor: >-
      You jump all limbs forward toward the enemy with such speed, no one can
      prepare for a defense.

- id: ORCUS_POWER_SHAPE_OF_THE_MANTICORE
  name: "Shape of the Manticore"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, daily, ability-swap, ORCUS_SHAPE_POWER]
  fields:
    Level: "15"
    "Power Usage": "Daily"
    "Power Type": "Attack"
    "Action Type": "Swift Action"
    Keywords: "Form, Polymorph, Spirit"
    Target: "Self"
    Effect: >-
      You take the form of a Large manticore, with darkvision and a fly speed of
      6 squares. Each time you are hit by a melee attack, do damage equal to
      your Wisdom modifier to the attacker. While in this form, you gain the
      drag down at-will power. You remain in the form until you are reduced to 0
      HP or below, take a long rest or take a new form. You can return to your
      original form as a swift action. Once during your time in this form, you
      can make the following attack: Form Attack (swift action) ● Focus Near arc
      3; Con vs Reflex; 2d8 + Constitution modifier damage and the target is
      immobile (save ends).

- id: ORCUS_POWER_SHAPE_OF_THE_RAPTOR
  name: "Shape of the Raptor"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, daily, ability-swap, ORCUS_SHAPE_POWER]
  fields:
    Level: "15"
    "Power Usage": "Daily"
    "Power Type": "Attack"
    "Action Type": "Swift Action"
    Keywords: "Form, Polymorph, Spirit"
    Target: "Self"
    Effect: >-
      You take the form of a Small velociraptor or Large deinonychus, with a +2
      bonus to your speed. While in this form, you score critical hits on a roll
      of 19 as well as 20. While in this form, you gain the drag down at-will
      power. You remain in the form until you are reduced to 0 HP or below, take
      a long rest or take a new form. You can return to your original form as a
      swift action. Once during your time in this form, you can make the
      following attack: Form Attack (swift action) ● Focus Melee 1; Con vs
      Reflex, two attacks; 2d8 + Constitution modifier damage. If both attacks
      hit, the target is knocked prone.

- id: ORCUS_POWER_PERFECT_FORM
  name: "Perfect Form"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, utility]
  fields:
    Level: "16"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Standard Action"
    Keywords: "Form, Spirit, Stance"
    Target: "Self"
    Effect: >-
      You can alter your physical form to take on the appearance of any natural
      beast of your level or lower. You gain the beast’s attacks and special
      abilities, but you use your attack bonuses for the attacks. You retain
      your statistics, including current HP. The effect persists until you end
      it with a swift action or until you fall unconscious. While in this form
      you cannot use powers unless they have the Wild Shape tag.
    Flavor: >-
      It’s not a pleasant process to watch, and you may require a new set of
      clothes if you didn’t think ahead.

- id: ORCUS_POWER_THREAT_DISCOURAGEMENT
  name: "Threat Discouragement"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, utility]
  fields:
    Level: "16"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Swift Action"
    Keywords: "Healing, Spirit"
    Target: "Self"
    Effect: >-
      You gain temporary hit points equal to the sum of your Strength,
      Constitution, and Dexterity bonuses + your level. All adjacent enemies are
      dazed until the start of your next turn.
    Flavor: >-
      You actually appear to get a little bigger. It’s probably an illusion.

- id: ORCUS_POWER_INTO_THE_FRAY
