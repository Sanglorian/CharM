# --- Daily attack powers (Wild Shape forms) -----------------------------------
- id: ORCUS_POWER_SHAPE_OF_THE_BEAR
  name: Shape of the Bear
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, daily, ability-swap]
  fields:
    Level: "1"
    "Power Usage": Daily
    "Power Type": Attack
    "Action Type": Swift Action
    Keywords: "Form, Polymorph, Spirit"
    Target: Self
    Effect: "Become a Large bear (low-light vision, climb 2); you gain the blood lust at-will power. Form Attack (standard, Focus): Melee 1, Con vs AC, 2d8 + Constitution modifier and the target is grappled; half damage on a miss."

- id: ORCUS_POWER_SHAPE_OF_THE_CAT
  name: Shape of the Cat
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, daily, ability-swap]
  fields:
    Level: "1"
    "Power Usage": Daily
    "Power Type": Attack
    "Action Type": Swift Action
    Keywords: "Form, Polymorph, Spirit"
    Target: Self
    Effect: "Become a cat/big cat (low-light vision, +2 speed; shift 1 when an adjacent enemy misses you); you gain bob and weave. Form Attack: Melee 1, Con vs AC, 3d8 + Constitution modifier and hide as a free action; half on a miss."

- id: ORCUS_POWER_SHAPE_OF_THE_WOLF
  name: Shape of the Wolf
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_RED_IN_TOOTH_AND_CLAW, daily, ability-swap]
  fields:
    Level: "1"
    "Power Usage": Daily
    "Power Type": Attack
    "Action Type": Swift Action
    Keywords: "Form, Polymorph, Spirit"
    Target: Self
    Effect: "Become a Medium wolf (+2 speed; +2 vs prone targets); you gain drag down. Form Attack: Melee 1, Con vs AC, 2d8 + Constitution modifier and grapple a prone target; then move up to half your speed, pulling one adjacent enemy."

