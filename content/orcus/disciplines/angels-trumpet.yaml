# The Angel's Trumpet discipline (Commander / Priest; Embodies Charisma, Worships
# the God of Peace kits). A leader's inspire/heal/redirect powers. Levels 1-2
# transcribed. Same tagging contract as Art of War: [disciplineId, <frequency>]
# with a real Level field; utility powers tagged `utility`.

- id: ORCUS_DISCIPLINE_ANGELS_TRUMPET
  name: Angel's Trumpet
  type: Discipline
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Key Ability": Charisma
    "Secondary Ability": Wisdom
    Sources: "Commander, Priest (classes); Embodies Charisma, Worships the God of Peace (kits)"
    Description: "Your words and example inspire allies to stay in the fight, and cooperate to take down the enemy."

# --- At-Will attack powers (level 1) ------------------------------------------
- id: ORCUS_POWER_IDENTIFY_TARGET
  name: Identify Target
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  # "ability-swap": the engine adds the character's class key ability (Key
  # Ability Swap element) to this power's printed key (Charisma) and uses the
  # higher. See docs/orcus-mapping.md.
  categories: [ORCUS_DISCIPLINE_ANGELS_TRUMPET, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: "Focus, Martial"
    Target: "Ranged 10, one enemy"
    Attack: "Charisma vs Will"
    Hit: "The target grants combat advantage until the end of your next turn. The first ally to hit the target with an attack heals 1d6 + your Charisma modifier HP."

- id: ORCUS_POWER_MAKE_ROOM
  name: Make Room
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_DISCIPLINE_ANGELS_TRUMPET, at-will]
  fields:
    Level: "1"
    "Power Usage": At-Will
    "Power Type": Attack
    "Action Type": Standard Action
    Keywords: Martial
    Target: "Near earshot, one ally"
    Effect: "The target makes a basic attack against an enemy of your choice, and gains a bonus to damage rolls for the attack equal to your Charisma modifier."
    Flavor: "There are others in a better position. You give them the opening they need."

