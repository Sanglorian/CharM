- id: ORCUS_POWER_SQUEEEEZE
  name: "Squeeeeze"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_DEEP_DARK_TRUTHFUL_MIRROR, utility]
  fields:
    Level: "2"
    "Power Usage": "At-Will"
    "Power Type": "Utility"
    "Action Type": "Move Action"
    Keywords: "Arcane, Transmutation"
    Target: "Self"
    Effect: >-
      Until the start of your next turn, you can squeeze without a reduction in
      speed. You suffer no penalties to attack, and do not grant combat
      advantage while squeezing. You are treated as a Small creature for
      purposes of squeezing into Tiny spaces.
    Flavor: >-
      Your muscles can extend; your bones can slip from their sockets. You find
      yourself moving through places even a rodent would find difficult.

- id: ORCUS_POWER_BONE_BLADE
  name: "Bone Blade"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_DEEP_DARK_TRUTHFUL_MIRROR, utility]
  fields:
    Level: "2"
    "Power Usage": "Encounter"
    "Power Type": "Utility"
    "Action Type": "Standard Action"
    Keywords: "Arcane, Transmutation, Focus"
    Target: "Self"
    Effect: >-
      You create a weapon of your choice. It can remain attached to your body or
      be detached so it can be thrown. The weapon is an enchanted weapon of the
      same bonus as the focus used for this power (if any).
    Flavor: >-
      From beneath your skin, you extend a sharpened piece of bone which you can
      immediately employ as a weapon.

- id: ORCUS_POWER_BEHEMOTH
  name: "Behemoth"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_DEEP_DARK_TRUTHFUL_MIRROR, utility]
  fields:
    Level: "2"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Standard Action"
    Keywords: "Arcane, Transmutation"
    Target: "Self"
    Effect: >-
      Add double your Constitution modifier to your level. You gain that number
      of temporary hit points. Until you lose all these temporary hit points,
      your weight is doubled and you reduce any unwilling movement you are
      subject to by 1 square.
    Flavor: >-
      You are able to change your basic biological makeup to make yourself
      extremely resistant to damage.

- id: ORCUS_POWER_BONE_SHIELD
  name: "Bone Shield"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_DEEP_DARK_TRUTHFUL_MIRROR, utility]
  fields:
    Level: "2"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Standard Action"
    Keywords: "Arcane, Transmutation, Focus"
    Target: "Self"
    Effect: >-
      You create a light or heavy shield attached to your arm. You can dismiss
      the shield as a swift action. The shield is an enchanted shield of the
      same bonus as the focus used for this power (if any).
    Flavor: >-
      You expand one of your arm’s bones to emerge as a shield to defend against
      attack. It doesn’t look pretty. It only has to work.

- id: ORCUS_POWER_THERIOPHILY
  name: "Theriophily"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_DEEP_DARK_TRUTHFUL_MIRROR, utility]
  fields:
    Level: "2"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Swift Action"
    Keywords: "Arcane, Transmutation, Stance"
    Target: "Self"
    Effect: >-
      You can alter your physical form to take on the appearance of another
      humanoid creature of your size, including unique individuals. You retain
      your statistics in your new form, and your clothing, armor, and
      possessions do not change. Other creatures can attempt an Insight check
      (opposed by your Bluff check) to pierce the disguise. You must have seen
      the individual being imitated (as well as hear the individual if you wish
      to simulate the voice as well).
    Flavor: >-
      You are no monster, and unlike others like you, fitting in has never been
      a real issue, especially when you can look like anyone.

