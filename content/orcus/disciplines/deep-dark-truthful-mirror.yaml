- id: ORCUS_DISCIPLINE_DEEP_DARK_TRUTHFUL_MIRROR
  name: "Deep, Dark, Truthful Mirror"
  type: Discipline
  source: "Orcus Original"
  fields:
    "Key Ability": "Constitution"
    "Secondary Ability": "Charisma"
    Sources: "Sculpts Their Body (kit)"
    Description: >-
      You’re able to modify your body in ways not reflective of any animal. This
      includes the manipulation of your bone structure, your muscles, even
      altering your size and the position of your limbs.

- id: ORCUS_POWER_BRIEF_MIMICRY
  name: "Brief Mimicry"
  type: Power
  source: "Orcus Original"
  categories: [ORCUS_DISCIPLINE_DEEP_DARK_TRUTHFUL_MIRROR, at-will, ability-swap]
  fields:
    Level: "1"
    "Power Usage": "At-Will"
    "Power Type": "Attack"
    "Action Type": "Move Action"
    Keywords: "Arcane, Focus, Transmutation"
    Target: "Near burst 5, one enemy"
    Attack: "Constitution vs Will"
    Hit: >-
      Until the end of your next turn, the target must make a saving throw each
      time they target you with an attack. If the save fails, they must target
      the attack so it does not affect you, or the attack fails.
    Effect: >-
      Until the end of your next turn, you take the form of a particular
      creature that is an ally of the target.
    Flavor: >-
      You change your shape to look like another, throwing off those who see
      you.

