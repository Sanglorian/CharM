# Kits ("themes") and the feats-vs-kits house rule (Orcus Classes and Powers).
#
# At level 1 every character makes a COMPULSORY, mutually-exclusive choice: take
# the heroic-tier feats OR take a kit (never neither; by default never both). The
# house rule "Feats and Kits" lets a character have both.
#
# Mechanism (engine-level XOR; kits themselves are unchanged Theme elements):
#   * The compulsory "Feat or Kit" meta-select (in _internal/level.yaml) offers
#     the two ORCUS_HEROIC_CHOICE options below. One grants the "Heroic Feats"
#     marker, the other the "Kit Path" marker. It is suppressed by the "Feats and
#     Kits" House Rule (requires "(!Feats and Kits)").
#   * The six heroic-tier feat slots carry `requires: "Heroic Feats | Feats and Kits"`.
#   * The kit slot carries `requires: "Kit Path | Feats and Kits"`.
# So exactly the chosen path's slot(s) appear — or both when the House Rule is on.
# (The app still treats a Theme choice as skippable and orders it after powers;
# that ordering/skippable behaviour is a known UI limitation we accept here.)
#
# Each kit grants features at levels 1/5/10 and names an associated discipline
# (recorded as a field; letting a kit's discipline feed the class power selects is
# a follow-up). A representative set whose associated disciplines are already in
# this content (Juggernautical, Art of War, Angel's Trumpet) plus the four
# "Worships the God of ..." deity kits.

# --- Heroic-tier path: the compulsory "feat OR kit" meta-choice ---------------
# Markers set by the meta-choice; the feat slots and kit slot gate on these.
- id: ORCUS_MARKER_HEROIC_FEATS
  name: Heroic Feats
  type: Marker
  source: "Orcus Original"

- id: ORCUS_MARKER_KIT_PATH
  name: Kit Path
  type: Marker
  source: "Orcus Original"

# The two options offered by the "Feat or Kit" meta-select. Modelled as
# categorized Class Features (like the Flux-energy choice) so the meta-choice is
# a normal, non-Theme selection; picking one grants its path marker.
- id: ORCUS_HEROIC_CHOICE_FEATS
  name: "Take Heroic Feats"
  type: Class Feature
  source: "Orcus Original"
  categories: [ORCUS_HEROIC_CHOICE]
  rules:
    - { grant: ORCUS_MARKER_HEROIC_FEATS, type: Marker }

- id: ORCUS_HEROIC_CHOICE_KIT
  name: "Take a Kit"
  type: Class Feature
  source: "Orcus Original"
  categories: [ORCUS_HEROIC_CHOICE]
  rules:
    - { grant: ORCUS_MARKER_KIT_PATH, type: Marker }

# Granted by every kit; kept as a general "this character has a kit" marker.
- id: ORCUS_MARKER_HAS_KIT
  name: Has Kit
  type: Marker
  source: "Orcus Original"

# Granted by every source of a secondary class (the Dualclass Recruit feat and
# the Dabbles-in multiclass kits). Those sources require its absence, so a
# character can have at most one secondary class.
- id: ORCUS_MARKER_SECONDARY_CLASS
  name: Secondary Class
  type: Marker
  source: "Orcus Original"

- id: ORCUS_HOUSERULE_FEATS_AND_KITS
  name: Feats and Kits
  type: House Rule
  source: "Orcus Original"

# A kit's "associated discipline" is modelled as a Discipline Access element it
# grants; the engine folds the `_Discipline` id into the $$KITDISC select variable,
# and the class power selects OR that variable into their discipline pool — so the
# kit's discipline becomes selectable in the normal class power slots. All six
# kits' associated disciplines are transcribed in this content and wired here.
- { id: ORCUS_DISCACCESS_JUGGERNAUTICAL, name: "Discipline Access (Juggernautical)", type: Discipline Access, source: "Orcus Original", fields: { _Discipline: ORCUS_DISCIPLINE_JUGGERNAUTICAL } }
- { id: ORCUS_DISCACCESS_ART_OF_WAR, name: "Discipline Access (Art of War)", type: Discipline Access, source: "Orcus Original", fields: { _Discipline: ORCUS_DISCIPLINE_ART_OF_WAR } }
- { id: ORCUS_DISCACCESS_ANGELS_TRUMPET, name: "Discipline Access (Angel's Trumpet)", type: Discipline Access, source: "Orcus Original", fields: { _Discipline: ORCUS_DISCIPLINE_ANGELS_TRUMPET } }
- { id: ORCUS_DISCACCESS_BORN_TO_RUN, name: "Discipline Access (Born to Run)", type: Discipline Access, source: "Orcus Original", fields: { _Discipline: ORCUS_DISCIPLINE_BORN_TO_RUN } }
- { id: ORCUS_DISCACCESS_RADIANT_DAWN, name: "Discipline Access (Radiant Dawn)", type: Discipline Access, source: "Orcus Original", fields: { _Discipline: ORCUS_DISCIPLINE_RADIANT_DAWN } }
- { id: ORCUS_DISCACCESS_PUPPETEERS_STRING, name: "Discipline Access (Puppeteer's String)", type: Discipline Access, source: "Orcus Original", fields: { _Discipline: ORCUS_DISCIPLINE_PUPPETEERS_STRING } }

# === Embodies kits ============================================================
- id: ORCUS_KIT_EMBODIES_STRENGTH
  name: Embodies Strength
  type: Theme
  source: "Orcus Original"
  fields:
    "Associated Discipline": Juggernautical
    Description: >-
      You are a beast. You might have earned a name in a ring or on the combat
      field. You could be an imposing behemoth or a gentle giant, only raising
      your hand when necessary.
  rules:
    - { grant: ORCUS_MARKER_HAS_KIT, type: Marker }
    - { grant: ORCUS_DISCACCESS_JUGGERNAUTICAL, type: Discipline Access }
    - { grant: ORCUS_KITF_FULL_TORQUE, type: Class Feature }
    - { grant: ORCUS_KITF_NO_TIME_FOR_PAIN, type: Class Feature, level: 5 }
    - { grant: ORCUS_KITF_COMICAL_REACTION, type: Class Feature, level: 10 }

- id: ORCUS_KITF_FULL_TORQUE
  name: Full Torque
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "1", Description: "You can use Strength in place of Dexterity for all attack and damage rolls with weapons with the thrown (light) property and with weapons from the slings and bows weapon groups. You can use Strength in place of Charisma when making Intimidate checks." }
- id: ORCUS_KITF_NO_TIME_FOR_PAIN
  name: No Time for Pain
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "5", Description: "If you are staggered, add your Strength modifier to your recovery value." }
- id: ORCUS_KITF_COMICAL_REACTION
  name: Comical Reaction
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "10", Description: "If you succeed on a saving throw for the following conditions, you gain a basic attack as a free action: blinded, dazed, deafened, slowed, stunned, or weakened." }

- id: ORCUS_KIT_EMBODIES_SPEED
  name: Embodies Speed
  type: Theme
  source: "Orcus Original"
  fields:
    Description: >-
      With unmatched physical discipline, you have perfected a body designed for
      raw speed and agility. It’s not enough just to be athletic: you have to
      keep your eyes and mind sharp, to gauge distances, crawlspaces, and the
      shortest possible route even if it involves some death-defying feat of
      acrobatic skill. You can keep an entire landscape in mind, analyzing paths
      and routes of escape, even when everyone else just sees walls.
  rules:
    - { grant: ORCUS_MARKER_HAS_KIT, type: Marker }
    - { grant: ORCUS_DISCACCESS_BORN_TO_RUN, type: Discipline Access }
    - { grant: ORCUS_KITF_POWER_TO_WEIGHT, type: Class Feature }
    - { grant: ORCUS_KITF_SPEED_VAULT, type: Class Feature, level: 5 }
    - { grant: ORCUS_KITF_SPLIT_SLIDE, type: Class Feature, level: 10 }

- id: ORCUS_KITF_POWER_TO_WEIGHT
  name: Power To Weight Ratio
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "1", Description: "You can use Dexterity in place of Strength for Athletics checks when performing a climb or a jump. You can also use Dexterity in place of Strength for attack and damage rolls with unarmed attacks, one-handed melee weapons, and grapples. You do not grant combat advantage while balancing." }
- id: ORCUS_KITF_SPEED_VAULT
  name: Speed Vault
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "5", Description: "If you move at least 2 squares while running toward a wall, you gain a climb speed equal to your remaining movement. If you have not cleared the wall by the end of your movement, you must make an Athletics check to climb normally." }
- id: ORCUS_KITF_SPLIT_SLIDE
  name: Split-Slide
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "10", Description: "Once per round, as a swift action, you can select one enemy in line of sight. You do not provoke opportunity attacks from that enemy and can pass through the enemy’s square as if it wasn’t occupied. You cannot end your movement in the square." }

# === Worships the God of ... (deity kits) =====================================
# Each grants Channel Divinity (once/encounter) and a Blessing of the God feat,
# plus a 5th- and 10th-level feature. See deities.yaml for the gods themselves.
- id: ORCUS_KIT_WORSHIPS_WAR
  name: Worships the God of War
  type: Theme
  source: "Orcus Original"
  fields:
    "Associated Discipline": Art of War
    Deity: "God of War"
    Description: >-
      Your secondary ability is Strength. If you acquire Worships ... kits
      through other ways, you get their benefits as usual but they do not change
      your secondary ability.
  rules:
    - { grant: ORCUS_MARKER_HAS_KIT, type: Marker }
    - { grant: ORCUS_DISCACCESS_ART_OF_WAR, type: Discipline Access }
    - { grant: ORCUS_KITF_CD_SHIELDED_SOUL, type: Class Feature }
    - { grant: ORCUS_KITF_DISCIPLE_OF_WAR, type: Class Feature, level: 5 }
    - { grant: ORCUS_KITF_BROTHERS_IN_ARMS, type: Class Feature, level: 10 }

- id: ORCUS_KITF_CD_SHIELDED_SOUL
  name: "Channel Divinity - Shielded Soul"
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "1", Description: "If you do not already have the ability to Channel Divinity, you gain the ability to Channel Divinity once per encounter, choosing any Channel Divinity power that you know. You also gain the Blessing of the God (War) feat." }
- id: ORCUS_KITF_DISCIPLE_OF_WAR
  name: Disciple of War
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "5", Description: "You gain one additional recovery per long rest." }
- id: ORCUS_KITF_BROTHERS_IN_ARMS
  name: Brothers in Arms
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "10", Description: "When you are a target of a Near or Far attack, you and all allies that are targets get a bonus to defense against that attack equal to the number of allies that are targets. You are not an ally of yourself, so for example you would get a +1 bonus to defense against an attack that targets you and one ally." }

- id: ORCUS_KIT_WORSHIPS_PEACE
  name: Worships the God of Peace
  type: Theme
  source: "Orcus Original"
  fields:
    "Associated Discipline": "Angel's Trumpet"
    Deity: "God of Peace"
    Description: "Your secondary ability is Charisma."
  rules:
    - { grant: ORCUS_MARKER_HAS_KIT, type: Marker }
    - { grant: ORCUS_DISCACCESS_ANGELS_TRUMPET, type: Discipline Access }
    - { grant: ORCUS_KITF_CD_LIGHT_WARD, type: Class Feature }
    - { grant: ORCUS_KITF_DISCIPLE_OF_PEACE, type: Class Feature, level: 5 }
    - { grant: ORCUS_KITF_CALMING_PRESENCE, type: Class Feature, level: 10 }

- id: ORCUS_KITF_CD_LIGHT_WARD
  name: "Channel Divinity - Light Ward"
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "1", Description: "If you do not already have the ability to Channel Divinity, you gain the ability to Channel Divinity once per encounter, choosing any Channel Divinity power that you know. You also gain the Blessing of the God (Peace) feat." }
- id: ORCUS_KITF_DISCIPLE_OF_PEACE
  name: Disciple of Peace
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "5", Description: "Enemies you are adjacent to suffer a -1 penalty on attack rolls." }
- id: ORCUS_KITF_CALMING_PRESENCE
  name: Calming Presence
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "10", Description: "Allies adjacent to you can rally as a swift action." }

- id: ORCUS_KIT_WORSHIPS_LIFE
  name: Worships the God of Life
  type: Theme
  source: "Orcus Original"
  fields:
    Deity: "God of Life"
    Description: "Your secondary ability is Charisma."
  rules:
    - { grant: ORCUS_MARKER_HAS_KIT, type: Marker }
    - { grant: ORCUS_DISCACCESS_RADIANT_DAWN, type: Discipline Access }
    - { grant: ORCUS_KITF_CD_GUIDANCE, type: Class Feature }
    - { grant: ORCUS_KITF_DISCIPLE_OF_LIFE, type: Class Feature, level: 5 }
    - { grant: ORCUS_KITF_TOWARDS_THE_LIGHT, type: Class Feature, level: 10 }

- id: ORCUS_KITF_CD_GUIDANCE
  name: "Channel Divinity - Guidance"
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "1", Description: "If you do not already have the ability to Channel Divinity, you gain the ability to Channel Divinity once per encounter, choosing any Channel Divinity power that you know. You also gain the Blessing of the God (Life) feat." }
- id: ORCUS_KITF_DISCIPLE_OF_LIFE
  name: Disciple of Life
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "5", Description: "Add your Wisdom modifier to the amount you heal with powers with the Healing tag." }
- id: ORCUS_KITF_TOWARDS_THE_LIGHT
  name: Towards the Light
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "10", Description: "You and allies within 5 squares gain a +2 bonus on saving throws while at 0 HP or below." }

- id: ORCUS_KIT_WORSHIPS_TYRANNY
  name: Worships the God of Tyranny
  type: Theme
  source: "Orcus Original"
  fields:
    Deity: "God of Tyranny"
    Description: "Your secondary ability is Strength."
  rules:
    - { grant: ORCUS_MARKER_HAS_KIT, type: Marker }
    - { grant: ORCUS_DISCACCESS_PUPPETEERS_STRING, type: Discipline Access }
    - { grant: ORCUS_KITF_CD_SPUR_ON, type: Class Feature }
    - { grant: ORCUS_KITF_DISCIPLE_OF_TYRANNY, type: Class Feature, level: 5 }
    - { grant: ORCUS_KITF_DIG_DEEPER, type: Class Feature, level: 10 }

- id: ORCUS_KITF_CD_SPUR_ON
  name: "Channel Divinity - Spur On"
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "1", Description: "If you do not already have the ability to Channel Divinity, you gain the ability to Channel Divinity once per encounter, choosing any Channel Divinity power that you know. You also gain the Blessing of the God (Tyranny) feat." }
- id: ORCUS_KITF_DISCIPLE_OF_TYRANNY
  name: Disciple of Tyranny
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "5", Description: "You are trained in Intimidate." }
- id: ORCUS_KITF_DIG_DEEPER
  name: Dig Deeper
  type: Class Feature
  source: "Orcus Original"
  fields: { Level: "10", Description: "Each time you use a Healing power, you may give one target temporary HP equal to your Strength modifier." }
