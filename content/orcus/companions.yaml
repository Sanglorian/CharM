# Animal Companions (Orcus Classes and Powers). Modelled as the engine's `Companion`
# element type and tagged ORCUS_ANIMAL_COMPANION so the Sylvan's Animal Companion
# Wild Gift can offer them in a Companion slot. A companion's level equals yours;
# its AC/defenses are the listed base + your level, and its HP equal your staggered
# value (recorded in the Description, as they scale with the character).

- id: ORCUS_COMPANION_APE
  name: "Ape"
  type: Companion
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_ANIMAL_COMPANION]
  fields:
    Type: "Medium Natural Beast"
    Size: "Medium"
    Strength: "16"
    Constitution: "12"
    Dexterity: "14"
    Intelligence: "2"
    Wisdom: "14"
    Charisma: "10"
    Speed: "5, climb 5"
    "Armor Class": "14"
    "Fortitude Defense": "10"
    "Reflex Defense": "12"
    "Will Defense": "14"
    Attack: "Fist (standard, at-will): your level +4 vs AC, 1d8 + your level. Stone (ranged 5/10): your level +4 vs AC, 1d8 + your level."
    Description: "AC/defenses are the listed value + your level; HP = your staggered value (can use your recoveries). low-light vision; Athletics, Intimidate. Could also be a yeti."

