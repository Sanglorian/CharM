# Backgrounds (Orcus Advanced Options) — an optional creation rule. Generated by
# tools/CharM.Orcus.Import (generate-backgrounds). Each row is a Background with
# its Associated Skills (verbatim). The benefit is a universal player choice
# (related language / add a class skill / +2 to an associated skill), recorded in
# the Benefit field rather than auto-applied. Do not hand-edit; regenerate.

- id: ORCUS_BACKGROUND_ACOLYTE
  name: "Acolyte"
  type: Background
  source: "Orcus Original"
  fields:
    "Associated Skills": "Heal, Religion"
    Benefit: >-
      When you select a background, you can select one of the following benefits
      (unless another option is specified in the background): 1. You learn a new
      language that the GM agrees seems related to that background. 2. You add
      one of the skills associated with the background to your list of class
      skills. 3. You get a +2 bonus to one of the skills associated with the
      background.

