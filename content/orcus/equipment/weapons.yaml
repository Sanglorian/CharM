# Weapons (Orcus Rulebook). Modelled as the engine's `Weapon` element type so that
# equipping one feeds power damage: the "Damage" field supplies the [W] die, the
# "Proficiency Bonus" adds to attack rolls when the wielder is trained, and "Group"
# drives weapon-group feats/powers. Named examples built from the weapon templates,
# with each martial/exotic weapon's group benefit already applied (Axes/Maces/
# Spears/Staffs: die +1 step; Light/Heavy Blades: proficiency +1; Picks & Hammers /
# Flails & Chains: Improved Critical; Polearms: Reach). Simple weapons get no group
# benefit. A representative cross-section of groups, not the full catalogue.

# === Simple melee =============================================================
- id: ORCUS_WEAPON_DAGGER
  name: Dagger
  type: Weapon
  source: "Orcus (Outlaw Kingdoms)"
  categories: [Melee, Simple]
  fields:
    "Weapon Category": "Melee, Simple"
    "Item Slot": Off-hand
    Damage: "1d4"
    "Proficiency Bonus": "2"
    Group: "Light Blades"
    Range: "5/10"
    Properties: "Side Weapon, Thrown (Light)"
    Cost: "2 gp"
    Weight: "2 lb."

