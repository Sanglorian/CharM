- id: ORCUS_MAGIC_BLEEDING_WEAPON_PLUS1
  name: "+1 bleeding weapon"
  type: Magic Item
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Item Slot": Weapon
    "Magic Item Type": Weapon
    Enhancement: "+1"
    "Item Level": "2"
    Boost: I
    Cost: "520 gp"
    Property: >-
      You can store blood in this weapon, represented by blood points. A
      bleeding weapon can store blood points equal to its enhancement bonus
      times 5. Absorb Blood (free, encounter) When you do damage with an attack
      with this weapon: This weapon gains blood points equal to the amount of
      damage done. Unleash Blood (free, encounter) When you hit with this
      weapon: Do additional damage equal to the number of blood points in this
      weapon. Then set the blood points in this weapon to zero.
