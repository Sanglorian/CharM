- id: ORCUS_MAGIC_DEMON_ARMOR_PLUS1
  name: "+1 demon armor"
  type: Magic Item
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Item Slot": Body
    "Magic Item Type": Armor
    Enhancement: "+1"
    "Item Level": "3"
    Boost: II
    Cost: "680 gp"
    Property: >-
      While wearing this armor, you can understand and speak Abyssal. This
      armor's enhancement bonus also applies to your attack and damage rolls,
      and you do +Xd6 damage on a critical hit, where X is the enhancement bonus
      of this armor. Remember, enhancement bonuses do not stack, so this
      replaces your existing enchanted weapon if this bonus is higher. Curse:
      Once you don this cursed armor, you can't doff it unless you are targeted
      by the remove curse incantation or similar magic. While wearing the armor,
      demons have combat advantage against you.
  rules:
    - { statadd: AC, value: 1, bonusType: Enhancement }
