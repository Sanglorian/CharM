# Named magic-item boosts (Orcus Advanced Options). A "boost" is a named property
# applied to an enchanted item; the boost's tier (I-IV) raises the item's level.
# Each boost is generated as the six enhancement versions (+1 .. +6) the rulebook
# lists, respecting any minimum enchantment. Functionally each carries the standard
# +X enhancement (weapon/focus via the Enhancement field; armor -> AC; cloak ->
# Fortitude/Reflex/Will), and the boost's special property is recorded in `Property`
# (most are item powers the engine can't auto-apply). Generated from the Focus,
# Weapon, Cloak and Armor Boost lists.

