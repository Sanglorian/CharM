# Boosted enchanted items (Orcus Rulebook). A "boost" (I-IV) raises an enchanted
# item's level (and price) by 1-4 without changing its +X bonus or adding any
# property to these generic items — it just places the same enhancement at a
# higher level slot for treasure/purchase purposes. Generated for all four
# families at +1..+6 x Boost I-IV. Same statadd rules as the un-boosted item.

