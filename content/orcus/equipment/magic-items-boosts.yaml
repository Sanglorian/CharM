    "Magic Item Type": Focus
    Enhancement: "+1"
    "Item Level": "2"
    Boost: I
    Cost: "520 gp"
    Property: >-
      This focus counts as all varieties of focus. For example, a +1 versatile
      holy symbol can also be used as an arcane focus, druidic focus and martial
      focus. Because holy symbols and martial focuses do not require a hand to
      use (while arcane and druidic focuses do), they are a popular choice for
      this enchantment.
