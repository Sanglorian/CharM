- id: ORCUS_MAGIC_DRAGON_SCALE_ARMOR_PLUS1
  name: "+1 dragon scale armor"
  type: Magic Item
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Item Slot": Body
    "Magic Item Type": Armor
    Enhancement: "+1"
    "Item Level": "4"
    Boost: III
    Cost: "840 gp"
    Property: >-
      Scale Armor only Dragon scale armor is made of the scales of one kind of
      dragon. Sometimes dragons collect their cast-off scales and gift them to
      humanoids. Other times, hunters carefully skin and preserve the hide of a
      dead dragon. In either case, dragon scale mail is highly valued. While
      wearing this armor, you gain a +2 bonus to defenses against attacks with
      the Fear tag and against Near attacks made by dragons. You have resistance
      to one damage type that is determined by the kind of dragon that provided
      the scales (see the table), equal to double the enhancement bonus
      (resistance to fire 6 for +3 red dragon scale armor). Additionally, once a
      day you can focus your senses as a swift action to magically discern the
      distance and direction to the closest dragon within 30 miles of you that
      is of the same type as the armor. ##### Table – Dragon Scale Mail | Dragon
      | Resistance | | ------ | ---------- | | Black | Acid | | Blue | Lightning
      | | Brass | Fire | | Bronze | Lightning | | Copper | Acid | | Gold | Fire
      | | Green | Poison | | Red | Fire | | Silver | Cold | | White | Cold |
  rules:
    - { statadd: AC, value: 1, bonusType: Enhancement }
