- id: ORCUS_MAGIC_SWORN_VENGEANCE_WEAPON_PLUS4
  name: "+4 sworn vengeance weapon"
  type: Magic Item
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Item Slot": Weapon
    "Magic Item Type": Weapon
    Enhancement: "+4"
    "Item Level": "20"
    Boost: IV
    Cost: "125,000 gp"
    Property: >-
      Minimum Enchantment: +4 Item Power (swift, daily) Choose one target of the
      next weapon attack you make. That target is your sworn enemy until it
      dies, or until seven days pass. You cannot use this power while you have
      an existing sworn enemy. Attacks with this weapon you make against the
      sworn enemy have combat advantage. You suffer no range, cover or
      concealment penalties for attacking the sworn enemy. If you score a
      critical hit, do +Xd12 damage instead of the normal amount of bonus
      critical damage. While your sworn enemy lives, you suffer a -2 penalty on
      attack rolls with all other weapons.
