# Weapon & armor proficiencies. The engine tracks weapon training by exact weapon
# NAME: an active `Proficiency` element named "Weapon Proficiency (<weapon>)" puts
# that weapon into StatBlock.TrainedWeapons, and PowerStatCalculator only adds a
# weapon's "Proficiency Bonus" to the attack roll when the wielder is trained with
# it. So each class's category proficiency (e.g. "martial melee") is expanded here
# into per-weapon Proficiency elements, grouped into `Grants` bundles the classes
# pull in. Armor proficiencies are also recorded (as Proficiency elements) for
# fidelity and prerequisites; the engine has no armor non-proficiency penalty yet,
# so those are declarative.

