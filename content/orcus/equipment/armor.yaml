  fields:
    "Armor Type": Shield
    "Armor Category": Light Shield
    "Item Slot": Off-hand
    "Shield Bonus": "+1"
    Cost: "5 gp"
    Weight: "6 lb."
  rules:
    - { statadd: AC, value: 1, bonusType: Shield }
    - { statadd: Reflex Defense, value: 1, bonusType: Shield }

