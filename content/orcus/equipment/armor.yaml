  fields:
    "Armor Type": Heavy
    "Armor Category": Chainmail
    "Item Slot": Body
    "Base AC": "16"
    "Armor Check Penalty": "-1"
    "Speed Penalty": "-1"
    Cost: "40 gp"
    Weight: "40 lb."
  rules:
    - { statadd: AC, value: 6, bonusType: Armor }
    - { statadd: Speed, value: -1, bonusType: Armor }
    - { statadd: Acrobatics, value: -1, bonusType: Armor }
    - { statadd: Athletics, value: -1, bonusType: Armor }
    - { statadd: Endure, value: -1, bonusType: Armor }
    - { statadd: Stealth, value: -1, bonusType: Armor }
    - { statadd: Sleight of Hand, value: -1, bonusType: Armor }

