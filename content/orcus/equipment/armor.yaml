# Armor & shields (Orcus Rulebook). Modelled as the engine's `Armor` element type.
# AC works *with* the bootstrap formula (AC = 10 + level bonus + Dex/Int): each
# armor adds its bonus over cloth's base 10 (leather +2, hide +3, chain +6,
# scale +7, plate +8) as an `Armor` bonus, and the bootstrap's Dex/Int-to-AC
# contributions carry `notWearing: armor:heavy`, so heavy armor correctly
# suppresses the ability bonus (the engine registers `armor:heavy` from the
# `Armor Type` field). Shields add their bonus to AC *and* Reflex. Armor check
# penalties hit the physical skills (Acrobatics, Athletics, Endure, Stealth,
# Sleight of Hand); heavy armor also reduces Speed.

# === Light armor ==============================================================
- id: ORCUS_ARMOR_CLOTH
  name: Cloth armor
  type: Armor
  source: "Orcus Original"
  fields:
    "Armor Type": Light
    "Armor Category": Cloth
    "Item Slot": Body
    "Base AC": "10"
    Cost: "1 gp"
    Weight: "4 lb."
  # Base AC 10 == the bootstrap's unarmored base, so no AC contribution.

- id: ORCUS_ARMOR_LEATHER
  name: Leather armor
  type: Armor
  source: "Orcus Original"
  fields:
    "Armor Type": Light
    "Armor Category": Leather
    "Item Slot": Body
    "Base AC": "12"
    Cost: "25 gp"
    Weight: "15 lb."
  rules:
    - { statadd: AC, value: 2, bonusType: Armor }

- id: ORCUS_ARMOR_HIDE
  name: Hide armor
  type: Armor
  source: "Orcus Original"
  fields:
    "Armor Type": Light
    "Armor Category": Hide
    "Item Slot": Body
    "Base AC": "13"
    "Armor Check Penalty": "-1"
    Cost: "30 gp"
    Weight: "25 lb."
  rules:
    - { statadd: AC, value: 3, bonusType: Armor }
    - { statadd: Acrobatics, value: -1, bonusType: Armor }
    - { statadd: Athletics, value: -1, bonusType: Armor }
    - { statadd: Endure, value: -1, bonusType: Armor }
    - { statadd: Stealth, value: -1, bonusType: Armor }
    - { statadd: Sleight of Hand, value: -1, bonusType: Armor }

# === Heavy armor (suppresses Dex/Int on AC via armor:heavy) ===================
