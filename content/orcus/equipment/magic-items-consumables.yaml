- id: ORCUS_MAGIC_SKELETON_KEY
  name: "Skeleton Key"
  type: Magic Item
  source: "Orcus Original"
  fields:
    "Item Slot": "Consumable"
    "Magic Item Type": "Consumable"
    "Item Level": "15"
    Cost: "1,000 gp"
    Property: >-
      As a swift action, you can insert the skeleton key into any lock. If the
      lock would open with a Sleight of Hand result of 30, the lock opens and
      the skeleton key turns to dust. Otherwise the lock remains closed, but the
      skeleton key is unharmed.
- id: ORCUS_MAGIC_TONIC_OF_AGILITY
  name: "Tonic of Agility"
  type: Magic Item
  source: "Orcus Original"
  fields:
    "Item Slot": "Consumable"
    "Magic Item Type": "Consumable"
    Property: >-
      Level 1: +1, Level 6: +2, Level 11: +3 Level 16: +4, Level 21: +5, Level
      26: +6 As a swift action, you can drink the tonic or administer it to a
      creature within reach. Its effect lasts for five minutes. Gain the listed
      item bonus to Reflex defense and Acrobatics checks. Your speed increases
      by 1. You can stand up from prone as a free action, but this immediately
      ends the effects of the tonic. You can reroll an Acrobatics check and use
      the result of your choice, but this immediately ends the effects of the
      tonic.
- id: ORCUS_MAGIC_TONIC_OF_ALERTNESS
  name: "Tonic of Alertness"
