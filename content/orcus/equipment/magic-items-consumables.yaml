    "Magic Item Type": "Consumable"
    Property: >-
      Level 1: +1, Level 6: +2, Level 11: +3 Level 16: +4, Level 21: +5, Level
      26: +6 As a swift action, you can drink the tonic or administer it to a
      creature within reach. Its effect lasts for five minutes. Gain the listed
      item bonus to Will defense and Perception checks. You gain a +1 item bonus
      to initiative.
- id: ORCUS_MAGIC_TONIC_OF_ENDURANCE
  name: "Tonic of Endurance"
  type: Magic Item
  source: "Orcus Original"
  fields:
    "Item Slot": "Consumable"
    "Magic Item Type": "Consumable"
    Property: >-
      Level 1: +1, Level 6: +2, Level 11: +3 Level 16: +4, Level 21: +5, Level
      26: +6 As a swift action, you can drink the tonic or administer it to a
      creature within reach. Its effect lasts for five minutes. Gain the listed
      item bonus to Fortitude defense and Endure checks. You gain resistance to
