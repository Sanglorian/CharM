# Magic consumables (oils, potions, tonics, scrolls, …) (Orcus Advanced Options) — generated verbatim by
# tools/CharM.Orcus.Import (generate-misc). Property is copied from the book;
# Item Level/Cost are filled only for a clean single "*Level N*" (Cost from the
# Magic Item Prices table). Ambiguous levels are left verbatim in Property with
# no derived Level/Cost. Do not hand-edit; regenerate instead.

- id: ORCUS_MAGIC_INCANTATION_SCROLL
  name: "Incantation Scroll"
  type: Magic Item
  source: "Orcus Original"
  fields:
    "Item Slot": "Consumable"
    "Magic Item Type": "Consumable"
    Property: >-
      An incantation scroll allows anyone to perform the incantation written on
      it, whether they know the incantation already or not. An incantation
      scroll is of the level of the incantation written on it, and its cost is
      equal to that of a consumable item of the same level or the component cost
      of the incantation (whichever is higher).
