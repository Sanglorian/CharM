      heal your recovery value, but this immediately ends the effects of the
      tonic.
- id: ORCUS_MAGIC_TONIC_OF_REGENERATION
  name: "Tonic of Regeneration"
  type: Magic Item
  source: "Orcus Original"
  fields:
    "Item Slot": "Consumable"
    "Magic Item Type": "Consumable"
    Property: >-
