# Consumable magic items (Orcus Advanced Options). Consumables are one-use items;
# they carry no passive stat bonus, so these are descriptive `Magic Item` elements
# (Item Type: Consumable) with level and cost. Items that scale come in the six
# +1..+6 versions at levels 1/6/11/16/21/26 (oils and tonics); the rest are
# fixed-level (some with a few tiers).

- id: ORCUS_CONSUMABLE_OIL_OF_SHARPNESS_1
  name: "Oil of Sharpness +1"
  type: Magic Item
  source: "Orcus (Outlaw Kingdoms)"
