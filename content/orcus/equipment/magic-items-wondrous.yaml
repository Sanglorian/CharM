    "Item Level": "7"
    Cost: "2,600 gp"
    Property: >-
      Regenesis: When you spend a recovery, you heal additional hit points equal
      to your Wisdom modifier. Level 11: Your Wisdom modifier +2. Level 21: Your
      Wisdom modifier +5. Sustenance: You do not need to eat or drink while
      carrying the cube. You only need two hours sleep for a long rest. Healing
      Light (reaction, encounter) Healing A creature within 6 squares uses an
      arcane power: You can spend a recovery to heal up to your recovery value.
- id: ORCUS_MAGIC_PIPES_OF_THE_SEWERS
  name: "Pipes of the Sewers"
  type: Magic Item
  source: "Orcus Original"
  fields:
    "Item Slot": "Wondrous"
    "Magic Item Type": "Wondrous"
    "Item Level": "4"
    Cost: "840 gp"
    Property: >-
      In addition to playing these pipes as a normal musical instrument, you can
      use them to produce rodent-like sounds. While doing so, you can
      communicate with rats (including giant rats) and they will not attack you
      unless you threaten or harm them.
- id: ORCUS_MAGIC_PORTABLE_HOLE
  name: "Portable Hole"
  type: Magic Item
  source: "Orcus Original"
  fields:
    "Item Slot": "Wondrous"
    "Magic Item Type": "Wondrous"
    "Item Level": "9"
    Cost: "4,200 gp"
    Property: >-
      This fine black cloth, soft as silk, is folded up to the dimensions of a
      handkerchief. It unfolds into a circular sheet 6 feet in diameter. You can
      use a standard action to unfold a portable hole and place it on or against
      a solid surface, whereupon the portable hole creates an extradimensional
      hole 2 squares deep. The cylindrical space within the hole exists on a
      different plane, so it can't be used to create open passages. Any creature
      inside an open portable hole can exit the hole by climbing out of it. You
      can use a standard action to close a portable hole by taking hold of the
      edges of the cloth and folding it up. Folding the cloth closes the hole,
      and any creatures or objects within remain in the extradimensional space.
      No matter what's in it, the hole weighs next to nothing. If the hole is
      folded up, a creature within the hole's extradimensional space can use an
      action to make a DC 10 Athletics check. On a successful check, the
      creature forces its way out and appears within 1 square of the portable
      hole or the creature carrying it. A breathing creature within a closed
      portable hole can survive for up to 10 minutes, after which time it begins
      to suffocate. Placing a portable hole inside another portable hole, or an
      extradimensional space created by another item, instantly destroys both
      items and opens a gate to the Astral Plane. The gate originates where the
      one item was placed inside the other. Any creature within 2 squares of the
      gate is sucked through it and deposited in a random location on the Astral
      Plane. The gate then closes. The gate is one-way only and can't be
      reopened.
- id: ORCUS_MAGIC_ROBE_OF_EYES
  name: "Robe of Eyes"
  type: Magic Item
  source: "Orcus Original"
  fields:
    "Item Slot": "Wondrous"
    "Magic Item Type": "Wondrous"
    "Item Level": "10"
    Cost: "5,000 gp"
    Property: >-
      This robe is adorned with eyelike patterns. While you wear the robe, you
      gain the following benefits: The robe lets you see in all directions. You
      have darkvision out to a range of 24 squares. You can see invisible
      creatures and objects, as well as see into the Ethereal Plane, out to a
      range of 24 squares. The eyes on the robe can't be closed or averted.
      Although you can close or avert your own eyes, you are never considered to
      be doing so while wearing this robe. If you are hit by an attack with the
      Radiant tag, you are dazed (save ends).
- id: ORCUS_MAGIC_ROPE_OF_CLIMBING
  name: "Rope of Climbing"
  type: Magic Item
  source: "Orcus Original"
  fields:
    "Item Slot": "Wondrous"
    "Magic Item Type": "Wondrous"
    "Item Level": "2"
    Cost: "520 gp"
    Property: >-
      A 60-foot-long rope of climbing is no thicker than a wand, but it is
      strong enough to support 3,000 pounds. Upon command, the rope snakes
      forward, upward, downward, or in any other direction at 2 squares (10
      feet) per round, attaching itself securely wherever its owner desires. It
      can unfasten itself and return in the same manner. A rope of climbing can
      be commanded to knot or unknot itself. This causes large knots to appear
      at 1-foot intervals along the rope. Knotting shortens the rope to a
      50-foot length until the knots are untied but lowers the DC of Athletics
      checks to climb with it by 5. A creature must hold one end of the rope
      when its magic is invoked.
- id: ORCUS_MAGIC_SATCHEL_OF_USEFUL_ITEMS
  name: "Satchel of Useful Items"
  type: Magic Item
  source: "Orcus Original"
  fields:
    "Item Slot": "Wondrous"
    "Magic Item Type": "Wondrous"
    "Item Level": "7"
    Cost: "2,600 gp"
    Property: >-
      This appears to be an unremarkable satchel, but a character who dons it
      notes that it is adorned with small cloth patches of various shapes. Only
      the wearer of the robe can recognize these patches for what items they
      become, and detach them. One patch can be detached as a swift action.
      Detaching a patch causes it to become an actual item, as indicated below.
      A newly created robe of useful items always has two each of the following
      patches: Dagger Bullseye lantern (filled and lit) Mirror (a highly
      polished 2-foot-by-4-foot steel mirror) Pole (10-foot length) Hempen rope
      (50-foot coil) Sack In addition, the robe has several other patches. Roll
      4d4 for the number of other patches and then roll for each patch on the
      table below to determine its nature. d% Result 01-08 Bag of 100 gold
      pieces 09-15 Coffer, silver (6 in. by 6 in. by 1 ft.), 500 gp value 16-22
      Door, iron (up to 10 ft. wide and 10 ft. high and barred on one side—must
      be placed upright, attaches and hinges itself) 23-30 Gems, 10 (100 gp
      value each) 31-44 Ladder, wooden (24 ft. long) 45-51 Mule (with saddle
      bags) 52-59 Pit, open (10 ft. by 10 ft. by 10 ft.) 60-68 Potion of healing
      69-75 Rowboat (12 ft. long) 76-83 Incantation scroll (roll 1d6 to
      determine level) 84-90 A dog 91-96 Window (2 ft. by 4 ft., up to 2 ft.
      deep) 97-100 Portable ram Multiple items of the same kind are permissible.
      Once removed, a patch cannot be replaced.
- id: ORCUS_MAGIC_SCRIPT_OF_FAITHFULNESS
  name: "Script of Faithfulness"
  type: Magic Item
  source: "Orcus Original"
  fields:
    "Item Slot": "Wondrous"
    "Magic Item Type": "Wondrous"
    "Item Level": "6"
    Cost: "1,800 gp"
    Property: >-
      This item is a small box containing religious scripture. Anyone who holds
      the item is aware of any action or item that could adversely affect their
      alignment and their standing with their deity, including magical effects.
      The holder acquires this information prior to performing such an action or
      becoming associated with such an item if they take a moment to contemplate
      the act.
- id: ORCUS_MAGIC_SPIRITLINK_CHARM
  name: "Spiritlink Charm"
  type: Magic Item
  source: "Orcus Original"
  fields:
    "Item Slot": "Wondrous"
    "Magic Item Type": "Wondrous"
    "Item Level": "3"
    Cost: "680 gp"
    Property: >-
      On a critical hit, your companion does additional damage equal to 1d6
      times by the bonus of an enchanted weapon or focus that you wield. For
      example, if you wield a +3 longsword, your companion does +3d6 damage on a
      critical hit.
- id: ORCUS_MAGIC_STONE_OF_ALARM
  name: "Stone of Alarm"
  type: Magic Item
  source: "Orcus Original"
  fields:
    "Item Slot": "Wondrous"
    "Magic Item Type": "Wondrous"
    "Item Level": "1"
    Cost: "360 gp"
    Property: >-
      This stone cube, when given the command word, affixes itself to any
      object. If that object is touched thereafter by anyone who does not first
      speak that same command word, the stone emits a piercing screech for 1
      hour that can be heard up to a quarter-mile away (assuming no intervening
      barriers).
- id: ORCUS_MAGIC_SUSTAINING_SPOON
  name: "Sustaining Spoon"
  type: Magic Item
  source: "Orcus Original"
  fields:
    "Item Slot": "Wondrous"
    "Magic Item Type": "Wondrous"
    "Item Level": "2"
    Cost: "520 gp"
    Property: >-
      This unremarkable eating utensil is typically fashioned from horn. If the
      spoon is placed in an empty container the vessel fills with a thick, pasty
      gruel. Although this substance has a flavor similar to that of warm, wet
      cardboard, it is highly nourishing and contains everything necessary to
      sustain any herbivorous, omnivorous, or carnivorous creature. The spoon
      can produce sufficient gruel each day to feed up to four humans.

