  type: Magic Item
  source: "Orcus Original"
  fields:
    "Item Slot": "Wondrous"
    "Magic Item Type": "Wondrous"
    "Item Level": "24"
    Cost: "525,000 gp"
    Property: >-
      You can use a standard action to place this 1-inch metal cube on the
      ground and speak its command word. The cube rapidly grows into a fortress
      that remains until you use an action to speak the command word that
      dismisses it, which works only if the fortress is empty. The fortress is a
      square tower, 4 squares on a side and 6 squares high, with arrow slits on
      all sides and a battlement atop it. Its interior is divided into two
      floors, with a ladder running along one wall to connect them. The ladder
      ends at a trapdoor leading to the roof. When activated, the tower has a
      small door on the side facing you. The door opens only at your command,
      which you can speak as a swift action. It is immune to magical effects
      that would open it or make it easier to open. Each creature in the area
      where the fortress appears is pushed to an unoccupied space outside but
      next to the fortress. The tower is made of adamantine, and its magic
      prevents it from being tipped over. The roof, the door, and the walls each
      have 100 hit points, immunity to damage from nonmagical weapons excluding
      siege weapons, and resistance 15 to all other damage.
