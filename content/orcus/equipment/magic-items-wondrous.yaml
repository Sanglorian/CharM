- id: ORCUS_MAGIC_MARVELOUS_PIGMENTS
  name: "Marvelous Pigments"
  type: Magic Item
  source: "Orcus Original"
  fields:
    "Item Slot": "Wondrous"
    "Magic Item Type": "Wondrous"
    "Item Level": "17"
    Cost: "65,000 gp"
    Property: >-
      These pigments allow you to create three-dimensional objects by painting
      them in two dimensions. The paint flows from the brush to form the desired
      object as you concentrate on its image. Each pot of paint is sufficient to
      cover 100 squares, which lets you create inanimate objects or terrain
      features – such as a door, a pit, flowers, trees, cells, rooms, or weapons
      up to 2 squares high. It takes 10 minutes to cover 4 squares. When you
      complete the painting, the object or terrain feature depicted becomes a
      real, nonmagical object. Thus, painting a door on a wall creates an actual
      door that can be opened to whatever is beyond. Painting a pit on a floor
      creates a real pit. Nothing created by the pigments can have a value
      greater than 25 gp. If you paint an object of greater value (such as a
      diamond or a pile of gold), the object looks authentic, but close
      inspection reveals it is made from paste, bone, or some other worthless
      material. If you paint a form of energy such as fire or lightning, the
      energy appears but dissipates as soon as you complete the painting, doing
      no harm to anything.
