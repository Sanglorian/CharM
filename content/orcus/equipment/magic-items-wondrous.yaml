# === Wondrous Items ===
- id: ORCUS_MAGIC_BAG_OF_TRICKS
  name: "Bag of Tricks"
  type: Magic Item
  source: "Orcus Original"
  fields:
    "Item Slot": "Wondrous"
    "Magic Item Type": "Wondrous"
    Property: >-
      Level X Each bag of tricks is associated with a different mook. The level
      of the bag is equal to the level of the mook it summons. Pull Out a Mook
      (standard, daily) Summons Place the associated mook in an unoccupied space
      adjacent to you. The mook is a companion, and follows the companion rules
      (including obeying your commands). At the end of the encounter or if
      reduced to 0 hit points or below, the mook disappears. The mook has the
      following feature: Instinct At the end of your turn, if the mook has not
      received a command that turn, it moves to the nearest enemy and makes a
      basic melee attack. If it has multiple basic melee attacks, you choose
      which it uses.
