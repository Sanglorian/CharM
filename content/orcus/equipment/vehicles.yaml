- id: ORCUS_VEHICLE_HOT_AIR_BALLOON
  name: "Hot-Air Balloon"
  type: Vehicle
  source: "Orcus Original"
  fields:
    "Item Level": "13"
    Size: "Huge"
    Capacity: "1+5"
    Cargo: "200 pounds"
    HP: "89"
    "Armor Class": "25"
    "Fortitude Defense": "27"
    "Reflex Defense": "21"
    "Will Defense": "N/A"
    Resistance: "hardness 5"
    Speed: "4"
    "Driver Skill": "Nature"
    Basket: >-
      The hot-air balloon counts as a Medium vehicle for the purposes of ramming
      and interactions with other vehicles.
    Careen: >-
      Just after its driver's place in the initiative count, the hot-air balloon
      drops 1d6 squares. It then moves a number of squares, in the direction the
      wind is blowing, based on the current wind strength: light wind 4 squares,
      strong wind 9 squares and a storm 12 squares.
    Description: >-
      The hot air balloon can seat up to 6 comfortably with two weeks
      provisions. It is not terribly reliable, and requires some effort at
      successful navigation. It travels at double speed when the wind is at its
      back and half speed when it is heading into the wind.

