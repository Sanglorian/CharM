# Vehicles (Orcus Advanced Options) — generated by tools/CharM.Orcus.Import
# (generate-vehicles). Structured stats (level/size/capacity/cargo/HP/defenses/
# resistance) plus verbatim Speed / Driver Skill / Description and named
# abilities (Careen, …). Do not hand-edit; regenerate instead.

- id: ORCUS_VEHICLE_CART
  name: "Cart"
  type: Vehicle
  source: "Orcus Original"
  fields:
    "Item Level": "1"
    Size: "Large"
    Capacity: "1+1"
    Cargo: "2,000 pounds"
    HP: "39"
    "Armor Class": "15"
    "Fortitude Defense": "17"
    "Reflex Defense": "11"
    "Will Defense": "N/A"
    Resistance: "hardness 5"
    Speed: >-
      The speed of the creature pulling it -4, or -2 if two creatures are
      pulling
    "Driver Skill": "Nature"
    Careen: >-
      Just after its driver's place in the initiative count, the cart moves the
      same distance it moved last round then comes to a stop. If the creature(s)
      pulling the cart are startled (for example under the effects of a power
      with the Fear tag), they may keep or start moving, and turn in a random
      direction.
    Description: "A cart, pulled by one or two beasts of burden."

- id: ORCUS_VEHICLE_DIRIGIBLE
  name: "Dirigible"
  type: Vehicle
  source: "Orcus Original"
  fields:
    "Item Level": "18"
    Size: "Gargantuan"
    Capacity: "2+8"
    Cargo: "2,500 pounds"
    HP: "114"
    "Armor Class": "30"
    "Fortitude Defense": "32"
    "Reflex Defense": "26"
    "Will Defense": "N/A"
    Resistance: "hardness 10"
    Speed: "12"
    "Driver Skill": "Perception"
    Careen: >-
      Just after its driver's place in the initiative count, the dirigible drops
      1d6 squares. It then moves a number of squares, in the direction the wind
      is blowing, based on the current wind strength: light wind 6 squares,
      strong wind 12 squares and a storm 18 squares.
    Description: "The dirigible is a form of hot air ship."

