# Magic items (Orcus Rulebook). Orcus uses four generic "enchanted item" families
# rather than a named catalogue, each giving a +X enhancement bonus. The core +X
# appears at levels 1/6/11/16/21/26 (boost variants, which only raise item level,
# are omitted for now). Modelled as `Magic Item` elements:
#   - Enchanted Armor / Cloak carry statadd rules, so equipping them raises AC /
#     defenses (the engine runs an equipped item's directives).
#   - Enchanted Weapon / Focus carry an `Enhancement` field, which the power
#     calculator adds to attack and damage rolls for that weapon/focus.
# Enchanted-armor AC scaling (light +1/+1 in the prestige/epic tiers; heavy x2)
# and the +Xd6 crit bonus are recorded in the Description.

- id: ORCUS_MAGIC_WEAPON_PLUS1
  name: "Enchanted Weapon +1"
  type: Magic Item
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Item Slot": Weapon
    "Magic Item Type": Weapon
    Enhancement: "+1"
    "Item Level": "1"
    Cost: "360 gp"
    Description: "+1 enhancement bonus to attack and damage rolls with that weapon; +1d6 damage on a critical hit. (Bindings enchant unarmed/natural attacks the same way.)"

- id: ORCUS_MAGIC_FOCUS_PLUS1
  name: "Enchanted Focus +1"
  type: Magic Item
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Item Slot": Implement
    "Magic Item Type": Focus
    Enhancement: "+1"
    "Item Level": "1"
    Cost: "360 gp"
    Description: "+1 enhancement bonus to attack and damage rolls with that focus; +1d6 damage on a critical hit."

- id: ORCUS_MAGIC_ARMOR_PLUS1
  name: "Enchanted Armor +1"
  type: Magic Item
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Item Slot": Body
    "Magic Item Type": Armor
    Enhancement: "+1"
    "Item Level": "1"
    Cost: "360 gp"
    Description: "+1 enhancement bonus to Armor Class. Light armor gives +1 more in the prestige tier and +1 again in the epic tier; heavy armor gives double this bonus."
  rules:
    - { statadd: AC, value: 1, bonusType: Enhancement }

- id: ORCUS_MAGIC_CLOAK_PLUS1
  name: "Enchanted Cloak +1"
  type: Magic Item
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    "Item Slot": Neck
    "Magic Item Type": Neck
    Enhancement: "+1"
    "Item Level": "1"
    Cost: "360 gp"
    Description: "+1 enhancement bonus to Fortitude, Reflex and Will defenses. Includes amulets, necklaces and talismans."
  rules:
    - { statadd: Fortitude Defense, value: 1, bonusType: Enhancement }
    - { statadd: Reflex Defense, value: 1, bonusType: Enhancement }
    - { statadd: Will Defense, value: 1, bonusType: Enhancement }

