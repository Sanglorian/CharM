# Orcus ancestry: the Humanity base (a Race) plus a sample of Cruxes and
# Heritages, chosen via selects on the Race. A full transcription would include
# all 16 cruxes and 6 heritages; this slice includes two of each.

# --- Humanity (base ancestry) -------------------------------------------------
- id: ORCUS_RACE_HUMANITY
  name: Humanity
  type: Race
  source: "Orcus (Outlaw Kingdoms)"
  categories: [Medium]
  fields:
    Size: Medium
    Speed: 6 squares
    Vision: Normal
    "Ability Scores": "+2 to two ability scores of your choice"
    Languages: "Common and one other"
    Description: >
      The default Orcus ancestry: heroes defined by the moment that marked them
      (their crux) and the culture they came from (their heritage), rather than
      by species.
  rules:
    - grant: ORCUS_INTERNAL_GRANTS_HUMANITY
      type: Grants
    - statadd: Speed
      value: 6
    - statadd: Language Count
      value: 2
    # +2 to two different ability scores of the player's choice.
    - select:
        type: Race Ability Bonus
        number: 2
        name: Humanity Ability Scores
    # Pick the two halves of your ancestry.
    - select:
        type: Crux
        number: 1
        name: Crux
    - select:
        type: Heritage
        number: 1
        name: Heritage

- id: ORCUS_INTERNAL_GRANTS_HUMANITY
  name: Humanity Grants
  type: Grants
  fields: { _SupportsID: ORCUS_RACE_HUMANITY }
  rules:
    - grant: ORCUS_SIZE_MEDIUM
      type: Size
    - grant: ORCUS_VISION_NORMAL
      type: Vision

# --- Cruxes -------------------------------------------------------------------
- id: ORCUS_CRUX_HERO
  name: Hero
  type: Crux
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: >
      You risked your own life to defend something precious: perhaps a loved one,
      a vital military position or a secret.
    Unmoved: >
      Reduce any unwilling movement you are subject to by 1 square. When you would
      fall prone as the result of an attack, make a saving throw; on a success you
      do not fall.
  rules:
    - statadd: Athletics
      value: +2
      bonusType: Ancestry
    - grant: ORCUS_POWER_VIOLENT_RUSH
      type: Power

- id: ORCUS_CRUX_SAGE
  name: Sage
  type: Crux
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: >
      Through knowledge, practice and experience, you provided sage advice that
      prevented the unthinkable.
  rules:
    - statadd: Perception
      value: +2
      bonusType: Ancestry
    # "You are trained in an extra skill of your choice."
    - select:
        type: Skill Training
        number: 1
        name: Sage Extra Skill
    - grant: ORCUS_POWER_INGENUITY
      type: Power

# --- Heritages ----------------------------------------------------------------
- id: ORCUS_HERITAGE_ARISTOCRAT
  name: Aristocrat
  type: Heritage
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: "You are a patrician, and believe yourself to be one of a finer class of people."
  rules:
    - statadd: Intimidate
      value: +2
      bonusType: Ancestry
    - statadd: Will
      value: +1
      bonusType: Ancestry

- id: ORCUS_HERITAGE_SEAFARER
  name: Seafarer
  type: Heritage
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: "You grew up on boats or ships."
  rules:
    - statadd: Athletics
      value: +2
      bonusType: Ancestry
    - statadd: Reflex
      value: +1
      bonusType: Ancestry

# --- Crux feature powers ------------------------------------------------------
- id: ORCUS_POWER_VIOLENT_RUSH
  name: Violent Rush
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [feature]
  fields:
    "Power Usage": Encounter
    "Action Type": Free Action
    Keywords: Martial
    "Power Type": Utility
    Trigger: "You hit with an attack."
    Effect: "Attack does +1dW. If attack was not with a weapon, +1d8 instead."
    Flavor: "You press the advantage before the enemy can recover."

- id: ORCUS_POWER_INGENUITY
  name: Ingenuity
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [feature]
  fields:
    "Power Usage": Encounter
    "Action Type": Swift Action
    Keywords: Martial
    "Power Type": Utility
    Target: "Near burst 5, self or one ally"
    Effect: >
      Choose one: target shifts up to 2 as a free action; target makes a saving
      throw; target gets +2 power bonus to next attack roll; or target gets +4
      power bonus to next skill check. Power bonuses expire at the end of your
      next turn if not used.

# === Remaining Cruxes (Player Options) ========================================
# Hero and Sage are above. Each crux gives a +2 skill, some always-on traits
# (descriptive) and usually a feature power. Several powers are shared with the
# species ancestries and reused here by id.
- id: ORCUS_CRUX_BETRAYER
  name: Betrayer
  type: Crux
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: "You betrayed someone or something you once held dear, and it forever left its mark on you."
    "Resistance to Poison": "Resistance to poison damage 5 + half your level."
    "Hold Breath": "+5 ancestry bonus to Endure checks to hold your breath."
  rules:
    - { statadd: Bluff, value: +2, bonusType: Ancestry }
    - { grant: ORCUS_POWER_POISONOUS_NIP, type: Power }

- id: ORCUS_CRUX_CUT_OFF
  name: Cut Off
  type: Crux
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: "Someone destroyed everyone and everything you loved."
    "Go for the Jugular": "+1 ancestry bonus on attacks against staggered enemies."
  rules:
    - { statadd: Heal, value: +2, bonusType: Ancestry }
    - { grant: ORCUS_POWER_VENGEANCE_OF_THE_PIT, type: Power }

- id: ORCUS_CRUX_DESTINED
  name: Destined
  type: Crux
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: "Some great event or portent at your birth set your heroism in motion, through no choice of your own."
    "Face the Elements": "Resistance to fire and cold damage 5 + half your level."
    Dabbler: "Choose a level 1 at-will attack power from any class. It is an encounter power for you."
  rules:
    - { statadd: History, value: +2, bonusType: Ancestry }

- id: ORCUS_CRUX_ESCAPED
  name: Escaped
  type: Crux
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: "You were imprisoned, trapped or otherwise doomed - but you somehow slipped away."
    "Hide in a Flash": "When you make an initiative check, if you are in cover or concealment, you can make a Stealth check to hide (no action)."
    "Web Stride": "Webs are not difficult terrain for you."
  rules:
    - { statadd: Acrobatics, value: +2, bonusType: Ancestry }
    - { grant: ORCUS_POWER_DISAPPEARING_ACT, type: Power }

- id: ORCUS_CRUX_HEIR
  name: Heir
  type: Crux
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: "You discovered that perched in your family tree is a dragon, and its greatness courses in your veins."
    "Minor Magics": "You know one power from the Cantrips discipline."
  rules:
    - { statadd: Insight, value: +2, bonusType: Ancestry }
    - { grant: ORCUS_POWER_BREATH_WEAPON, type: Power }

- id: ORCUS_CRUX_NINTH_LIFE
  name: Ninth Life
  type: Crux
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: "Through sheer chutzpah and unbelievable luck, you have survived ordeals that would have left anyone else dead eight times over."
    "Eager Charge": "Your speed increases by +2 when you charge."
  rules:
    - { statadd: Sleight of Hand, value: +2, bonusType: Ancestry }
    - { grant: ORCUS_POWER_LUCKY, type: Power }

- id: ORCUS_CRUX_OTHERWORLDLY
  name: Otherworldly
  type: Crux
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: "You come from another place or time, or are destined to leave this one in time."
    Nimbleness: "+2 ancestry bonus to AC against opportunity attacks."
  rules:
    - { statadd: Stealth, value: +2, bonusType: Ancestry }
    - { grant: ORCUS_POWER_HIGHBLOOD_TELEPORT, type: Power }

- id: ORCUS_CRUX_RETURNED
  name: Returned
  type: Crux
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: "You survived impossible peril, physical harm or terror, and came back of your own volition."
    "Injured Rage": "+1 ancestry bonus on attack rolls while staggered."
    "Shake Off Fear": "+5 ancestry bonus on saving throws against Fear powers and effects."
  rules:
    - { statadd: Endure, value: +2, bonusType: Ancestry }
    - { grant: ORCUS_POWER_TOUGH_AS_NAILS, type: Power }

- id: ORCUS_CRUX_THIRD_EYED
  name: Third Eyed
  type: Crux
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: "You experienced something that opened your mind to something beyond this physical world."
    "Shared Mind": "You gain telepathy 5 (mental communication with creatures within 5 squares that share a language)."
    "Shake Off Illusion": "+5 ancestry bonus on saving throws against Illusion powers and effects."
  rules:
    - { statadd: Arcana, value: +2, bonusType: Ancestry }
    - { grant: ORCUS_POWER_CAREFUL_FOCUS, type: Power }

- id: ORCUS_CRUX_WILD_CHILD
  name: Wild Child
  type: Crux
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: "You were abandoned to the wilderness."
    "Versatile Stride": "You ignore difficult terrain."
    "Low-Light Vision": "You can see in dim light as if it were bright light."
  rules:
    - { statadd: Nature, value: +2, bonusType: Ancestry }
    - { grant: ORCUS_POWER_BARREL_ALONG, type: Power }

# === Remaining Heritages (Player Options) =====================================
# Aristocrat and Seafarer are above.
- id: ORCUS_HERITAGE_HERETIC
  name: Heretic
  type: Heritage
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: "Your family belonged to a forbidden religion, exposing you to constant persecution."
    "Focus Proficiency": "You have proficiency with orbs, staffs and wands."
  rules:
    - { statadd: Religion, value: +2, bonusType: Ancestry }

- id: ORCUS_HERITAGE_MOUNTAINFOLK
  name: Mountainfolk
  type: Heritage
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: "You come from an isolated town in the mountains."
  rules:
    - { statadd: Dungeoneering, value: +2, bonusType: Ancestry }
    - { grant: ORCUS_POWER_RELENTLESS_ENDURANCE, type: Power }

- id: ORCUS_HERITAGE_TRAVELER
  name: Traveler
  type: Heritage
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: "Your family moved about a lot, whether out of wanderlust or necessity."
  rules:
    - { statadd: Diplomacy, value: +2, bonusType: Ancestry }
    - { statadd: Speed, value: +1, bonusType: Ancestry }

- id: ORCUS_HERITAGE_URCHIN
  name: Urchin
  type: Heritage
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: "You grew up on the streets, without parents - or without parents worth speaking of."
    "Light Blade Weapon Proficiency": "You have proficiency with martial weapons in the light blades group."
  rules:
    - { statadd: Streetsmarts, value: +2, bonusType: Ancestry }

# === New crux/heritage feature powers =========================================
- id: ORCUS_POWER_DISAPPEARING_ACT
  name: Disappearing Act
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [feature]
  fields:
    "Power Usage": Encounter
    "Action Type": Reaction Action
    "Power Type": Utility
    Keywords: Martial
    Target: Self
    Trigger: "You take damage."
    Effect: "Become invisible until the end of your next turn, or until you make an attack (whichever comes sooner)."

- id: ORCUS_POWER_TOUGH_AS_NAILS
  name: Tough as Nails
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [feature]
  fields:
    "Power Usage": Encounter
    "Action Type": Swift Action
    "Power Type": Utility
    Keywords: Martial
    Target: Self
    Effect: "You rally."

- id: ORCUS_POWER_BARREL_ALONG
  name: Barrel Along
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [feature]
  fields:
    "Power Usage": Encounter
    "Action Type": Swift Action
    "Power Type": Utility
    Keywords: Martial
    Target: Self
    Trigger: "You are staggered."
    Effect: "You gain a +2 bonus to speed and to damage rolls until the end of the encounter."

- id: ORCUS_POWER_RELENTLESS_ENDURANCE
  name: Relentless Endurance
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [feature]
  fields:
    "Power Usage": Encounter
    "Action Type": Counter Action
    "Power Type": Utility
    Keywords: Martial
    Target: Self
    Trigger: "You become staggered."
    Effect: "Gain temporary hit points equal to your level."
