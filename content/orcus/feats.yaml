    Benefit: "Shields do not inflict an armor check penalty on you."

- id: ORCUS_FEAT_SHIELD_PROFICIENCY
  name: "Shield Proficiency"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Prerequisite: >-
      Depends on the shield you wish to gain proficiency with: Light: Str 13
      Heavy: Str 15, proficient with light shields
    Benefit: >-
      Choose a type of shield you meet the prerequisites for (light or heavy).
      You are proficient with that type of shield.
    Special: >-
      You can gain Shield Proficiency a second time to gain proficiency with
      heavy shields.
  rules:
    - { select: { type: Proficiency, number: 1, category: ORCUS_SHIELD_PROFS, name: Shield Proficiency } }

- id: ORCUS_FEAT_SKILL_FOCUS
  name: "Skill Focus"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Prerequisite: "You must have at least one rank in the chosen skill"
