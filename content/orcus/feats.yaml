- id: ORCUS_FEAT_TAG_TEAM
  name: "Tag Team"
  type: Feat
  source: "Orcus Original"
  prereqs: "11th level"
  fields:
    "Feat Category": "General Feats"
    Prerequisite: "11th level"
    Benefit: >-
      If an ally hits an enemy adjacent to you with a melee attack, you can deal
      damage to that enemy equal to your Strength or Dexterity modifier as an
