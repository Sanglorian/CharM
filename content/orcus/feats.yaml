# Feats (Orcus Player Options) — generated verbatim by
# tools/CharM.Orcus.Import (generate-feats). One element per feat; text fields
# (Flavor/Prerequisite/Benefit/Special/…) are copied from the source and round-
# trip checked against it. "Feat Category" records the source sub-heading. A
# small curated rules overlay re-applies the mechanical bonuses (defenses and
# their 11th/21st scaling, Perception, Heal, HP, initiative, the Skill Training
# select); other feats carry their text only. Characters gain a
# feat per the level slots in _internal/level.yaml. Do not hand-edit; regenerate.

# === Variant: Bonus Feats ===
# === General Feats ===
- id: ORCUS_FEAT_ALERTNESS
  name: "Alertness"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      You get a +2 bonus on all Perception checks and you cannot be caught
      surprised.
  rules:
    - { statadd: Perception, value: 2, bonusType: Feat }

- id: ORCUS_FEAT_ARCANE_ARCHER
  name: "Arcane Archer"
  type: Feat
  source: "Orcus Original"
  prereqs: "Athame"
  fields:
    "Feat Category": "General Feats"
    Prerequisite: "Athame (ranged or thrown weapon)."
    Benefit: >-
      When you use a ranged or thrown weapon as your focus, you can use its
      range instead of the power's range for ranged or far attack powers.

- id: ORCUS_FEAT_ARMOR_FOCUS
  name: "Armor Focus"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: "Armor does not inflict an armor check penalty on you."

- id: ORCUS_FEAT_ARMOR_GRACE
  name: "Armor Grace"
  type: Feat
  source: "Orcus Original"
  prereqs: "Armor Focus"
  fields:
    "Feat Category": "General Feats"
    Prerequisite: "Armor Focus"
    Benefit: >-
      You can move at full speed when wearing heavy armor or carrying a heavy
      load.

- id: ORCUS_FEAT_ARMOR_PROFICIENCY
  name: "Armor Proficiency"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Prerequisite: >-
      Depends on the armor you wish to gain proficiency with: Leather: No
      prerequisites. Chainmail: Str 13, Con 13, proficiency with leather or hide
      armor Hide: Str 13, Con 13, proficiency with leather armor Full plate: Str
      15, Con 15, proficiency with scale armor Scale mail: Str 13, Con 13,
      proficiency with chainmail
    Benefit: >-
      Choose a type of armor you meet the prerequisites for. You are proficient
      with that type of armor.
    Special: >-
      You can gain Armor Proficiency multiple times. Each time you take the
      feat, it applies to a new type of armor.
  rules:
    - { select: { type: Proficiency, number: 1, category: ORCUS_ARMOR_PROFS, name: Armor Proficiency } }

- id: ORCUS_FEAT_ATHAME
  name: "Athame"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Prerequisite: "Proficiency with one or more focuses."
    Benefit: >-
      Choose one weapon type (longsword, longbow, etc.) that you are proficient
      with. You can use a weapon of that type, including a magic weapon, as your
      focus. Add its enhancement bonus, if any, to attack and damage rolls with
      powers with the Focus tag. If you score a critical hit, you do additional
      damage equal to 1d6 times by the enhancement bonus of the weapon. Any
      properties of the enchanted weapon apply to powers to powers you use with
      the weapon as your focus.
    Special: >-
      Your weapon's proficiency bonus, however, is not applied to focus powers
      even if you use the weapon as a focus.

- id: ORCUS_FEAT_AVOIDANCE
  name: "Avoidance"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      Opportunity attacks suffer a -2 penalty on attack rolls against you.

- id: ORCUS_FEAT_AWARENESS
  name: "Awareness"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      You may use your Wisdom bonus instead of your Dexterity bonus to determine
      your initiative bonus.
    Special: >-
      Note that the Improved Initiative feat will be a better choice for most
      characters.

- id: ORCUS_FEAT_BASHING_SHIELD
  name: "Bashing Shield"
  type: Feat
  source: "Orcus Original"
  prereqs: "Armor Proficiency (Light Shield)"
  fields:
    "Feat Category": "General Feats"
    Flavor: "You can push back enemies when the situation becomes dire."
    Prerequisite: "Proficiency with light shields"
    Benefit: >-
      Once per encounter, as an immediate (react) action after someone has
      missed a melee attack against you, you can push that enemy 1d4 squares
      away from you. You must be equipped with a shield with which you are
      proficient to receive this benefit.

- id: ORCUS_FEAT_BLIND_FIGHTING
  name: "Blind-Fighting"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      Ignore attack penalties because your target is in concealment or total
      concealment.

- id: ORCUS_FEAT_CANTRIP_MASTER
  name: "Cantrip Master"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: "You learn three powers from the Cantrips discipline."
    Special: >-
      You can gain Cantrip Master multiple times. Each time you take the feat,
      you learn three new powers from the Cantrips discipline.
  rules:
    - { select: { type: Power, number: 3, category: ORCUS_DISCIPLINE_CANTRIPS, name: Cantrip Master } }

- id: ORCUS_FEAT_CROSSFIRE
  name: "Crossfire"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      While you wield a ranged weapon, you can flank from two squares away from
      an enemy as long as you would be flanking the target if you moved into the
      nearest adjacent square.

- id: ORCUS_FEAT_CROSSFIRE_IMPROVED
  name: "Crossfire, Improved"
  type: Feat
  source: "Orcus Original"
  prereqs: "21st level, Crossfire"
  fields:
    "Feat Category": "General Feats"
    Prerequisite: "21st level, Crossfire"
    Benefit: >-
      While you wield a ranged weapon, you can flank from three squares away
      from an enemy as long as you would be flanking the target if you moved
      into the nearest adjacent square.

- id: ORCUS_FEAT_DEFLECTING_SHOT
  name: "Deflecting Shot"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: "Ignore attack penalties because your target is in cover."

- id: ORCUS_FEAT_EASY_TARGET
  name: "Easy Target"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      When targeting a Large or larger creature with an arc, burst, or wall
      attack, you gain a +2 bonus to damage rolls against the target for every
      square beyond the first that it occupies.

- id: ORCUS_FEAT_ENERGY_RESISTANCE
  name: "Energy Resistance"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      You gain resistance to a damage type equal to your level. Choose from one
      of the following damage types: acid, cold, fire, force, lightning,
      necrotic, poison, psychic, radiant or thunder.
    Special: >-
      You can gain Energy Resistance multiple times. Each time you take the
      feat, it applies to a new type of energy.

- id: ORCUS_FEAT_FLING_FAMILIAR
  name: "Fling Familiar"
  type: Feat
  source: "Orcus Original"
  prereqs: "category:ORCUS_FAMILIAR"
  fields:
    "Feat Category": "General Feats"
    Prerequisite: "You have a familiar"
    Benefit: >-
      When you call your familiar, it appears in an unoccupied space within 12
      squares of you.

- id: ORCUS_FEAT_FOCUSED_CASTER
  name: "Focused Caster"
  type: Feat
  source: "Orcus Original"
  prereqs: "2nd level"
  categories: [ORCUS_BONUS_FEAT_CHOICE]
  fields:
    "Feat Category": "General Feats"
    Prerequisite: "Level 2"
    Benefit: >-
      Choose one type of focus, like “wands” or “orbs”. You gain a +1 feat bonus
      on all attack rolls you make using the selected focus, provided you are
      proficient with them. At level 11, this bonus increases to +2. At level
      21, this bonus increases to +3.
    Special: >-
      You can gain this feat multiple times. Its effects do not stack. Each time
      you take the feat, it applies to a new type of focus.

- id: ORCUS_FEAT_FROM_THE_DECK
  name: "From the Deck"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: "You do not suffer the penalty to attack rolls for being prone."

- id: ORCUS_FEAT_GAME_OF_STICKS
  name: "Game Of Sticks"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Flavor: "You are trained in a stick-based martial art."
    Benefit: >-
      When wielding a quarterstaff, it gains the reach property. Critical: If
      you score a critical hit with a quarterstaff, the target drops one held
      item and is dazed until the start of your next turn.

- id: ORCUS_FEAT_GREAT_FORTITUDE
  name: "Great Fortitude"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      You get a +2 feat bonus to Fortitude defense. At level 11, this bonus
      increases to +3. At level 21, this bonus increases to +4.
  rules:
    - { statadd: Fortitude Defense, value: 2, bonusType: Feat }
    - { statadd: Fortitude Defense, value: 3, bonusType: Feat, level: 11 }
    - { statadd: Fortitude Defense, value: 4, bonusType: Feat, level: 21 }

- id: ORCUS_FEAT_HUNKER_DOWN
  name: "Hunker Down"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      As a swift action, you can spend a recovery to gain resistance to all
      damage 5 until the end of your next turn. Critical: If you score a
      critical hit and you have spent a recovery on this feat since the start of
      your last turn, you gain a bonus equal to half your recovery value to your
      next melee damage roll.

- id: ORCUS_FEAT_IMPROVED_INITIATIVE
  name: "Improved Initiative"
  type: Feat
