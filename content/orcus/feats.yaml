    - { statadd: Reflex Defense, value: 3, bonusType: Feat, level: 11 }
    - { statadd: Reflex Defense, value: 4, bonusType: Feat, level: 21 }

- id: ORCUS_FEAT_LINGUISTIC_SAVANT
  name: "Linguistic Savant"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Flavor: "You are talented at learning languages."
    Benefit: >-
      You may speak three new languages that are available for you to learn. If
      you are not illiterate, you can also read and write in these languages.
    Special: >-
      You can gain Linguistic Savant multiple times. Each time you take the
      feat, it applies to three new languages.

- id: ORCUS_FEAT_MELEE_FINESSE
  name: "Melee Finesse"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      Choose an ability. Use that ability modifier for your basic melee attack's
      attack rolls, instead of Strength. You may also add half that ability
      modifier to damage in lieu of your Strength modifier, if it is higher.

- id: ORCUS_FEAT_MONSTER_EXPERT
  name: "Monster Expert"
  type: Feat
  source: "Orcus Original"
  prereqs: "11th level"
  fields:
    "Feat Category": "General Feats"
    Prerequisite: "11th level"
    Benefit: >-
      You can take 10 on knowledge and monster knowledge checks with skills you
      are trained in, and you can take 10 with these skills during an encounter
      as a standard action.

- id: ORCUS_FEAT_NIGHT_SIGHT
  name: "Night Sight"
  type: Feat
  source: "Orcus Original"
  prereqs: "Low-light"
  fields:
    "Feat Category": "General Feats"
    Prerequisite: "Low-light vision."
    Benefit: >-
      You gain darkvision up to 2 squares distance. Level 11: You gain
      darkvision (to the same distance as your regular sight).

- id: ORCUS_FEAT_NON_LETHAL_INTENT
  name: "Non-Lethal Intent"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      If you inflict damage with a melee attack equal to half the target's
      staggered value in a single turn, you can elect to inflict no damage for
      that entire turn and instead stun the target until the start of your next
      turn. In addition, if the damage equals or exceeds the target's staggered
      value, you can elect to inflict no damage for that entire turn and instead
      knock the target prone and render it unconscious for five minutes. Any
      further damage wakes the target up.

- id: ORCUS_FEAT_RANGED_DISCIPLINE
  name: "Ranged Discipline"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      You can treat a one-handed ranged weapon you are wielding as a melee
      weapon with a reach of 1 for the purpose of using powers and making
      attacks, including opportunity attacks.

- id: ORCUS_FEAT_RAPID_RELOAD
  name: "Rapid Reload"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      Weapons you wield with the Loading (swift) property only take a free
      action to reload.

- id: ORCUS_FEAT_RESILIENCE
  name: "Resilience"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      Your recovery value increases by +3. Level 11: By +1 further, to +4. Level
      21: By +1 further, to +5.

- id: ORCUS_FEAT_ROLLING_KIP
  name: "Rolling Kip"
  type: Feat
