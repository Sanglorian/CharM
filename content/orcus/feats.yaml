    "Feat Category": "General Feats"
    Prerequisite: "11th level"
    Benefit: >-
      If you fall prone, you can make a DC 20 Acrobatics roll as a reaction to
      immediately stand up.

- id: ORCUS_FEAT_SIGN_OF_WEAKNESS
  name: "Sign of Weakness"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      The first time a creature is staggered in an encounter, your next hit
      against that creature gains a bonus to the damage roll equal to your
      Wisdom modifier. This may only occur once per target per encounter.

- id: ORCUS_FEAT_SHARP_OPPORTUNIST
  name: "Sharp Opportunist"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      You get a +2 bonus on attack rolls when making opportunity attacks.

- id: ORCUS_FEAT_SHIELD_FOCUS
  name: "Shield Focus"
  type: Feat
  source: "Orcus Original"
  fields:
