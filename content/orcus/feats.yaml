- id: ORCUS_FEAT_WEAPON_PROFICIENCY
  name: "Weapon Proficiency"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      Choose one type of weapon, like “longsword” or “light crossbow”. You are
      proficient with that type of weapon.
    Special: >-
      You can gain this feat multiple times. Its effects do not stack. Each time
      you take the feat, it applies to a new type of weapon.
  rules:
    - { select: { type: Proficiency, number: 1, category: ORCUS_WEAPON_PROFS, name: Weapon Proficiency } }

- id: ORCUS_FEAT_WEAPON_SPECIALIZATION
  name: "Weapon Specialization"
  type: Feat
  source: "Orcus Original"
  prereqs: "2nd level"
  fields:
    "Feat Category": "General Feats"
    Prerequisite: "Level 2"
    Benefit: >-
      Choose one weapon group, like “axes” or “spears and lances”. You gain a +1
      bonus on all damage rolls you make using the selected weapons. At level
      11, this bonus increases to +2. At level 21, this bonus increases to +3.
    Special: >-
      You can gain this feat multiple times. Its effects do not stack. Each time
      you take the feat, it applies to a new group of weapons.
  rules:
    - { select: { type: Weapon Specialization, number: 1, category: ORCUS_WEAPON_SPEC, name: Weapon Specialization } }

# === Martial Training Feats ===
- id: ORCUS_FEAT_BALANCE_AND_DIRECTION
  name: "Balance and Direction"
  type: Feat
  source: "Orcus Original"
  prereqs: "Unarmed Combat"
  fields:
    "Feat Category": "Martial Training Feats"
    Flavor: >-
      You are trained in a martial art focused on pure foot and fist fighting.
    Prerequisite: "Unarmed Combat"
    Benefit: >-
      If you are unarmed or wielding only natural weapons, you gain a +1 feat
      bonus to all defenses against melee attacks. Critical: If you score a
      critical hit with an unarmed attack, the target is weakened and grants you
      combat advantage until the end of your next turn.

- id: ORCUS_FEAT_BEST_ON_THE_MAT
  name: "Best on the Mat"
  type: Feat
  source: "Orcus Original"
  prereqs: "Evolution of Pankration, Unarmed Combat"
  fields:
    "Feat Category": "Martial Training Feats"
    Prerequisite: "Evolution of Pankration, Unarmed Combat"
    Benefit: >-
      You gain a +1 feat bonus to grapples and attack powers involving grapples
      while prone. You gain a +2 feat bonus to damage against grappled opponents
      while you are prone.

- id: ORCUS_FEAT_BOUNCING_COMBO
  name: "Bouncing Combo"
  type: Feat
  source: "Orcus Original"
  prereqs: "21st level, Unarmed Combat"
  fields:
    "Feat Category": "Martial Training Feats"
    Prerequisite: "21st level, Unarmed Combat"
    Benefit: >-
      If you stagger or drop an enemy with an unarmed attack, you can take a
      move action that must be used before the end of your turn. You can only
      gain one move action this way per round, and you can only use it to walk,
      run, or shift.

- id: ORCUS_FEAT_EARNED_THE_BELT
  name: "Earned the Belt"
  type: Feat
  source: "Orcus Original"
  prereqs: "11th level, Evolution of Pankration, Unarmed Combat"
  fields:
    "Feat Category": "Martial Training Feats"
    Prerequisite: "11th level, Evolution of Pankration, Unarmed Combat"
    Benefit: >-
      You can sustain two grapples with only a single swift action. You can move
      a grappled target one square with a move action without requiring a
      Strength attack.

- id: ORCUS_FEAT_EVOLUTION_OF_PANKRATION
  name: "Evolution of Pankration"
  type: Feat
  source: "Orcus Original"
  prereqs: "Unarmed Combat"
  fields:
    "Feat Category": "Martial Training Feats"
    Flavor: "You are trained in a martial art involving pinning or submission."
    Prerequisite: "Unarmed Combat"
    Benefit: >-
      You do not grant combat advantage if prone. If you grapple a prone
      opponent, they are restrained instead of immobile (you are still capable
      of forcing movement on the target) and cannot stand until they escape.
      Critical: If you roll a natural 20 on a grapple attempt or attack power
      that involves a grapple, the target cannot attempt to escape from the
      grapple on its next turn.

- id: ORCUS_FEAT_HAM_HANDS
  name: "Ham Hands"
  type: Feat
  source: "Orcus Original"
  prereqs: "21st level, Unarmed Combat"
  fields:
    "Feat Category": "Martial Training Feats"
    Prerequisite: "21st level, Unarmed Combat"
    Benefit: >-
      If you hit a target one size larger than you or smaller with an unarmed
      attack, you can spend a move action to immobilize that target until the
      start of your next turn. This takes up a hand.

- id: ORCUS_FEAT_JUMPING_KNEE
  name: "Jumping Knee"
  type: Feat
  source: "Orcus Original"
  prereqs: "Unarmed Combat, Unarmed Expanded Profile"
  fields:
    "Feat Category": "Martial Training Feats"
    Prerequisite: "Unarmed Combat, Unarmed Expanded Profile"
    Benefit: >-
      When you hit with an unarmed attack as part of a charge, the target also
      suffers the effects of a bull rush as well the damage from the hit. If the
      target cannot be pushed because of an obstruction, it takes an additional
      +2 damage.

- id: ORCUS_FEAT_KAYFABE_MANEUVER
  name: "Kayfabe Maneuver"
  type: Feat
  source: "Orcus Original"
  prereqs: "Superior Position"
  fields:
    "Feat Category": "Martial Training Feats"
    Prerequisite: "Superior Position"
    Benefit: >-
      You can move a target you have grappled with a move action instead of a
      standard action.

- id: ORCUS_FEAT_MASTER_DEGREE_MARTIAL_ARTIST
  name: "Master Degree Martial Artist"
  type: Feat
  source: "Orcus Original"
  prereqs: "21st level, Unarmed Combat"
  fields:
    "Feat Category": "Martial Training Feats"
    Prerequisite: "21st level, Unarmed Combat"
    Benefit: >-
      With unarmed attacks, you score a critical hit on a natural roll of 19 or
      20.

- id: ORCUS_FEAT_SUPERIOR_POSITION
  name: "Superior Position"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "Martial Training Feats"
    Benefit: >-
      When an enemy attempts to escape from a grapple you are sustaining,
      regardless if the target uses Acrobatics or Athletics, it rolls against
      the higher of your Fortitude or Reflex defenses. In addition, you do not
      release an opponent from a grapple if you are dazed.

- id: ORCUS_FEAT_THE_RITUAL_OF_DANCE_AND_DAMAGE
  name: "The Ritual of Dance and Damage"
  type: Feat
  source: "Orcus Original"
  prereqs: "Unarmed Combat, Unarmed Expanded Profile"
  fields:
    "Feat Category": "Martial Training Feats"
    Flavor: >-
      Your combat style has become flamboyant and entertaining when not directly
      involved in the harming of another.
    Prerequisite: "Unarmed Combat, Unarmed Expanded Profile"
    Benefit: >-
      While you are unarmed or wielding only natural weapons and are in reach of
      an enemy, you can shift two squares as a move action instead of one as
      long as you remain in reach of that enemy. Critical: If you score a
      critical hit with an unarmed attack, you can shift up to your speed as
      free action and gain combat advantage against all adjacent enemies until
      the end of your next turn.

- id: ORCUS_FEAT_UNARMED_COMBAT
  name: "Unarmed Combat"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "Martial Training Feats"
    Benefit: >-
      You are proficient with your fists in combat. Your unarmed strikes gain a
      +3 proficiency bonus. Your one-handed unarmed strikes do 1d6 damage and
      have the side weapon property. Your two-handed unarmed strikes do 1d10
      damage.

- id: ORCUS_FEAT_UNARMED_COMBAT_IMPROVED
  name: "Unarmed Combat (Improved)"
  type: Feat
  source: "Orcus Original"
  prereqs: "Unarmed Combat"
  fields:
    "Feat Category": "Martial Training Feats"
    Prerequisite: "Unarmed Combat"
    Benefit: >-
      Your one-handed unarmed strikes do 1d8 damage. Your two-handed unarmed
      strikes do 1d12 damage.

- id: ORCUS_FEAT_UNARMED_COMBAT_MASTER
  name: "Unarmed Combat (Master)"
  type: Feat
  source: "Orcus Original"
  prereqs: "11th level, Unarmed Combat, Unarmed Combat (Improved)"
  fields:
    "Feat Category": "Martial Training Feats"
    Prerequisite: "11th level, Unarmed Combat, Unarmed Combat (Improved)"
    Benefit: >-
      Your one-handed unarmed strikes do 1d10 damage. Your two-handed unarmed
      strikes do 2d8 damage.

- id: ORCUS_FEAT_UNARMED_EXPANDED_PROFILE
  name: "Unarmed Expanded Profile"
  type: Feat
  source: "Orcus Original"
  prereqs: "Unarmed Combat"
  fields:
    "Feat Category": "Martial Training Feats"
    Flavor: "Your legs become part of your unarmed attack profile."
    Prerequisite: "Unarmed Combat"
    Benefit: >-
      You can spend a move action before making an unarmed melee attack to gain
      a +2 bonus to all damage rolls with that attack. At 11th level, this bonus
      increases to +3 and at 21st level, it increases to +4.

# === Art Feats ===
- id: ORCUS_FEAT_BEYOND_KEN
  name: "Beyond Ken"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "Art Feats"
    Benefit: >-
      Choose one category of practice or incantation (schema, treatment,
      practical, curative, etc.). Treat your level as 4 higher for the purposes
      of learning and performing the arts of that category.

- id: ORCUS_FEAT_PRACTICAL_ARTISAN
  name: "Practical Artisan"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "Art Feats"
    Benefit: >-
      You learn one art of each level, up to your current level, without
      spending the time or money normally required. Each time you increase in
      level, you learn one additional art of your current level or lower.

- id: ORCUS_FEAT_VARIED_ARTS
  name: "Varied Arts"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "Art Feats"
    Benefit: "You can learn arts that belong to a skill you are not trained in."

# === Channel Divinity Feats ===
- id: ORCUS_FEAT_BLESSING_OF_THE_GOD
  name: "Blessing of the God"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "Channel Divinity Feats"
    Prerequisite: "You have the Channel Divinity feature."
    Benefit: >-
      Choose one Channel Divinity power from the list below, based on a theme
      associated with the god(s) you worship. When you Channel Divinity, you can
      choose that power.
    Special: >-
      You can take this feat multiple times, choosing a different power each
      time. | Domain | Outlaw Kingdoms god | Channel Divinity power | |
      ----------- | ------------------- | ---------------------- | | Destruction
      | Valkon, Vogg | Explosive item | | Family | Yaheine | Wrath of the
      she-bear | | Feasting | Chalavar | Shared bite | | Greed | Chalavar, Thoin
      | I'll have that | | Life | Yaheine | Guidance | | Light | Shehaan | Light
      shadow | | Love | Thalander | Easy charm | | Mischief | Vaath | Death
      defying | | Murder | Larhoon, Vogg | Blood tracer | | Mystery | Larhoon,
      Shehaan | Slip between worlds | | Peace | Thalander | Light ward | |
      Protection | Korven, Kain | Negate critical | | Revenge | Enoran |
      Biteback | | Sky | Vaath, Valkon | Skyfall | | Spiders | Kurzana | Throw
      web | | Stone | Kurzana, Thoin | Stoneblood | | Time | Enoran | The weight
      of time | | Tyranny | Kain | Spur on | | War | Korven | Shielded soul |
      <h4 class="Heading-4---Encounter">Biteback</h4> > Encounter Attack Feature
      (Reaction Action) Divine Self Trigger You are hit by an attack, and you
      have not made an attack so far in this encounter. Effect Make a basic
      attack. <h4 class="Heading-4---Encounter">Blood Tracer</h4> > Encounter
      Utility Feature (Reaction Action) Divine Near burst 10, one ally Trigger
      The target's attack just reduced an enemy to 0 HP or below. Effect The
      ally's next attack does +1d8 damage. Level 11: +2d8 damage instead. Level
      21: +3d8 damage instead. <h4 class="Heading-4---Encounter">Death
      Defying</h4> > Encounter Attack Feature (Counter Action) Divine Self
      Trigger You fail an Acrobatics, Athletics, Endure, Sleight of Hand or
      Stealth check. Effect Reroll the skill check and use the new result
      instead. After the action associated with the skill check, you fall prone.
      <h4 class="Heading-4---Encounter">Easy Charm</h4> > Encounter Attack
      Feature (Swift Action) Charm, Divine, Focus Near burst 10, one enemy
      Attack Wisdom vs Will Hit The target cannot target you with attacks (save
      ends). This effect ends immediately if the target takes damage from any
      source. <h4 class="Heading-4---Encounter">Explosive Item</h4> > Encounter
      Attack Feature (Standard Action) Divine, Fire, Focus Near burst 10, one
      object Attack Wisdom vs AC Hit The object takes 2d8 fire damage. If the
      object is destroyed, creatures in the same and adjacent spaces take fire
      damage equal to the amount of damage that was needed to reduce the object
      to 0 HP. Level 11: 3d8 damage instead. Level 21: 4d8 damage instead. <h4
      class="Heading-4---Encounter">Guidance</h4> > Encounter Utility Feature
      (Swift Action) Divine Near burst 3, self or one ally Effect The target
      receives a +1 bonus to their next attack roll or saving throw. If they do
      not use this bonus by the end of their next turn, they lose it. <h4
      class="Heading-4---Encounter">I'll Have That</h4> > Encounter Attack
      Feature (Reaction Action) Divine, Focus Near burst 5, one enemy Trigger
      The target is the target of a beneficial power. Attack Wisdom vs Will
      Effect You become the target of the beneficial power instead. <h4
      class="Heading-4---Encounter">Light Shadow</h4> > Encounter Utility
      Feature (Move Action) Conjuration, Divine Self Effect Shift 1 square.
      Conjure a light shadow of your size in the space you left. Attacks against
      a target adjacent to your light shadow suffer a -2 penalty. The light
      shadow persists until the end of your next turn. Maintain Swift The light
      shadow persists until the end of your next turn. <h4
      class="Heading-4---Encounter">Light Ward</h4> > Encounter Utility Feature
      (Standard Action) Divine Near burst 10, one ally Effect The target
      receives a +2 bonus to all defenses until the end of your next turn. The
      first time it is hit by an attack during this period, the attacker takes
      your Wisdom modifier in damage. <h4 class="Heading-4---Encounter">Negate
      Critical</h4> > Encounter Utility Feature (Counter Action) Divine Near
      burst 10, yourself or one ally Trigger The target is hit by a critical
      hit. Effect The attack becomes a normal hit instead. <h4
      class="Heading-4---Encounter">Shared Bite</h4> > Encounter Utility Feature
      (Free Action) Divine Near burst 5, one ally Requirements You rally. Effect
      Your ally can rally on their turn as a swift action. <h4
      class="Heading-4---Encounter">Shielded Soul</h4> > Encounter Utility
      Feature (Counter Action) Divine Near burst 3, self or one ally Trigger The
      target takes damage. Effect The target gets resistance to all damage 5.
      Level 11: 10. Level 21: 15. <h4 class="Heading-4---Encounter">Skyfall</h4>
      > Encounter Utility Feature (Free Action) Divine Self Trigger You use a
      ranged or far power or make a ranged or far attack. Effect Double the
      range of the ranged or far power or attack. <h4
      class="Heading-4---Encounter">Slip Between Worlds</h4> > Encounter Utility
      Feature (Swift Action) Divine, Teleportation Self Effect You teleport up
      to 5 squares, and are lightly concealed until the end of your next turn.
      <h4 class="Heading-4---Encounter">Spur On</h4> > Encounter Utility Feature
      (Counter Action) Divine, Psychic Near burst 5, self or one ally Trigger
      The target is making an attack roll or saving throw. Effect The target
      takes 1d6 psychic damage, but can reroll the roll once if it misses/fails.
      <h4 class="Heading-4---Encounter">Stoneblood</h4> > Encounter Utility
      Feature (Swift Action) Divine Near burst 1, yourself or an ally Effect The
      target gains resistance to all damage 3 until the end of your next turn.
      Level 11: Resistance 5. Level 15: Resistance 10. <h4
      class="Heading-4---Encounter">The Weight of Time</h4> > Encounter Attack
      Feature (Standard Action) Divine, Focus Near burst 10, one enemy Attack
      Wisdom vs Will Hit The target is slowed until the end of their next turn.
      At the end of their next turn, make a secondary attack. Secondary Attack:
      Wisdom vs Will; on a hit, the target is immobile until the end of their
      next turn. <h4 class="Heading-4---Encounter">Throw Web</h4> > Encounter
      Utility Feature (Standard Action) Divine, Zone Far burst 1 within range 5
      Effect The area of effect becomes a zone of difficult terrain. You can end
      the effect as a swift action, in which case a creature of your choice
      within the zone (if any) is slowed until the end of your next turn.
      Otherwise, the zone persists until the end of your next turn. Maintain
      Swift The zone persists until the end of your next turn. <h4
      class="Heading-4---Encounter">Wrath of the She-Bear</h4> > Encounter
      Attack Feature (Reaction Action) Divine Self Trigger An ally within 10
      squares is reduced to 0 HP or below by an attack. Effect You may move your
      speed towards the ally and make a basic attack against the enemy who made
      the attack.

# === Psi Focus Feats ===
- id: ORCUS_FEAT_ADAPTATION
  name: "Adaptation"
  type: Feat
  source: "Orcus Original"
  prereqs: "Wild Talent or Psi Focus"
  fields:
    "Feat Category": "Psi Focus Feats"
    Prerequisite: "Psi focus power"
    Benefit: >-
      When you make a save, you may expend your psi focus to gain a bonus to
      that save equal to your Charisma modifier. This counts as using the psi
      focus for an encounter power.

- id: ORCUS_FEAT_IMMOVABLE_DOMINION
  name: "Immovable Dominion"
  type: Feat
  source: "Orcus Original"
  prereqs: "Wild Talent or Psi Focus"
  fields:
    "Feat Category": "Psi Focus Feats"
    Prerequisite: "Psi focus power"
    Benefit: >-
      Expend your psi focus as a free action when being pushed, pulled or
      shunted. Reduce the distanced moved by your Charisma modifier. This counts
      as using the psi focus for an encounter power.

- id: ORCUS_FEAT_MIND_AND_BODY
  name: "Mind and Body"
  type: Feat
  source: "Orcus Original"
  prereqs: "Wild Talent or Psi Focus, Focused"
  fields:
    "Feat Category": "Psi Focus Feats"
    Prerequisite: "Psi focus power, focus surge"
    Benefit: >-
      When you spend a focus surge, regain hit points equal to your Charisma
      modifier.

- id: ORCUS_FEAT_MIND_EYE_ACCURACY
  name: "Mind-Eye Accuracy"
  type: Feat
  source: "Orcus Original"
  prereqs: "Wild Talent or Psi Focus, Careful Focus"
  fields:
    "Feat Category": "Psi Focus Feats"
    Prerequisite: "Psi focus power, careful focus power"
    Benefit: >-
      When using your careful focus ancestry power, you may expend your psi
      focus to gain a bonus on the attack roll equal to your Charisma bonus.
      This counts as using the psi focus for an encounter power.

- id: ORCUS_FEAT_PHRENIC_BREATH
  name: "Phrenic Breath"
  type: Feat
  source: "Orcus Original"
  prereqs: "Wild Talent or Psi Focus, Breath Weapon"
  fields:
    "Feat Category": "Psi Focus Feats"
    Prerequisite: "Psi focus power, breath weapon power"
    Benefit: >-
      Expend your psi focus to make your breath weapon a Near arc 3 + your
      Charisma modifier instead of Near arc 3. This counts as using the psi
      focus for an encounter power.

- id: ORCUS_FEAT_PHRENIC_DODGE
  name: "Phrenic Dodge"
  type: Feat
  source: "Orcus Original"
  prereqs: "Wild Talent or Psi Focus, Lucky"
  fields:
    "Feat Category": "Psi Focus Feats"
    Prerequisite: "Psi focus power, lucky power"
    Benefit: >-
      When using your lucky ancestry power, and the enemy misses you on their
      re-roll, you may expend your psi focus instead of your ancestry power.
      This counts as using the psi focus for an encounter power.

- id: ORCUS_FEAT_PHRENIC_MEDITATION
  name: "Phrenic Meditation"
  type: Feat
  source: "Orcus Original"
  prereqs: "Wild Talent or Psi Focus, Focused"
  fields:
    "Feat Category": "Psi Focus Feats"
    Prerequisite: "Psi focus power, you can perform the Meditate action"
    Benefit: >-
      You can perform the Meditate action as a swift action once per encounter.

- id: ORCUS_FEAT_PHRENIC_RESERVOIR
  name: "Phrenic Reservoir"
  type: Feat
  source: "Orcus Original"
  prereqs: "Wild Talent or Psi Focus, Dabbler"
  fields:
    "Feat Category": "Psi Focus Feats"
    Prerequisite: "Psi focus power, Dabbler ancestry feature"
    Benefit: >-
      When using the power from your Dabbler ancestry feature, you may expend
      your psi focus and retain the use of the power gained from your Dabbler.
      This counts as using the psi focus for an encounter power.

- id: ORCUS_FEAT_PHRENIC_TALENT
  name: "Phrenic Talent"
  type: Feat
  source: "Orcus Original"
  prereqs: "Wild Talent or Psi Focus"
  fields:
    "Feat Category": "Psi Focus Feats"
    Prerequisite: "Psi focus power"
    Benefit: >-
      You gain the focus surge power. <h4 class="Heading-4---Encounter">Focus
      Surge</h4> > You tap into the mental connection between yourself and your
      Godmind, allowing you to refresh the phrenic energies of either yourself
      or an ally. Encounter Utility Feature (Swift Action) Phrenic Near burst 5
      (10 at level 11, 15 at level 21), you or an ally Effect The target can
      spend a recovery to recharge their psi focus.

- id: ORCUS_FEAT_PHRENIC_TELEPORT
  name: "Phrenic Teleport"
  type: Feat
  source: "Orcus Original"
  prereqs: "Wild Talent or Psi Focus, Highblood Teleport"
  fields:
    "Feat Category": "Psi Focus Feats"
    Prerequisite: "Psi focus power, highblood teleport power"
    Benefit: >-
      When using your highblood teleport ancestry power, you can expend your psi
      focus to teleport a number of additional squares equal to your Charisma
      modifier. This counts as using the psi focus for an encounter power.

- id: ORCUS_FEAT_PHRENIC_WRATH
  name: "Phrenic Wrath"
  type: Feat
  source: "Orcus Original"
  prereqs: "Wild Talent or Psi Focus, Vengeance of the Pits"
  fields:
    "Feat Category": "Psi Focus Feats"
    Prerequisite: "Psi focus power, vengeance of the pits power"
    Benefit: >-
      You may expend your psi focus as a free action to use your vengeance of
      the pits ancestry power even against an enemy which hasn’t just hit you.
      This counts as using the psi focus for an encounter power.

- id: ORCUS_FEAT_SURGING_MIND
  name: "Surging Mind"
  type: Feat
  source: "Orcus Original"
  prereqs: "Wild Talent or Psi Focus"
  fields:
    "Feat Category": "Psi Focus Feats"
    Prerequisite: "Psi focus power"
    Benefit: >-
      When you use your psi focus, you immediately gain temporary hit points
      equal to your level.

- id: ORCUS_FEAT_WILD_TALENT
  name: "Wild Talent"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "Psi Focus Feats"
    Benefit: >-
      You have access to the psi focus power, a heightened state of mental and
      emotional clarity, that you can utilize to augment powers with the
      Augmentable keyword. Psi focus, once used, must refresh, much like how
      certain monsters have powers that refresh at the beginning of their turn
      on a successful roll. Psi focus works in the exact same way, but the roll
      needed to refresh it depends on what kind of power it was last used to
      augment. <h4 class="Heading-4---At-Will">Psi Focus</h4> > Utilizing your
      phrenic power, you heighten a power or ability beyond what others could
      fathom. At-Will Utility Feature (Free Action) Phrenic Self Effect When
      using an Augmentable power, you activate the effect noted under the
      Augment: line. Special Psi focus refreshes on a 4, 5 and 6 after using it
      to augment an at-will power, on a 5 and 6 after using it to augment an
      encounter power, and on a 6 after using it to augment a daily power. You
      cannot use psi focus unless it is recharged.

# === Shard Feats ===
- id: ORCUS_FEAT_AURA_SHARD
  name: "Aura Shard"
  type: Feat
  source: "Orcus Original"
  prereqs: "Cha 13"
  fields:
    "Feat Category": "Shard Feats"
    Flavor: >-
      You have learned how to weave together all of your emotions, directed and
      controlled by your intense willpower, casting them as an aural web around
      you and thus strengthening both yourself and your allies in the process.
    Prerequisite: "Cha 13"
    Benefit: >-
      As a move action, you manifest an aura which allows you to help your
      allies. This aura has a range of 10. When you or an ally in your aura
      spend an action point, that individual gains temporary hit points equal to
      your Charisma modifier. Level 11: Temporary HP equal to double your Cha
      modifier. Level 21: Temporary HP equal to triple your Cha modifier.

- id: ORCUS_FEAT_BLAST_SHARD
  name: "Blast Shard"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "Shard Feats"
    Flavor: >-
      You have taught yourself how to focus all of your emotions – anger, hate,
      spite, rage, wrath – and to wrap them in willpower and discipline, turning
      it all into a fearsome ranged weapon. Because you use your emotions as
      weapons, you might often seem somewhat apathetic and cold to others.
    Benefit: >-
      As a standard action, you can fire a phrenic blast of energy (see stats
      below). Blast shards are supernatural weapons, and thus do not belong to
      any weapon group, and can take almost any form, color and shape, all
      according to the wishes of the user. The user is always proficient with
      his blast shard. For all intents and purposes, the blast shard can be used
      to make all forms of ranged attacks, as well as in conjunction with
      powers, or for the purpose of opportunity attacks. Your blast shard has a
      +1 enhancement bonus to attack and damage rolls. This increases by +1 for
      every 5th level after the 1st (6th, 11th, 16th, 21st, 26th). Blast Shard
      (Simple Ranged Weapon), Proficiency: +2, Damage: 1d6, Range: 10/20

- id: ORCUS_FEAT_SHIELD_SHARD
  name: "Shield Shard"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "Shard Feats"
    Flavor: >-
      You draw your power from strong emotions such as chivalry, honor and even
      fear. These act as energizers to your will and discipline, allowing them
      to act in conjunction to protect your from harm.
    Benefit: >-
      As a move action, you can manifest a shield of force which attaches to one
      of your hands, as a regular shield. You gain a +1 shield bonus to AC and
      Reflex defenses and your shield hand counts as if it was holding a light
      shield. You can dismiss the shield of force as a swift action. You count
      as having proficiency in light shields for the purpose of meeting feat
      prerequisites.
    Special: >-
      Feats that apply to shields, like Toughened Shield or Bashing Shield, also
      apply to your shield of force.

- id: ORCUS_FEAT_WEAPON_SHARD
  name: "Weapon Shard"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "Shard Feats"
    Flavor: >-
      You have learned how to focus your intense internal energies into a
      weapon, giving it shape and form according to your subconscious wishes.
    Benefit: >-
      As a move action, you can manifest a weapon shard (see stats below).
      Weapon shards are supernatural weapons (and thus do not belong to any
      weapon group), and can take almost any form, color and shape, all
      according to the wishes of the user. The user is always proficient with
      his weapon shard, and it is a one-handed weapon. For all intents and
      purposes, the weapon shard can be used to make all forms of melee attacks,
      as well as in conjunction with powers, or for the purpose of opportunity
      attacks. Your weapon shard has a +1 enhancement bonus to attack and damage
      rolls. This increases by +1 for every 5th level after 1st (+2 at 6th, +3
      at 11th, etc.). On a critical hit, you do an additional 1d6 points of
      damage for every point of enhancement bonus. Weapon Shard (Simple Melee
      Weapon)
    Proficiency: >-
      +2, Damage: 1d8

# === Aura Shard Feats ===
- id: ORCUS_FEAT_BLASTING_AURA
  name: "Blasting Aura"
  type: Feat
  source: "Orcus Original"
  prereqs: "Aura Shard, Cha 13"
  fields:
    "Feat Category": "Aura Shard Feats"
    Flavor: >-
      Your emotions are so strong, and composed from such volatile feelings,
      that you have learned how to strike out against an enemy within your aura
      and channel your violent energies into it instead.
    Prerequisite: "Aura Shard, Cha 13"
    Benefit: >-
      When you manifest your aura, or by taking a move action when your aura is
      active, you may make an attack (Charisma vs Will) against one enemy within
      range, who takes 5 points of psychic damage. Additionally, when you or an
      ally spend an action point while inside your aura, you (and only you) may
      make an additional attack against one enemy within range (Cha vs Will, 5
      psychic damage). Level 11: Damage increases to 10. Level 21: Damage
      increases to 15.

- id: ORCUS_FEAT_EMPOWERING_AURA
  name: "Empowering Aura"
  type: Feat
  source: "Orcus Original"
  prereqs: "Aura Shard, Thieving Aura, Cha 13, 26th level"
  fields:
    "Feat Category": "Aura Shard Feats"
    Flavor: >-
      Your experience in using your thieving abilities now allows you weave of
      emotions and discipline to tap into the surging emotions of others and to
      gain part of their heroic abilities
    Prerequisite: "Aura Shard, Thieving Aura, Cha 13, 26th level"
    Benefit: >-
      When an ally within range of your aura spends an action point, you
      immediately gain an additional standard action.

- id: ORCUS_FEAT_EXTENDED_AURA
  name: "Extended Aura"
  type: Feat
  source: "Orcus Original"
  prereqs: "Aura Shard, Cha 13"
  fields:
    "Feat Category": "Aura Shard Feats"
    Flavor: >-
      You have put time and training into extending your aura further, so that
      you can utilize its effects to their maximum potential, almost always
      keeping allies within range.
    Prerequisite: "Aura Shard, Cha 13"
    Benefit: "The range of your aura extends by 10 squares."

- id: ORCUS_FEAT_FORCEFUL_AURA
  name: "Forceful Aura"
  type: Feat
  source: "Orcus Original"
  prereqs: "Aura Shard, Cha 13"
  fields:
    "Feat Category": "Aura Shard Feats"
    Flavor: >-
      Your aura shard extends from the phrenic realm into the purely physical
      realm, and as it comes into existence like a rolling wave of thunderous
      emotions, it physically pushes enemies away from you.
    Prerequisite: "Aura Shard, Cha 13"
    Benefit: >-
      When you manifest your aura, or at any other time by spending a move
      action while your aura is active, every enemy adjacent to you is pushed 1
      square directly away from you. Additionally, when you or an ally spends an
      action point while inside your aura, you may choose to make a Charisma vs
      Fortitude attack against one enemy within range of your aura. If
      successful, that enemy is pushed 1 square directly away from you.

- id: ORCUS_FEAT_HEALING_AURA
  name: "Healing Aura"
  type: Feat
  source: "Orcus Original"
  prereqs: "Aura Shard, Cha 13"
  fields:
    "Feat Category": "Aura Shard Feats"
    Flavor: >-
      Using your weave of emotions, you are able to redirect some of the
      emotions and strength that comes soaring out of you when you stride into
      action.
    Prerequisite: "Aura Shard, Cha 13"
    Benefit: >-
      When you spend an action point, one ally within range of your aura can
      spend a recovery as an immediate (react) action.

- id: ORCUS_FEAT_RESTORATIVE_AURA
  name: "Restorative Aura"
  type: Feat
  source: "Orcus Original"
  prereqs: "Aura Shard, Healing Aura, Cha 13"
  fields:
    "Feat Category": "Aura Shard Feats"
    Flavor: >-
      Your aura shard and its ability to give your allies a surge in healing has
      now matured to the point where your own emotions do not merely trigger the
      surge, but enhances it and makes it stronger.
    Prerequisite: "Aura Shard, Healing Aura, Cha 13"
    Benefit: >-
      Whenever you or an ally within range of your aura would regain hit points,
      that individual gains an additional number of hit points equal to your
      Charisma modifier.

- id: ORCUS_FEAT_SHIFTING_AURA
  name: "Shifting Aura"
  type: Feat
  source: "Orcus Original"
  prereqs: "Aura Shard, Cha 13"
  fields:
    "Feat Category": "Aura Shard Feats"
    Flavor: >-
      You have learned how to channel the roiling energies of your aura into the
      physical realm, enhancing the movements of your allies as it comes into
      effect.
    Prerequisite: "Aura Shard, Cha 13"
    Benefit: >-
      When you manifest your aura, or by taking a move action when your aura is
      active, one ally within range may immediately shift 1 square.
      Additionally, when you or an ally spends an action point while inside your
      aura, that person may choose to forego the temporary hit points and
      instead shift 1 square.

- id: ORCUS_FEAT_SURGING_AURA
  name: "Surging Aura"
  type: Feat
  source: "Orcus Original"
  prereqs: "Aura Shard, Cha 13"
  fields:
    "Feat Category": "Aura Shard Feats"
    Flavor: >-
      Your mind now interconnects your aura shard with a surge of emotions,
      allowing you to share that with your allies, lending strength to their
      blows and precision to their attacks.
    Prerequisite: "Aura Shard, Cha 13"
    Benefit: >-
      When you manifest your aura, or by taking a move action when your aura is
      active, every ally within range gains a +1 bonus on attack rolls for one
      round. Additionally, when you or an ally spends an action point while
      inside your aura, that person may choose to gain either the temporary hit
      points for a +1 bonus on attack rolls for one round.

- id: ORCUS_FEAT_THIEVING_AURA
  name: "Thieving Aura"
  type: Feat
  source: "Orcus Original"
  prereqs: "Aura Shard, Cha 13"
  fields:
    "Feat Category": "Aura Shard Feats"
    Flavor: >-
      Your aura shard weaves its strength from that of your emotions and is kept
      in check by your discipline – your enemies do not have the same kind of
      control, which allows you to siphon off their energies and gain them
      yourself.
    Prerequisite: "Aura Shard, Cha 13"
    Benefit: >-
      Whenever an enemy within range of your aura spends an action point or a
      recovery, you regain one action point or recovery (your choice).

# === Blast Shard Feats ===
- id: ORCUS_FEAT_ACID_BLAST
  name: "Acid Blast"
  type: Feat
  source: "Orcus Original"
  prereqs: "Blast Shard"
  fields:
    "Feat Category": "Blast Shard Feats"
    Flavor: >-
      Your shard is touched by the vitriol and hate you hold for your enemies,
      allowing it to cling to them as if it was acid, burning through them as
      your emotions burn through you.
    Prerequisite: "Blast Shard"
    Benefit: >-
      When using your blast shard, at your option, it gains the Acid tag and
      does acid damage. You gain the acid shard at-will power. <h4
      class="Heading-4---At-Will">Acid Shard</h4> At-Will Attack 1 (Standard
      Action) Acid, Phrenic, Weapon Ranged weapon (blast shard), one target
      Attack Dexterity vs Reflex Hit 1d4 + Dexterity acid damage, and the target
      takes 5 persistent acid damage (save ends). Level 21: 2d4 + Dexterity acid
      damage, and 10 persistent acid damage (save ends).

- id: ORCUS_FEAT_COLD_BLAST
  name: "Cold Blast"
  type: Feat
  source: "Orcus Original"
  prereqs: "Blast Shard"
  fields:
    "Feat Category": "Blast Shard Feats"
    Flavor: >-
      You hold nothing but disdain and contempt for your enemies and your
      phrenic power shapes your blast into the same cold and numbing extension
      of your will.
    Prerequisite: "Blast Shard"
    Benefit: >-
      When using your blast shard, at your option, it gains the Cold tag and
      deals cold damage. You gain the cold shard at-will power. <h4
      class="Heading-4---At-Will">Cold Shard</h4> At-Will Attack 1 (Standard
      Action) Cold, Phrenic, Weapon Ranged weapon (blast shard), one target
      Attack Dexterity vs Fortitude Hit 1d8 + Dexterity cold damage, and the
      target is slowed until the end of your next turn. Level 21: 2d8 +
      Dexterity cold damage, and the target is slowed until the end of your next
      turn.

- id: ORCUS_FEAT_EMPOWERED_BLAST_SHARD
  name: "Empowered Blast Shard"
  type: Feat
  source: "Orcus Original"
  prereqs: "Blast Shard"
  fields:
    "Feat Category": "Blast Shard Feats"
    Flavor: >-
      Experience has taught you how to apply your discipline and emotions in the
      best way, allowing you to extract more energy from your phrenic well than
      before.
    Prerequisite: "Blast Shard"
    Benefit: >-
      Your blast shard damage increases by one die size (for example, from 1d6
      to 1d8).

- id: ORCUS_FEAT_FAR_BLAST
  name: "Far Blast"
  type: Feat
  source: "Orcus Original"
  prereqs: "Blast Shard"
  fields:
    "Feat Category": "Blast Shard Feats"
    Flavor: >-
      So strong is your will, so intense are your emotions that you can sustain
      attacks far beyond what others can stomach.
    Prerequisite: "Blast Shard"
    Benefit: "Increase both the normal and long range of your blast shard by 5."

- id: ORCUS_FEAT_FIRE_BLAST
  name: "Fire Blast"
  type: Feat
  source: "Orcus Original"
  prereqs: "Blast Shard"
  fields:
    "Feat Category": "Blast Shard Feats"
    Flavor: >-
      Rage, wrath, pride and anger are all fiery emotions that set the world on
      fire. You, however, use those very emotions to set your blast shard, and
      enemies, on fire.
    Prerequisite: "Blast Shard"
    Benefit: >-
      When using your blast shard, at your option, it gains the Fire tag and
      deals fire damage. You gain the fire shard at-will power. <h4
      class="Heading-4---At-Will">Fire Shard</h4> At-Will Attack 1 (Standard
      Action) Fire, Phrenic, Weapon Near arc 3 Requirements The attack must be
      made with a blast shard. Attack Dexterity vs Reflex Hit 1d6 + Dexterity
      fire damage. Level 21: 2d6 + Dexterity fire damage.

- id: ORCUS_FEAT_IMPROVED_BLAST_SHARD
  name: "Improved Blast Shard"
  type: Feat
  source: "Orcus Original"
  prereqs: "Empowered Blast Shard, 11th level"
  fields:
    "Feat Category": "Blast Shard Feats"
    Flavor: >-
      You have seen so much of what the world offers, and you can channel that
      experience into even stronger emotions and a tightened discipline,
      allowing you to become even more dangerous.
    Prerequisite: "Empowered Blast Shard, 11th level"
    Benefit: >-
      Your blast shard damage increases by one die (for example, from 1d6 to
      2d6).

- id: ORCUS_FEAT_LIGHTNING_BLAST
  name: "Lightning Blast"
  type: Feat
  source: "Orcus Original"
  prereqs: "Blast Shard"
  fields:
    "Feat Category": "Blast Shard Feats"
    Flavor: >-
      Nothing is as fast as the mind – and lightning. You use your willpower and
      discipline to hone your attacks, giving them the symbolic form of
      lightning blasts and increasing your accuracy.
    Prerequisite: "Blast Shard"
    Benefit: >-
      When using your blast shard, at your option, it gains the Lightning tag
      and deals lightning damage. You gain the lightning shard at-will power.
      <h4 class="Heading-4---At-Will">Lightning Shard</h4> At-Will Attack 1
      (Standard Action) Lightning, Phrenic, Weapon Ranged weapon (blast shard),
      one target Attack Dexterity vs Fortitude Hit 1d12 + Dexterity lightning
      damage. Level 21: 2d12 + Dexterity lightning damage.

- id: ORCUS_FEAT_MIND_BLAST
  name: "Mind Blast"
  type: Feat
  source: "Orcus Original"
  prereqs: "Blast Shard"
  fields:
    "Feat Category": "Blast Shard Feats"
    Flavor: >-
      You do not manifest your blast shard as a physical creation, rather you
      use your training to mentally attack your enemies, filling their minds
      with emotion and will until they burst from your attack.
    Prerequisite: "Blast Shard"
    Benefit: >-
      When using your blast shard, at your option, it gains the Psychic tag and
      deals psychic damage. You gain the mind shard at-will power. <h4
      class="Heading-4---At-Will">Mind Shard</h4> At-Will Attack 1 (Standard
      Action) Phrenic, Psychic, Weapon Ranged weapon (blast shard), one target
      Attack Dexterity vs Will Hit 1d10 + Dexterity psychic damage, and you mark
      the target. Level 21: 2d10 + Dexterity psychic damage.

# === Shield Shard Feats ===
- id: ORCUS_FEAT_FORCE_SHIELD
  name: "Force Shield"
  type: Feat
  source: "Orcus Original"
  prereqs: "Shield Shard, 11th level"
  fields:
    "Feat Category": "Shield Shard Feats"
    Flavor: >-
      Your long experience and strong emotions allow you to call upon them for a
      short moment. For a short time your phrenic energies surge, creating a
      powerful shielding effect around all nearby allies.
    Prerequisite: "Shield Shard, 11th level"
    Benefit: >-
      Once per encounter as a swift action, you can extend the protection of
      your shield of force to yourself and all allies within 5 squares until the
      end of your next round.
    Special: >-
      If you have any feats that would be usable when you are attacked, you can
      use them when any protected ally is attacked.

- id: ORCUS_FEAT_GREATER_SHIELD
  name: "Greater Shield"
  type: Feat
  source: "Orcus Original"
  prereqs: "Shield Shard"
  fields:
    "Feat Category": "Shield Shard Feats"
    Flavor: >-
      Your shield shard has expanded together with your own internal energies,
      giving it a stronger ability to protect you from outside harm.
    Prerequisite: "Shield Shard"
    Benefit: >-
      You may choose to manifest a heavy shield instead of a light shield, when
      manifesting your shield of force. If you do, you gain a +2 shield bonus to
      AC and Reflex defenses and your shield hand counts as if it was holding a
      heavy shield. You count as having proficiency in heavy shields for the
      purpose of meeting feat prerequisites.
    Special: >-
      You suffer an armor check penalty as if you were wielding a heavy shield.

- id: ORCUS_FEAT_GROUNDING_SHARD
  name: "Grounding Shard"
  type: Feat
  source: "Orcus Original"
  prereqs: "Shield Shard"
  fields:
    "Feat Category": "Shield Shard Feats"
    Flavor: >-
      Your shield’s phrenic powers extend deep into the earth, grounding you
      against enemy attacks that threaten to move you from your position without
      your approval.
    Prerequisite: "Shield Shard"
    Benefit: >-
      Any time you would be pushed, pulled or shunted, reduce the number of
      squares you are moved by 1 (minimum 0). Level 11: Reduce the number of
      squares by 2 (minimum 0).

- id: ORCUS_FEAT_IMMOVABLE_SHIELD
  name: "Immovable Shield"
  type: Feat
  source: "Orcus Original"
  prereqs: "Grounding Shard, Shield Shard"
  fields:
    "Feat Category": "Shield Shard Feats"
    Flavor: >-
      Your shield shard now bonds, almost permanently, with the ground if you
      don’t move, redirecting much of the force in enemy attacks into the earth
      below you.
    Prerequisite: "Grounding Shard, Shield Shard"
    Benefit: >-
      If you do not move at all during your round, you gain resistance 5 until
      the beginning of your next turn. This stacks with any other forms of
      resistance you might have. Level 11: Resistance 10. Level 21: Resistance
      15.

- id: ORCUS_FEAT_OFFENSIVE_SHIELD
  name: "Offensive Shield"
  type: Feat
  source: "Orcus Original"
  prereqs: "Shield Shard"
  fields:
    "Feat Category": "Shield Shard Feats"
    Flavor: >-
      Even as you protect yourself, your shard has learned that at times a good
      offense is the best defense, allowing you to use the shield shard as a
      weapon against enemies not expecting it.
    Prerequisite: "Shield Shard"
    Benefit: >-
      Your shield of force has all the properties of a weapon shard (as
      described in the Weapon Shard feat). You count as having the Weapon Shard
      feat for the purpose of meeting feat prerequisites.

- id: ORCUS_FEAT_REFRESHING_SHARD
  name: "Refreshing Shard"
  type: Feat
  source: "Orcus Original"
  prereqs: "Shield Shard"
  fields:
    "Feat Category": "Shield Shard Feats"
    Flavor: >-
      Your shield shard allows you to turn internal emotions and diamond hard
      discipline into energy, providing you with a surge of healing when you are
      damaged.
    Prerequisite: "Shield Shard"
    Benefit: >-
      Once per encounter, when you are damaged, as an immediate (counter)
      action, you may spend a recovery.

# === Weapon Shard Feats ===
- id: ORCUS_FEAT_AS_ONE
  name: "As One"
  type: Feat
  source: "Orcus Original"
  prereqs: "Weapon Shard"
  fields:
    "Feat Category": "Weapon Shard Feats"
    Flavor: >-
      Your intense physical training regimes have combined with your powerful
      phrenic abilities to allow you to use the weapon shard and your exploits
      as one.
    Prerequisite: "Weapon Shard, at least one power from the martial power source"
    Benefit: >-
      When using a power with the Martial tag with your weapon shard, you gain a
      +2 feat bonus to damage rolls. This increases to +3 at 11th level and to
      +4 at 21st level.

- id: ORCUS_FEAT_ASSASSIN_S_WEAPON
  name: "Assassin’s Weapon"
  type: Feat
  source: "Orcus Original"
  prereqs: "Slayer’s Weapon, Weapon Shard"
  fields:
    "Feat Category": "Weapon Shard Feats"
    Flavor: >-
      You have now used your weapon shard to slay so many in such an underhanded
      way that your internalized feelings and behaviors have stained your shard.
      It too excels in underhanded combat.
    Prerequisite: "Slayer’s Weapon, Weapon Shard"
    Benefit: >-
      If you have combat advantage against an opponent and score a critical hit,
      you deal +2d8 damage. This increases to +3d8 at 11th level and to +4d8 at
      21st level.
    Special: "This feat stacks with the benefit of Slayer’s Weapon."

- id: ORCUS_FEAT_EXTENDED_WEAPON
  name: "Extended Weapon"
  type: Feat
  source: "Orcus Original"
  prereqs: "Weapon Shard"
  fields:
    "Feat Category": "Weapon Shard Feats"
    Flavor: >-
      Your willpower and intense emotions allow you to extend your weapon,
      allowing it to strike enemies further away from you than what would be
      expected, or normal.
    Prerequisite: "Weapon Shard"
    Benefit: "Your weapon shard is a reach weapon."

- id: ORCUS_FEAT_GREATER_WEAPON_SHARD
  name: "Greater Weapon Shard"
  type: Feat
  source: "Orcus Original"
  prereqs: "Improved Weapon Shard, Weapon Shard, 11th level"
  fields:
    "Feat Category": "Weapon Shard Feats"
    Flavor: >-
      You are a legend that walks amongst men, your myth has already begun to
      spread around the world. Now the wellspring of a thousand powers your
      weapon, giving you an equally legendary weapon shard.
    Prerequisite: "Improved Weapon Shard, Weapon Shard, 11th level"
    Benefit: "Your weapon shard damage increases to 2d6."

- id: ORCUS_FEAT_IMPROVED_WEAPON_SHARD
  name: "Improved Weapon Shard"
  type: Feat
  source: "Orcus Original"
  prereqs: "Weapon Shard"
  fields:
    "Feat Category": "Weapon Shard Feats"
    Flavor: >-
      Your experience of the world has only deepened your wellspring of
      willpower, discipline and emotion and this spills into your weapon shard
      that is now even more lethal.
    Prerequisite: "Weapon Shard"
    Benefit: "Your weapon shard damage increases to 1d10."

- id: ORCUS_FEAT_MALLEABLE_WEAPON
  name: "Malleable Weapon"
  type: Feat
  source: "Orcus Original"
  prereqs: "Weapon Shard"
  fields:
    "Feat Category": "Weapon Shard Feats"
    Flavor: >-
      Your weapon is no longer bound to one form, instead it is as fluid as your
      thoughts and emotions, becoming whatever kind of weapon you happen to need
      at the moment.
    Prerequisite: "Weapon Shard"
    Benefit: >-
      By taking a standard action instead of a move action when you manifest
      your weapon shard, you can choose to have it belong to any weapon group of
      your choice until the end of the encounter. You also increase the
      proficiency bonus to +3.

- id: ORCUS_FEAT_SLAYER_S_WEAPON
  name: "Slayer’s Weapon"
  type: Feat
  source: "Orcus Original"
  prereqs: "Weapon Shard"
  fields:
    "Feat Category": "Weapon Shard Feats"
    Flavor: >-
      Your weapon has been used for so many finishing strikes and lethal attacks
      that it now draws on your most bloodthirsty thoughts and spiteful
      emotions, becoming a terrible instrument of death.
    Prerequisite: "Weapon Shard"
    Benefit: >-
      Your weapon shard becomes an improved critical weapon and deals +1d8
      damage when you score a critical hit. This increases to +2d8 at 11th level
      and to +3d8 at 21st level.

- id: ORCUS_FEAT_STORMSHARD
  name: "Stormshard"
  type: Feat
  source: "Orcus Original"
  prereqs: "Weapon Shard"
  fields:
    "Feat Category": "Weapon Shard Feats"
    Flavor: >-
      In the blink of an eye and by focusing your phrenic energies, your shard
      shatters after a successful strike and hits all enemies within reach.
    Prerequisite: "Weapon Shard"
    Benefit: >-
      Once per encounter, when attacking with your weapon shard, your attack
      gains Near arc 1. Only enemies are affected while inside the arc.

- id: ORCUS_FEAT_TWIN_WEAPON
  name: "Twin Weapon"
  type: Feat
  source: "Orcus Original"
  prereqs: "Weapon Shard"
  fields:
    "Feat Category": "Weapon Shard Feats"
    Flavor: >-
      You focus your energies into your weapon, splitting it into two identical
      weapons that you use as if they were nothing but extensions of your body
      and will – flawlessly.
    Prerequisite: "Weapon Shard"
    Benefit: >-
      When you manifest your weapon shard, you can choose to manifest one for
      each hand instead. When making an attack that requires two melee weapons,
      you gain a +1 feat bonus to your attack rolls.

# === Wild Shape Feats ===
- id: ORCUS_FEAT_HARDY_SHIFT
  name: "Hardy Shift"
  type: Feat
  source: "Orcus Original"
  prereqs: "keyword:Form"
  fields:
    "Feat Category": "Wild Shape Feats"
    Prerequisite: "You know a Form power"
    Benefit: >-
      When you use a Form power, you may spend a recovery to heal damage up to
      your recovery value.

- id: ORCUS_FEAT_HYBRID_FORM
  name: "Hybrid Form"
  type: Feat
  source: "Orcus Original"
  prereqs: "keyword:Form"
  fields:
    "Feat Category": "Wild Shape Feats"
    Prerequisite: "You know at least one power with the Form keyword."
    Benefit: >-
      When you use a Form power, you can choose to take a hybrid, humanoid form
      instead of a pure animal form. In this case, you can keep your current
      size, and your current speeds wherever they are better than your new
      form’s speeds. Because your hybrid form is humanoid, you can talk, use
      weapon powers and otherwise make use of having arms and hands.

- id: ORCUS_FEAT_VERSATILE_SHIFTING
  name: "Versatile Shifting"
  type: Feat
  source: "Orcus Original"
  prereqs: "category:ORCUS_SHAPE_POWER"
  fields:
    "Feat Category": "Wild Shape Feats"
    Prerequisite: "You know at least one shape of the X power."
    Benefit: >-
      Once per day, you can expend a shape of the X power to use any other shape
      of the X power of the same level or lower.

# === Dualclassing ===
- id: ORCUS_FEAT_DUALCLASS_RECRUIT_DUALCLASS
  name: "Dualclass Recruit (Dualclass)"
  type: Feat
  source: "Orcus Original"
  prereqs: "!Secondary Class"
  fields:
    "Feat Category": "Dualclassing"
    Flavor: >-
      As you take this feat, choose a class of which you are not already a
      member.
    Prerequisite: "You cannot take this kit if you already have a secondary class."
    Benefit: >-
      You count as the chosen class (sometimes called your “secondary class”) in
      addition to any classes of which you are already a member. In addition,
      you gain the benefits described in the chosen class's “Dualclass” section.
  rules:
    - { grant: ORCUS_MARKER_SECONDARY_CLASS, type: Marker }

- id: ORCUS_FEAT_BATTLE_ADAPTATION_DUALCLASS
  name: "Battle Adaptation (Dualclass)"
  type: Feat
  source: "Orcus Original"
  prereqs: "Dualclass Recruit (Dualclass)"
  fields:
    "Feat Category": "Dualclassing"
    Prerequisite: "Dualclass Recruit"
    Benefit: >-
      When you gain this feat, choose one encounter attack power. You lose that
      power and may select one encounter attack power of the same level from
      your secondary class.

- id: ORCUS_FEAT_FUNCTIONAL_ADAPTATION_DUALCLASS
  name: "Functional Adaptation (Dualclass)"
  type: Feat
  source: "Orcus Original"
  prereqs: "Dualclass Recruit (Dualclass)"
  fields:
    "Feat Category": "Dualclassing"
    Prerequisite: "Dualclass Recruit"
    Benefit: >-
      When you gain this feat, choose one utility power. You lose that power and
      may select one utility power of the same level from your secondary class.

- id: ORCUS_FEAT_DAILY_ADAPTATION_DUALCLASS
  name: "Daily Adaptation (Dualclass)"
  type: Feat
  source: "Orcus Original"
  prereqs: "Dualclass Recruit (Dualclass)"
  fields:
    "Feat Category": "Dualclassing"
    Prerequisite: "Dualclass Recruit"
    Benefit: >-
      When you gain this feat, choose one daily attack power. You lose that
      power and may select one daily attack power of the same level from your
      secondary class.

