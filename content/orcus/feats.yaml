- id: ORCUS_FEAT_TALENTED_HEALER
  name: "Talented Healer"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      You can provide first aid as a swift action. You also get a +2 bonus on
