    Special: >-
      You can gain this feat multiple times. Its effects do not stack. Each time
      you take the feat, it applies to a new skill.
  rules:
    - { select: { type: Skill Focus, number: 1, category: ORCUS_SKILL_FOCUS, name: Skill Focus } }

- id: ORCUS_FEAT_SKILL_TRAINING
  name: "Skill Training"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Benefit: >-
      Each time you take this feat, you gain training in an additional skill.
  rules:
    - { select: { type: Skill Training, number: 1, name: Skill Training } }

- id: ORCUS_FEAT_SWORDS_OF_GRACE
  name: "Swords of Grace"
  type: Feat
  source: "Orcus Original"
  fields:
    "Feat Category": "General Feats"
    Flavor: "You are trained in a defensive weapon-based martial arts."
    Benefit: >-
      When wielding a one-handed light blade, you do not grant combat advantage
