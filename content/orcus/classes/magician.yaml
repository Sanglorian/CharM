# Magician — Arcane Controller (Orcus Classes and Powers). Key ability Intelligence
# (the first Arcane class and first Controller here). HP 10 + Con at level 1,
# +4/level (encoded 6 + Con + 4 x Level). "Recoveries" -> Healing Surges. Trained
# in Arcana automatically + 3 chosen class skills. One discipline (Spells of Ice
# and Fire) is transcribed so far; the class power selects also OR in |$$KITDISC.

- id: ORCUS_CLASS_MAGICIAN
  name: Magician
  type: Class
  source: "Orcus Original"
  categories: [Controller, Arcane]
  fields:
    Role: Controller
    Tradition: Arcane
    "Key Ability": Intelligence
    "Class Disciplines": "Spells of Ice and Fire, Cup of Brimstone, Puppeteer's String"
    "Armor Proficiencies": "Cloth"
    "Weapon Proficiencies": "Simple melee"
    "Focus Proficiencies": "Orb, staff, wand, rod, book"
    "Class Skills": "Arcana, Diplomacy, Dungeoneering, History, Insight, Nature, Religion"
  rules:
    - grant: ORCUS_INTERNAL_GRANTS_MAGICIAN
      type: Grants
    # Hit Points: 10 + Con score at level 1, +4 per level (6 + Con + 4 x Level).
    - statadd: Hit Points
      value: 6
    - statadd: Hit Points
      value: { statref: Constitution }
    - statadd: Hit Points
      value: { statref: Level, scale: 4 }
    # Recoveries per long rest: 6 plus your Constitution modifier.
    - statadd: Healing Surges
      value: 6
    - statadd: Healing Surges
      value: { abilmod: Constitution }
    # Defenses: +2 Will.
    - statadd: Will Defense
      value: +2
      bonusType: Class
    # Trained in Arcana + 3 other class skills.
    - select:
        type: Skill Training
        number: 3
        category: ORCUS_MAGICIAN_SKILLS
        name: Magician Trained Skills
    # Choose a talent (school of magic) and an Arcane Strength option.
    - select:
        type: Class Feature
        number: 1
        category: ORCUS_MAGICIAN_TALENT
        name: Magician Talent
    - select:
        type: Class Feature
        number: 1
        category: ORCUS_MAGICIAN_ARCANE_STRENGTH
        name: Magician Arcane Strength
    # Default level-1 progression: 2 at-will, 1 encounter, 1 daily attack.
    - select:
        type: Power
        number: 2
        category: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,at-will,1"
        name: Magician At-Will Powers
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,encounter,1"
        name: Magician Encounter Power
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,daily,1"
        name: Magician Daily Power
    # Default progression to level 30.
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,utility,2"
        name: Magician Utility Power
        level: 2
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,encounter,3"
        name: Magician Encounter Power 2
        level: 3
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,daily,5"
        name: Magician Daily Power 2
        level: 5
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,utility,6"
        name: Magician Utility Power 2
        level: 6
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,encounter,7"
        name: Magician Encounter Power 3
        level: 7
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,daily,9"
        name: Magician Daily Power 3
        level: 9
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,utility,10"
        name: Magician Utility Power 3
        level: 10
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,utility,16"
        name: Magician Utility Power 4
        level: 16
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,utility,22"
        name: Magician Utility Power 5
        level: 22
    # Power-replacement (retraining) swaps. Encounter at 13/17/23/27, daily at 15/19/25/29.
    - { replace: { name: "Encounter Power Swap (Lv 13)", powerSwap: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,encounter,13", level: 13, optional: true } }
    - { replace: { name: "Daily Power Swap (Lv 15)",     powerSwap: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,daily,15",     level: 15, optional: true } }
    - { replace: { name: "Encounter Power Swap (Lv 17)", powerSwap: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,encounter,17", level: 17, optional: true } }
    - { replace: { name: "Daily Power Swap (Lv 19)",     powerSwap: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,daily,19",     level: 19, optional: true } }
    - { replace: { name: "Encounter Power Swap (Lv 23)", powerSwap: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,encounter,23", level: 23, optional: true } }
    - { replace: { name: "Daily Power Swap (Lv 25)",     powerSwap: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,daily,25",     level: 25, optional: true } }
    - { replace: { name: "Encounter Power Swap (Lv 27)", powerSwap: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,encounter,27", level: 27, optional: true } }
    - { replace: { name: "Daily Power Swap (Lv 29)",     powerSwap: "ORCUS_DISCIPLINE_SPELLS_OF_ICE_AND_FIRE|ORCUS_DISCIPLINE_CUP_OF_BRIMSTONE|ORCUS_DISCIPLINE_PUPPETEERS_STRING|$$KITDISC,daily,29",     level: 29, optional: true } }

- id: ORCUS_INTERNAL_GRANTS_MAGICIAN
  name: Magician Grants
  type: Grants
  fields: { _SupportsID: ORCUS_CLASS_MAGICIAN }
  rules:
    # Always trained in Arcana (the class's signature skill).
    - grant: ORCUS_TRAIN_ARCANA
      type: Skill Training
    - grant: ORCUS_FEATURE_ARCANE_TRAINING
      type: Class Feature
    - grant: ORCUS_FEATURE_CANTRIPS
      type: Class Feature
    # Orcus key-ability rule: the Magician may use Intelligence (its class key)
    # in place of a discipline power's printed key ability.
    - grant: ORCUS_KEYSWAP_MAGICIAN_INTELLIGENCE
      type: Key Ability Swap
    # Proficiencies: cloth armor; simple melee weapons. (Focus proficiency —
    # orb/staff/wand/rod/book — is recorded on the class but has no mechanical
    # penalty in the engine, so it is descriptive.)
    - { grant: ORCUS_PROFGRANT_SIMPLE_MELEE, type: Grants }
    - { grant: ORCUS_APROF_CLOTH, type: Proficiency }

# --- Always-on class features -------------------------------------------------
- id: ORCUS_FEATURE_ARCANE_TRAINING
  name: Arcane Training
  type: Class Feature
  source: "Orcus Original"
  fields:
    Description: >-
      You gain the Athame feat or a feat from the Art Feats section (your
      choice).
- id: ORCUS_FEATURE_CANTRIPS
  name: Cantrips
  type: Class Feature
  source: "Orcus Original"
  fields:

    Description: "You gain the Cantrip Master feat."
# --- Talents (schools of magic) -----------------------------------------------
- id: ORCUS_TALENT_CONJURER
  name: Conjurer
  type: Class Feature
  source: "Orcus Original"
  categories: [ORCUS_MAGICIAN_TALENT]
  fields:
    "Secondary Ability": Constitution
    Description: >-
      When an encounter ends and you have one or more daily powers with the
      Summon tag still active, those daily powers are not expended. However, if
      you use them again, the summoned creatures appear in the exact state they
      were when their last summoning ended (current HP, conditions, etc.) except
      that they can use their encounter powers again even if already used
      before. If you complete a long rest, all your daily powers reset and if
      you use them from then on a “fresh” creature will be summoned. Your
      secondary ability is Constitution.
  rules:
    - grant: ORCUS_SECSWAP_CONJURER_CONSTITUTION
      type: Secondary Ability Swap
- id: ORCUS_TALENT_ENCHANTER
  name: Enchanter
  type: Class Feature
  source: "Orcus Original"
  categories: [ORCUS_MAGICIAN_TALENT]
  fields:
    "Secondary Ability": Charisma
    Description: >-
      When you use a power with the Psychic tag that does damage on a hit, you
      can choose for the power to do no damage to any enemies you target. If so,
      you gain a +2 bonus on the attack roll. Your secondary ability is
      Charisma.
  rules:
    - grant: ORCUS_SECSWAP_ENCHANTER_CHARISMA
      type: Secondary Ability Swap
- id: ORCUS_TALENT_EVOKER
  name: Evoker
  type: Class Feature
  source: "Orcus Original"
  categories: [ORCUS_MAGICIAN_TALENT]
  fields:
    "Secondary Ability": Dexterity
    Description: >-
      If you wish, a near or far power you use with the Acid, Cold, Fire, Flux,
      Lightning or Thunder tags has its area increased by 1 (from Near arc 2 to
      Near arc 3, for example). Also, you can change your flux energy as a swift
      action (see the Elemental Flux discipline for a description of flux
      energy). Your secondary ability is Dexterity.
  rules:
    - grant: ORCUS_SECSWAP_EVOKER_DEXTERITY
      type: Secondary Ability Swap

# --- Arcane Strength (choose one) ---------------------------------------------
- id: ORCUS_FEATURE_ARCANE_OVERFLOW
  name: Arcane Overflow
  type: Class Feature
  source: "Orcus Original"
  categories: [ORCUS_MAGICIAN_ARCANE_STRENGTH]
  fields:
    Description: >-
      Encounter attack powers from your class disciplines gain the following
      Miss entry if they do not have one: Miss: Half damage, and if a hit would
      have imposed a condition, the target experiences the following (same
      duration). Blinded: The target is rattled. Controlled: The target is
      dazed. Immobile: The target is slowed. Persistent damage 10 or more:
      Persistent damage 5. Stunned: The target is dazed. Weakened: The target
      suffers a -4 penalty to damage. Unwilling movement 3 or more: Unwilling
      movement of the same variety 1.
- id: ORCUS_FEATURE_ARCANE_SUSTENANCE
  name: Arcane Sustenance
  type: Class Feature
  source: "Orcus Original"
  categories: [ORCUS_MAGICIAN_ARCANE_STRENGTH]
  fields:

    Description: >-
      At the start of each of your turns, choose one power you have active that
      requires an action to Maintain or choose a companion of yours (a summon,
      familiar, etc.). If you choose the Maintain power, the power is Maintained
      as if you spent the relevant action on it. If you choose the creature, it
      can take an action of your choice without you spending an action on it.
      This does not allow it to exceed its total actions, so for example if you
      choose for it to take a standard action, you cannot also spend your
      standard action to have it take another standard action.
# --- Ability-swap markers -----------------------------------------------------
- id: ORCUS_KEYSWAP_MAGICIAN_INTELLIGENCE
  name: Magician Key Intelligence
  type: Key Ability Swap
  categories: [Key Ability Swap]
- id: ORCUS_SECSWAP_CONJURER_CONSTITUTION
  name: Conjurer Secondary Constitution
  type: Secondary Ability Swap
  categories: [Secondary Ability Swap]
- id: ORCUS_SECSWAP_ENCHANTER_CHARISMA
  name: Enchanter Secondary Charisma
  type: Secondary Ability Swap
  categories: [Secondary Ability Swap]
- id: ORCUS_SECSWAP_EVOKER_DEXTERITY
  name: Evoker Secondary Dexterity
  type: Secondary Ability Swap
  categories: [Secondary Ability Swap]
