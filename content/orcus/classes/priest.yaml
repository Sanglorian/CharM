# Priest - Divine Leader (Orcus Classes and Powers). Key ability: Wisdom.
# The Priest shares the Angel's Trumpet discipline with the Commander, but those
# powers are printed with the discipline's key (Charisma). Per the Orcus rule a
# Priest uses Wisdom (its class key) instead. This is done with no engine change
# and no equipment dependency: Angel's Trumpet attacks name "Charisma or Wisdom",
# and this class grants an "Ability Choice" element naming Wisdom, so the engine
# resolves those powers to Wisdom for a Priest (and Charisma for a Commander).

- id: ORCUS_CLASS_PRIEST
  name: Priest
  type: Class
  source: "Orcus (Outlaw Kingdoms)"
  categories: [Leader, Divine]
  fields:
    Role: Leader
    Tradition: Divine
    "Key Ability": Wisdom
    "Class Disciplines": "Angel's Trumpet, Golden Lion"
    "Armor Proficiencies": "Cloth, leather, hide, chainmail"
    "Weapon Proficiencies": "Simple melee, simple ranged"
    "Focus Proficiencies": "Holy symbol"
    "Class Skills": "Arcana, Diplomacy, Heal, History, Insight, Religion"
    Flavor: "You channel the will of the gods to mend, ward and rally."
  rules:
    # Orcus key-ability substitution (equipment-independent, no engine change):
    # grant an "Ability Choice" element naming this class's key ability. The
    # engine adds it to Stats.ChosenAbilities and, for any discipline power whose
    # attack/damage text names more than one ability, resolves it to this one.
    # Angel's Trumpet powers print "Charisma or Wisdom", so a Priest uses Wisdom
    # while a Commander uses Charisma. See docs/orcus-mapping.md.
    - grant: ORCUS_ABILITYCHOICE_PRIEST_WISDOM
      type: Ability Choice
    # Hit Points: 12 + Con score at level 1, +5 per level (7 + Con + 5 x Level).
    - statadd: Hit Points
      value: 7
    - statadd: Hit Points
      value: { statref: Constitution }
    - statadd: Hit Points
      value: { statref: Level, scale: 5 }
    - statadd: Healing Surges
      value: 7
    - statadd: Healing Surges
      value: { abilmod: Constitution }
    - statadd: Will Defense
      value: +2
      bonusType: Class
    # Trained in 4 skills from the Priest class skill list (Religion + 3 others).
    - select:
        type: Skill Training
        number: 4
        category: ORCUS_PRIEST_SKILLS
        name: Priest Trained Skills
    - select:
        type: Class Feature
        number: 1
        category: ORCUS_PRIEST_TALENT
        name: Priest Talent
    - select:
        type: Power
        number: 2
        category: "ORCUS_DISCIPLINE_ANGELS_TRUMPET|ORCUS_DISCIPLINE_GOLDEN_LION,at-will,1"
        name: Priest At-Will Powers
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ANGELS_TRUMPET|ORCUS_DISCIPLINE_GOLDEN_LION,encounter,1"
        name: Priest Encounter Power
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ANGELS_TRUMPET|ORCUS_DISCIPLINE_GOLDEN_LION,daily,1"
        name: Priest Daily Power
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ANGELS_TRUMPET|ORCUS_DISCIPLINE_GOLDEN_LION,utility,2"
        name: Priest Utility Power
        level: 2
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ANGELS_TRUMPET|ORCUS_DISCIPLINE_GOLDEN_LION,encounter,3"
        name: Priest Encounter Power 2
        level: 3

