# Priest - Divine Leader (Orcus Classes and Powers). Key ability: Wisdom.
# The Priest shares the Angel's Trumpet discipline with the Commander, but those
# powers are printed with the discipline's key (Charisma). Per the Orcus rule a
# Priest may use Wisdom (its class key) INSTEAD, if higher. The class grants a
# "Key Ability Swap: Wisdom" element; the engine adds Wisdom to the candidate
# abilities of the discipline's "ability-swap" powers and uses the higher, with
# no false negative when a Priest's Charisma exceeds its Wisdom. This scales to
# any class (incl. kit access) since each just contributes its own key.

- id: ORCUS_CLASS_PRIEST
  name: Priest
  type: Class
  source: "Orcus (Outlaw Kingdoms)"
  categories: [Leader, Divine]
  fields:
    Role: Leader
    Tradition: Divine
    "Key Ability": Wisdom
    "Class Disciplines": "Angel's Trumpet"
    "Armor Proficiencies": "Cloth, leather, hide, chainmail"
    "Weapon Proficiencies": "Simple melee, simple ranged"
    "Focus Proficiencies": "Holy symbol"
    "Class Skills": "Arcana, Diplomacy, Heal, History, Insight, Religion"
    Flavor: "You channel the will of the gods to mend, ward and rally."
  rules:
    # Orcus key-ability substitution: the Priest may use Wisdom (its class key)
    # in place of a discipline power's printed key ability. The engine adds
    # Wisdom to the power's candidate abilities and takes the higher, so a Priest
    # with more Charisma still uses Charisma (no false negative). Works on the
    # stock engine path with no equipment. See docs/orcus-mapping.md.
    - grant: ORCUS_KEYSWAP_PRIEST_WISDOM
      type: Key Ability Swap
    # Hit Points: 12 + Con score at level 1, +5 per level (7 + Con + 5 x Level).
    - statadd: Hit Points
      value: 7
    - statadd: Hit Points
      value: { statref: Constitution }
    - statadd: Hit Points
      value: { statref: Level, scale: 5 }
    - statadd: Healing Surges
      value: 7
    - statadd: Healing Surges
      value: { abilmod: Constitution }
    - statadd: Will Defense
      value: +2
      bonusType: Class
    # Trained in 4 skills from the Priest class skill list (Religion + 3 others).
    - select:
        type: Skill Training
        number: 4
        category: ORCUS_PRIEST_SKILLS
        name: Priest Trained Skills
    - select:
        type: Class Feature
        number: 1
        category: ORCUS_PRIEST_TALENT
        name: Priest Talent
    - select:
        type: Power
        number: 2
        category: "ORCUS_DISCIPLINE_ANGELS_TRUMPET,at-will,1"
        name: Priest At-Will Powers
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ANGELS_TRUMPET,encounter,1"
        name: Priest Encounter Power
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ANGELS_TRUMPET,daily,1"
        name: Priest Daily Power
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ANGELS_TRUMPET,utility,2"
        name: Priest Utility Power
        level: 2
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ANGELS_TRUMPET,encounter,3"
        name: Priest Encounter Power 2
        level: 3

