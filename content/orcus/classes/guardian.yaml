# Guardian — Martial Defender (Orcus Classes and Powers). Level-1 build.
# HP/defenses use the engine's existing stat names; "Recoveries" maps to the
# engine's Healing Surges (see docs/orcus-mapping.md). Higher-level HP scaling
# (+6/level) is a follow-up that needs the engine's per-level machinery.

- id: ORCUS_CLASS_GUARDIAN
  name: Guardian
  type: Class
  source: "Orcus (Outlaw Kingdoms)"
  categories: [Defender, Martial]
  fields:
    Role: Defender
    Tradition: Martial
    "Key Ability": Strength
    "Class Disciplines": "Art of War, Juggernautical"
    "Armor Proficiencies": "Cloth, leather, hide, chainmail, scale; light shield, heavy shield"
    "Weapon Proficiencies": "Simple melee, martial melee, simple ranged, martial ranged"
    "Class Skills": "Athletics, Endure, Heal, Intimidate, Streetsmarts"
    Flavor: "You stand where the line must hold, and you do not move."
  rules:
    - grant: ORCUS_INTERNAL_GRANTS_GUARDIAN
      type: Grants
    # Hit Points: 15 + Con score at level 1, +6 per level thereafter.
    # Encoded as 9 + Con score + 6 x Level (the Level stat = character level).
    - statadd: Hit Points
      value: 9
    - statadd: Hit Points
      value: { statref: Constitution }
    - statadd: Hit Points
      value: { statref: Level, scale: 6 }
    # Recoveries per long rest: 9 plus your Constitution modifier.
    - statadd: Healing Surges
      value: 9
    - statadd: Healing Surges
      value: { abilmod: Constitution }
    # Defenses: +2 Fortitude.
    - statadd: Fortitude
      value: +2
      bonusType: Class
    # Trained in 3 skills from the Guardian class skill list.
    - select:
        type: Skill Training
        number: 3
        category: ORCUS_GUARDIAN_SKILLS
        name: Guardian Trained Skills
    # Choose one talent (sets your secondary ability).
    - select:
        type: Class Feature
        number: 1
        category: ORCUS_GUARDIAN_TALENT
        name: Guardian Talent
    # Default level-1 power progression: 2 at-will, 1 encounter, 1 daily attack.
    - select:
        type: Power
        number: 2
        category: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,at-will,1"
        name: Guardian At-Will Powers
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,encounter,1"
        name: Guardian Encounter Power
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,daily,1"
        name: Guardian Daily Power
    # Default progression: +1 utility power at level 2, +1 encounter at level 3.
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,utility,2"
        name: Guardian Utility Power
        level: 2
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,encounter,3"
        name: Guardian Encounter Power 2
        level: 3
    # Default progression to level 30 (class powers only; +P/+E come from the
    # prestige/epic paths). Daily 2@5, utility 2@6, encounter 3@7, daily 3@9,
    # utility 3@10, utility 4@16, utility 5@22.
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,daily,5"
        name: Guardian Daily Power 2
        level: 5
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,utility,6"
        name: Guardian Utility Power 2
        level: 6
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,encounter,7"
        name: Guardian Encounter Power 3
        level: 7
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,daily,9"
        name: Guardian Daily Power 3
        level: 9
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,utility,10"
        name: Guardian Utility Power 3
        level: 10
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,utility,16"
        name: Guardian Utility Power 4
        level: 16
    - select:
        type: Power
        number: 1
        category: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,utility,22"
        name: Guardian Utility Power 5
        level: 22
    # Power-replacement (retraining) swaps. At these levels you may give up one
    # class attack power of the listed frequency and gain one of the level you are
    # reaching, drawn from your disciplines. Declared with the engine's `replace`
    # directive (optional). Encounter swaps at 13/17/23/27, daily at 15/19/25/29.
    - { replace: { name: "Encounter Power Swap (Lv 13)", powerSwap: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,encounter,13", level: 13, optional: true } }
    - { replace: { name: "Daily Power Swap (Lv 15)",     powerSwap: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,daily,15",     level: 15, optional: true } }
    - { replace: { name: "Encounter Power Swap (Lv 17)", powerSwap: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,encounter,17", level: 17, optional: true } }
    - { replace: { name: "Daily Power Swap (Lv 19)",     powerSwap: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,daily,19",     level: 19, optional: true } }
    - { replace: { name: "Encounter Power Swap (Lv 23)", powerSwap: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,encounter,23", level: 23, optional: true } }
    - { replace: { name: "Daily Power Swap (Lv 25)",     powerSwap: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,daily,25",     level: 25, optional: true } }
    - { replace: { name: "Encounter Power Swap (Lv 27)", powerSwap: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,encounter,27", level: 27, optional: true } }
    - { replace: { name: "Daily Power Swap (Lv 29)",     powerSwap: "ORCUS_DISCIPLINE_ART_OF_WAR|ORCUS_DISCIPLINE_JUGGERNAUTICAL,daily,29",     level: 29, optional: true } }

- id: ORCUS_INTERNAL_GRANTS_GUARDIAN
  name: Guardian Grants
  type: Grants
  fields: { _SupportsID: ORCUS_CLASS_GUARDIAN }
  rules:
    - grant: ORCUS_FEATURE_COMBAT_DOMINANCE
      type: Class Feature
    - grant: ORCUS_FEATURE_VETERAN_OPPORTUNIST
      type: Class Feature
    - grant: ORCUS_FEATURE_SAVVY_COMBATANT
      type: Class Feature
    # Orcus key-ability rule: the Guardian may use Strength (its class key) in
    # place of a discipline power's printed key ability. (No-op for Art of War,
    # whose key is already Strength, but applies to any discipline it reaches.)
    - grant: ORCUS_KEYSWAP_GUARDIAN_STRENGTH
      type: Key Ability Swap
    # Proficiencies: simple & martial, melee & ranged weapons; cloth, leather,
    # hide, chainmail, scale armor; light and heavy shields.
    - { grant: ORCUS_PROFGRANT_SIMPLE_MELEE, type: Grants }
    - { grant: ORCUS_PROFGRANT_MARTIAL_MELEE, type: Grants }
    - { grant: ORCUS_PROFGRANT_SIMPLE_RANGED, type: Grants }
    - { grant: ORCUS_PROFGRANT_MARTIAL_RANGED, type: Grants }
    - { grant: ORCUS_PROFGRANT_ARMOR_LIGHT, type: Grants }
    - { grant: ORCUS_APROF_CHAINMAIL, type: Proficiency }
    - { grant: ORCUS_APROF_SCALE, type: Proficiency }
    - { grant: ORCUS_APROF_LIGHT_SHIELD, type: Proficiency }
    - { grant: ORCUS_APROF_HEAVY_SHIELD, type: Proficiency }

# --- Always-on class features -------------------------------------------------
- id: ORCUS_FEATURE_COMBAT_DOMINANCE
  name: Combat Dominance
  type: Class Feature
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: >
      You can choose to emit an aura 1 of combat dominance. While you do so,
      creatures in the aura who are not marked by anyone else are marked by you.
      A creature that leaves your aura is no longer marked.

- id: ORCUS_FEATURE_VETERAN_OPPORTUNIST
  name: Veteran Opportunist
  type: Class Feature
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: "Add your Wisdom modifier to your attack rolls when making opportunity attacks."

- id: ORCUS_FEATURE_SAVVY_COMBATANT
  name: Savvy Combatant
  type: Class Feature
  source: "Orcus (Outlaw Kingdoms)"
  fields:
    Description: "You gain the punish cowardice and block retreat powers."
  rules:
    - grant: ORCUS_POWER_BLOCK_RETREAT
      type: Power
    - grant: ORCUS_POWER_PUNISH_COWARDICE
      type: Power

# --- Talents (chosen via the Guardian Talent select) --------------------------
- id: ORCUS_TALENT_GREAT_WEAPON_STYLE
  name: Great Weapon Style
  type: Class Feature
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_GUARDIAN_TALENT]
  fields:
    "Secondary Ability": Constitution
    Description: "You get a +1 bonus on attack rolls with two-handed weapons. Your secondary ability is Constitution."
  rules:
    # Talent secondary substitution: use Constitution in place of a discipline
    # power's printed secondary ability (Art of War secondary = Dexterity) when higher.
    - grant: ORCUS_SECSWAP_GWS_CONSTITUTION
      type: Secondary Ability Swap

- id: ORCUS_TALENT_PROTECTION
  name: Protection
  type: Class Feature
  source: "Orcus (Outlaw Kingdoms)"
  categories: [ORCUS_GUARDIAN_TALENT]
  fields:
    "Secondary Ability": "Dexterity or Wisdom"
    Description: "You get a +1 bonus on attack rolls with one-handed weapons. Your secondary ability is Dexterity OR Wisdom (your choice)."
  rules:
    # Protection's secondary is Dexterity OR Wisdom (the player's choice at
    # creation), modelled as a one-of select between two Secondary Ability Swap
    # options. Whichever is chosen becomes the talent secondary the engine
    # substitutes into discipline powers.
    - select:
        type: Secondary Ability Swap
        number: 1
        category: ORCUS_PROTECTION_SECONDARY
        name: Protection Secondary Ability

# --- Feature powers (from Savvy Combatant) ------------------------------------
- id: ORCUS_POWER_BLOCK_RETREAT
  name: Block Retreat
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [feature]
  fields:
    "Power Usage": At-Will
    "Power Type": Utility
    "Action Type": Free Action
    Keywords: Martial
    Trigger: "A creature is hit by your opportunity attack, and the opportunity attack was provoked by movement."
    Effect: "Their movement stops for this action. They may attempt to move again using another action, if applicable."

- id: ORCUS_POWER_PUNISH_COWARDICE
  name: Punish Cowardice
  type: Power
  source: "Orcus (Outlaw Kingdoms)"
  categories: [feature]
  fields:
    "Power Usage": At-Will
    "Power Type": Utility
    "Action Type": Counter Action
    Keywords: Martial
    Trigger: "An adjacent creature you have marked shifts or makes an attack that does not include you."
    Effect: "Make a basic melee attack against the triggering creature."
    Special: "This is not an opportunity attack."

# --- Ability-swap markers (Orcus class-key / talent-secondary substitution) ---
- id: ORCUS_KEYSWAP_GUARDIAN_STRENGTH
  name: Guardian Key Strength
  type: Key Ability Swap
  categories: [Key Ability Swap]
- id: ORCUS_SECSWAP_GWS_CONSTITUTION
  name: Great Weapon Style Secondary Constitution
  type: Secondary Ability Swap
  categories: [Secondary Ability Swap]
- id: ORCUS_SECSWAP_PROTECTION_DEXTERITY
  name: Protection Secondary Dexterity
  type: Secondary Ability Swap
  categories: [Secondary Ability Swap, ORCUS_PROTECTION_SECONDARY]
- id: ORCUS_SECSWAP_PROTECTION_WISDOM
  name: Protection Secondary Wisdom
  type: Secondary Ability Swap
  categories: [Secondary Ability Swap, ORCUS_PROTECTION_SECONDARY]
