- id: ORCUS_POWER_ANIMAL_FORM
  name: "Animal Form"
  type: Power
  source: "Orcus Original"
  categories: [feature]
  fields:
    Level: "Feature"
    "Power Usage": "Daily"
    "Power Type": "Utility"
    "Action Type": "Swift Action"
    Target: "Self"
    Effect: >-
      You take one of the following forms. You cannot make attacks in this form.
      You remain in the form until you are reduced to 0 HP or below, take a long
      rest or take a new form. You can return to your original form as a swift
      action. • Tiny, Small or Medium amphibian or riverine or ocean-going
      mammal. Swim speed equal to your land speed. • Tiny or Small water bird.
      You gain a flight speed of 4 if you choose a water bird (maximum altitude
      2). Supernatural Beauty: You have the supernatural beauty power.

