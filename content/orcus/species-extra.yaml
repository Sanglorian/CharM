# === Grynloc ===================================================================
- id: ORCUS_RACE_GRYNLOC
  name: "Grynloc"
  type: Race
  source: "Orcus Original"
  categories: [Medium]
  fields:
    Size: Medium
    Vision: Normal
    "Ability Scores": "Pick two of +2 Dexterity, +2 Intelligence and +2 Wisdom"
    Description: >-
      Medium natural humanoid Grynlocs are seven-foot tall, lanky hairless
      humanoids with legs that bend backwards, like a horse's. Their long,
      toothy mouths make them look a little like camels. They are nomadic
      desert-dwellers who can literally see magic instead of light when they
      lower a special lid across their eyes. Their ability to shape magic allows
      them to write messages invisible to the naked eye and craft beautiful
      raiments of pure magic that require special sight or a detect magic
      invocation to see.
    Speed: "6 squares."
    Languages: "You can speak, read, and write Common, Primordial."
    "Magic Sight": >-
      You can, to a range of 12 squares, see invisible creatures and objects,
      automatically detect visual illusions and succeed on saving throws against
      them, and perceive the original form of a shapechanger or a creature that
      is transformed by magic.
    "Grynloc Gifts": "Once per encounter, you can use shape magic or distraction."
  rules:
    - { grant: ORCUS_SIZE_MEDIUM, type: Size }
    - { grant: ORCUS_VISION_NORMAL, type: Vision }
    - { statadd: Speed, value: 6 }
    - { statadd: Language Count, value: 2 }
    - { statadd: Arcana, value: +2, bonusType: Ancestry }
    - { statadd: Perception, value: +2, bonusType: Ancestry }
    - { select: { type: Race Ability Bonus, number: 2, category: ORCUS_ABILTRIO_DEX_INT_WIS, name: Grynloc Ability Scores } }
    - { grant: ORCUS_POWER_SHAPE_MAGIC, type: Power }
    - { grant: ORCUS_POWER_DISTRACTION, type: Power }

- id: ORCUS_POWER_SHAPE_MAGIC
  name: "Shape Magic"
  type: Power
  source: "Orcus Original"
  categories: [feature]
  fields:
    Level: "Feature"
    "Power Usage": "Encounter"
    "Power Type": "Utility"
    "Action Type": "Swift Action"
    Keywords: "Zone"
    Target: "Far burst 3 within range 10, one conjuration, summon or zone"
    Effect: >-
      If the target is a conjuration or summon, you can move it to any
      unoccupied space in the burst. If the target is a zone, squares of your
      choice in the burst cease to be part of the zone and an equal number of
      squares in the burst become part of the zone.

