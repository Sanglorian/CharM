# === Rook ======================================================================
- id: ORCUS_RACE_ROOK
  name: "Rook"
  type: Race
  source: "Orcus Original"
  categories: [Medium]
  fields:
    Size: Medium
    Vision: Normal
    "Ability Scores": "Pick two of +2 Strength, +2 Constitution and +2 Intelligence"
    Description: >-
      Medium elemental humanoid (earth) Tall humanoids with stony skin, rooks
      have a reputation for moodiness and solemnity - but they are respected for
      their knowledge and determination. Rooks usually build their homes in high
      places, perched on cliffs or mountaintops.
    Speed: "6 squares."
    Languages: "You can speak, read, and write Common, Giant."
    "Heart of Stone": >-
      You do not make death saving throws. You still die if reduced to negative
      hit points equal to your maximum hit points. While unconscious, you do not
      need to breathe nor do you get hungrier or thirstier.
    "Will Defense": "+1 ancestry bonus to Will defense."
    "Rook Power": >-
      Each rook has one of the following powers: soften or gargoyle's rest.
  rules:
    - { grant: ORCUS_SIZE_MEDIUM, type: Size }
    - { grant: ORCUS_VISION_NORMAL, type: Vision }
    - { statadd: Speed, value: 6 }
    - { statadd: Language Count, value: 2 }
    - { statadd: Diplomacy, value: +2, bonusType: Ancestry }
    - { statadd: Endure, value: +2, bonusType: Ancestry }
    - { select: { type: Race Ability Bonus, number: 2, category: ORCUS_ABILTRIO_STR_CON_INT, name: Rook Ability Scores } }
    - { select: { type: Power, number: 1, category: ORCUS_ROOK_POWER, name: Rook Power } }

- id: ORCUS_POWER_SOFTEN
  name: "Soften"
  type: Power
  source: "Orcus Original"
  categories: [feature, ORCUS_ROOK_POWER]
  fields:
    Level: "Feature"
    "Power Usage": "Encounter"
    "Power Type": "Attack"
    "Action Type": "Swift Action"
    Keywords: "Focus"
    Target: "Melee touch, one creature"
    Attack: "Str, Con or Int (your choice) vs Fortitude"
    Hit: >-
      The target loses its resistances and one immunity of your choice (save
      ends). If the creature has no resistances or immunities, it instead gains
      vulnerability to untyped damage 5 (save ends). If the target is an object,
      the effect lasts for five minutes (no save) and its break DC is also
      reduced by 5.

- id: ORCUS_POWER_GARGOYLE_S_REST
  name: "Gargoyle’s Rest"
  type: Power
  source: "Orcus Original"
  categories: [feature, ORCUS_ROOK_POWER]
  fields:
    Level: "Feature"
    "Power Usage": "Encounter"
    "Power Type": "Utility"
    "Action Type": "Move Action"
    Target: "Self"
    Effect: >-
      Your turn ends. You gain resistance to all damage 5 (10 at level 11, 15 at
      level 21) until the end of your next turn. At the beginning of your next
      turn, you may use your standard action to make a charge attack. If you do,
      increase your speed by 2 for the charge.

