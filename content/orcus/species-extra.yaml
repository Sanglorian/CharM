- id: ORCUS_POWER_SLEEP_DART
  name: "Sleep Dart"
  type: Power
  source: "Orcus Original"
  categories: [feature]
  fields:
    Level: "Feature"
    "Power Usage": "Encounter"
    "Power Type": "Utility"
    "Action Type": "Standard Action"
    Keywords: "Focus"
    Target: "Ranged 10, one creature"
    Attack: "Dex, Wis or Cha (your choice) vs Will"
    Hit: >-
      The target is dazed until the end of your next turn or until it takes
      damage or a creature within reach uses a standard action to shake it
      awake. If it is still dazed at the end of your next turn, it falls
      unconscious for an hour or until it takes damage or is shaken awake
      (whichever happens sooner).

