  name: "Barrel Along"
  type: Power
  source: "Orcus Original"
  categories: [feature]
  fields:
    Level: "Feature"
    "Power Usage": "Encounter"
    "Power Type": "Utility"
    "Action Type": "Swift Action"
    Target: "Self"
    Trigger: "You are staggered."
    Effect: >-
      You have a +2 bonus to speed and to damage rolls until the end of the
      encounter. Level 11: You have a +2 bonus to speed and a +5 bonus to damage
      rolls until the end of the encounter. Level 21: You have a +2 bonus to
      speed and a +7 bonus to damage rolls until the end of the encounter.

