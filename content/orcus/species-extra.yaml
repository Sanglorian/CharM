# Additional species (Orcus Advanced Options, # Species) — generated by
# tools/CharM.Orcus.Import (generate-species). Prose is verbatim & round-trip
# checked; size/vision/speed/language/skill/ability/power scaffolding is
# derived mechanically, mirroring ancestries-species.yaml. Do not hand-edit;
# regenerate. Species already in ancestries-species.yaml are not repeated.

# === Human =====================================================================
- id: ORCUS_RACE_HUMAN
  name: "Human"
  type: Race
  source: "Orcus Original"
  categories: [Medium]
  fields:
    Size: Medium
    Vision: Normal
    "Ability Scores": "+2 to one ability score of your choice"
    Description: >-
      Medium natural humanoid It's hard to make generalizations about humans.
      Humans reach adulthood in their late teens and live less than a century.
      Humans vary widely in height and build, from barely 5 feet to well over 6
      feet tall. Humans typically learn the languages of other peoples they deal
      with, including obscure dialects. They are fond of sprinkling their speech
      with words borrowed from other tongues: Giant curses, Elvish musical
      expressions, Dwarvish military phrases, and so on.
    Speed: "6 squares."
    Languages: >-
      You can speak, read, and write Common and one extra language of your
      choice.
    "Bonus Feat": "Choose one feat. You gain that feat."
    "Bonus Skill": "Choose one class skill. You become trained in that skill."
    "Hardy Stock": "+1 ancestry bonus to Fortitude, Reflex and Will defenses."
    Dabbler: >-
      Choose a level 1 at-will attack power from your class. You gain this power
      in addition to the those normally granted by your class.
  rules:
    - { grant: ORCUS_SIZE_MEDIUM, type: Size }
    - { grant: ORCUS_VISION_NORMAL, type: Vision }
    - { statadd: Speed, value: 6 }
    - { statadd: Language Count, value: 2 }
    - { select: { type: Race Ability Bonus, number: 1, category: ORCUS_ABILANY, name: Human Ability Score } }

# === Baldanar ==================================================================
- id: ORCUS_RACE_BALDANAR
  name: "Baldanar"
  type: Race
  source: "Orcus Original"
  categories: [Medium]
  fields:
    Size: Medium
    Vision: Normal
    "Ability Scores": "Pick two of +2 Dexterity, +2 Intelligence and +2 Charisma"
    Description: >-
      Medium shadow humanoid (shapechanger) The baldanar are shapeshifters from
      the Plane of Shadow. In their true form, a baldanar is a grey-skinned
      humanoid with shallow features and all-black eyes. Planar gossip suggests
      that the baldanar are the exiled remnants of a mighty terrestrial empire,
      stripped of their identities as punishment for their hubris. Some baldanar
      share this belief, and are trying to recover their memories – and their
      past glory. Others use their ability to shift forms to make something new
      of their mysterious lives.
    Speed: "6 squares."
    Languages: >-
      You can speak, read, and write Common and one extra language of your
      choice..
    "Shared Mind": >-
      You gain telepathy 5, which means you can communicate mentally with
      creatures you can see that are within 5 squares of you. The creature must
      be able to speak at least one language; once you have begun the
      communication they can “speak” back to you if they wish. Your telepathy
      does not allow you to read the creature’s thoughts or influence them other
      than in the same manner as ordinary verbal communication.
    "Brief Mimicry": >-
      You have the brief mimicry power from the Deep, Dark, Truthful Mirror
      discipline.
    Dabbler: >-
      Choose a level 1 at-will attack power from your class. You gain this power
      in addition to the those normally granted by your class.
  rules:
    - { grant: ORCUS_SIZE_MEDIUM, type: Size }
    - { grant: ORCUS_VISION_NORMAL, type: Vision }
    - { statadd: Speed, value: 6 }
    - { statadd: Language Count, value: 2 }
    - { statadd: Bluff, value: +2, bonusType: Ancestry }
    - { statadd: Stealth, value: +2, bonusType: Ancestry }
    - { select: { type: Race Ability Bonus, number: 2, category: ORCUS_ABILTRIO_DEX_INT_CHA, name: Baldanar Ability Scores } }

